# Daily QA — runs change detection, accuracy tests, triage, and HTML report.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   YEPAI_BASE_URL          e.g. https://bot-test.yepai.io
#   YEPAI_LOGIN_EMAIL       test account email
#   YEPAI_LOGIN_PASSWORD    test account password
#   ANTHROPIC_API_KEY       for triage-agent + change-watch-agent AI analysis
#   LINEAR_API_KEY          (optional) for auto-creating Linear tickets on regression
#   REPORT_EMAIL_FROM       Gmail address to send reports from
#   REPORT_EMAIL_PASS       Gmail app password (not account password)
#   REPORT_EMAIL_TO         recipient address for HTML reports
#
# First-run prerequisite: run `pnpm watch:agents:baseline` locally once
# to populate data/agent-baselines.json before enabling this workflow.

name: Daily QA

on:
  schedule:
    - cron: '0 1 * * 2,5'   # 01:00 UTC Tue & Fri (11:00 Melbourne)
  workflow_dispatch:        # allow manual trigger
    inputs:
      run_accuracy:
        description: 'Run accuracy tests even if no changes detected'
        type: boolean
        default: false

env:
  YEPAI_BASE_URL:        ${{ secrets.YEPAI_BASE_URL }}
  YEPAI_LOGIN_EMAIL:     ${{ secrets.YEPAI_LOGIN_EMAIL }}
  YEPAI_LOGIN_PASSWORD:  ${{ secrets.YEPAI_LOGIN_PASSWORD }}
  ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
  LINEAR_API_KEY:        ${{ secrets.LINEAR_API_KEY }}
  SLACK_WEBHOOK_URL:     ${{ secrets.SLACK_WEBHOOK_URL }}
  REPORT_EMAIL_FROM:     ${{ secrets.REPORT_EMAIL_FROM }}
  REPORT_EMAIL_PASS:     ${{ secrets.REPORT_EMAIL_PASS }}
  REPORT_EMAIL_TO:       ${{ secrets.REPORT_EMAIL_TO }}

jobs:
  # ── Job 0: account health check ────────────────────────────────
  health-check:
    name: Account Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: Create data/test-users.json
        run: |
          mkdir -p data
          echo '${{ secrets.TEST_USERS_JSON }}' > data/test-users.json
      - name: Run account health check
        run: pnpm health:check || true
        env:
          YEPAI_BASE_URL:       ${{ secrets.YEPAI_BASE_URL }}
          YEPAI_LOGIN_EMAIL:    ${{ secrets.YEPAI_LOGIN_EMAIL }}
          YEPAI_LOGIN_PASSWORD: ${{ secrets.YEPAI_LOGIN_PASSWORD }}
      - name: Upload health check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: health-check-report
          path: reports/health-check-*.json
          if-no-files-found: ignore

  # ── Job 1: detect agent changes ────────────────────────────────
  detect-changes:
    name: Detect Agent Changes
    runs-on: ubuntu-latest
    needs: health-check
    outputs:
      has_changes: ${{ steps.watch.outputs.has_changes }}
      changed_agents: ${{ steps.watch.outputs.changed_agents }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Restore fingerprints cache
        uses: actions/cache@v4
        with:
          path: data/agent-fingerprints.json
          key: agent-fingerprints-${{ github.ref }}
          restore-keys: agent-fingerprints-

      - name: Run change watch (fingerprint only)
        id: watch
        run: |
          pnpm exec tsx scripts/change-watch-agent.ts 2>&1 || true
          if [ -f data/agent-fingerprints.json ]; then
            echo "Fingerprints updated"
          fi
          CHANGED=$(node -e "
            const fs = require('fs'), path = require('path');
            const dir = 'reports';
            if (!fs.existsSync(dir)) { console.log(''); process.exit(0); }
            const files = fs.readdirSync(dir)
              .filter(f => f.startsWith('change-watch-'))
              .sort().reverse();
            if (!files.length) { console.log(''); process.exit(0); }
            const data = JSON.parse(fs.readFileSync(path.join(dir, files[0]), 'utf-8'));
            const agents = (data.analysed || [])
              .filter(a => a.change)
              .map(a => a.change.agent);
            console.log(agents.join(','));
          " 2>/dev/null || echo "")
          echo "changed_agents=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "has_changes=$( [ -n "$CHANGED" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Save fingerprints cache
        uses: actions/cache/save@v4
        with:
          path: data/agent-fingerprints.json
          key: agent-fingerprints-${{ github.ref }}

      - name: Upload change-watch report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: change-watch-report
          path: reports/change-watch-*.json
          if-no-files-found: ignore

  # ── Job 2: accuracy tests (runs if changes detected or forced) ─
  accuracy:
    name: Accuracy Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' || github.event.inputs.run_accuracy == 'true'
    strategy:
      fail-fast: false
      matrix:
        agent: [maya, oscar, daniel, cody]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Restore accuracy history cache
        uses: actions/cache/restore@v4
        with:
          path: reports/${{ matrix.agent }}-accuracy-*.json
          key: accuracy-history-${{ matrix.agent }}-${{ github.ref }}
          restore-keys: accuracy-history-${{ matrix.agent }}-

      - name: Create data/test-users.json
        run: |
          mkdir -p data
          echo '${{ secrets.TEST_USERS_JSON }}' > data/test-users.json

      - name: Run accuracy — ${{ matrix.agent }}
        run: pnpm exec tsx scripts/accuracy-test-api.ts --agent ${{ matrix.agent }}
        timeout-minutes: 15

      - name: Verify Cody async polling captured
        if: matrix.agent == 'cody'
        run: |
          REPORT="reports/cody-accuracy-results.json"
          if [ -f "$REPORT" ]; then
            POLLED=$(node -e "
              const r = require('./$REPORT');
              const polled = (r.results || []).filter(x => x.responseText && x.responseText.length > 10).length;
              console.log(polled + '/' + (r.results || []).length);
            " 2>/dev/null || echo "0/0")
            echo "Cody responses with content: $POLLED"
            if [[ "$POLLED" == "0/"* ]]; then
              echo "::warning::Cody async polling may not be working — all responses empty"
            fi
          fi

      - name: Save accuracy history cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: reports/${{ matrix.agent }}-accuracy-*.json
          key: accuracy-history-${{ matrix.agent }}-${{ github.ref }}-${{ github.run_id }}

      - name: Upload accuracy report
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-${{ matrix.agent }}
          path: reports/${{ matrix.agent }}-accuracy-results.json

  # ── Job 3: alert (immediate Slack alert if accuracy < threshold) ─
  alert:
    name: Accuracy Alert
    runs-on: ubuntu-latest
    needs: accuracy
    if: always() && needs.accuracy.result != 'skipped'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all accuracy reports
        uses: actions/download-artifact@v4
        with:
          pattern: accuracy-*
          path: reports/
          merge-multiple: true

      - name: Run alert agent
        run: pnpm exec tsx scripts/alert-agent.ts || true
        timeout-minutes: 5
        env:
          ACCURACY_ALERT_THRESHOLD: ${{ vars.ACCURACY_ALERT_THRESHOLD || '80' }}

  # ── Job 4: triage ──────────────────────────────────────────────
  triage:
    name: Triage Failures
    runs-on: ubuntu-latest
    needs: accuracy
    if: always() && needs.accuracy.result != 'skipped'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all accuracy reports
        uses: actions/download-artifact@v4
        with:
          pattern: accuracy-*
          path: reports/
          merge-multiple: true

      - name: Run triage agent (with auto test-case generation)
        run: pnpm exec tsx scripts/triage-agent.ts --days 1 --linear --slack --gen-tests
        timeout-minutes: 10

      - name: Commit generated test cases (if any)
        run: |
          git config user.name  "YepAI E2E Bot"
          git config user.email "e2e-bot@yepai.io"
          if git diff --quiet scripts/accuracy-test-api.ts; then
            echo "No new test cases generated."
          else
            git add scripts/accuracy-test-api.ts
            git commit -m "test(auto): add regression cases from triage $(date -u +%Y-%m-%d) [skip ci]"
            git push
            echo "✅ New test cases committed."
          fi

      - name: Upload triage report
        uses: actions/upload-artifact@v4
        with:
          name: triage-report
          path: reports/triage-*.json

  # ── Job 5: retry FLAKY agents ─────────────────────────────────
  retry-flaky:
    name: Retry FLAKY Agents
    runs-on: ubuntu-latest
    needs: triage
    if: always() && needs.triage.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: Create data/test-users.json
        run: |
          mkdir -p data
          echo '${{ secrets.TEST_USERS_JSON }}' > data/test-users.json
      - name: Download triage report
        uses: actions/download-artifact@v4
        with:
          name: triage-report
          path: reports/
      - name: Re-run accuracy for FLAKY agents
        run: |
          if [ ! -f reports/flaky-retry-agents.json ]; then
            echo "No FLAKY agents queued — skipping."
            exit 0
          fi
          AGENTS=$(node -e "console.log(require('./reports/flaky-retry-agents.json').agents.join(' '))")
          echo "Retrying: $AGENTS"
          for agent in $AGENTS; do
            echo "--- Retry: $agent ---"
            pnpm exec tsx scripts/accuracy-test-api.ts --agent "$agent" || true
          done
        timeout-minutes: 30
      - name: Upload retry reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accuracy-retry
          path: reports/*-accuracy-results.json
          if-no-files-found: ignore

  # ── Job 6: auto-repair BUG failures ───────────────────────────
  auto-repair:
    name: Auto-Repair Broken Flows
    runs-on: ubuntu-latest
    needs: triage
    if: always() && needs.triage.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Download triage report
        uses: actions/download-artifact@v4
        with:
          name: triage-report
          path: reports/

      - name: Run repair agent on failed flows
        run: pnpm exec tsx scripts/repair-agent.ts --all || true
        timeout-minutes: 20

  # ── Job 6: Digital Staff E2E flows ────────────────────────────
  digital-staff:
    name: Digital Staff E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run all Digital Staff flows
        run: pnpm exec tsx scripts/ds-flow-runner.ts --slack || true
        timeout-minutes: 15
        env:
          DS_BASE_URL:       ${{ secrets.DS_BASE_URL }}
          DS_LOGIN_EMAIL:    ${{ secrets.DS_LOGIN_EMAIL }}
          DS_LOGIN_PASSWORD: ${{ secrets.DS_LOGIN_PASSWORD }}

      - name: Run DS triage agent
        run: pnpm exec tsx scripts/ds-triage-agent.ts --slack || true
        timeout-minutes: 5

      - name: Upload DS reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ds-reports
          path: reports/ds-run-*.json
          if-no-files-found: ignore

  # ── Job 7: Maya Content Studio E2E ────────────────────────────
  maya-studio:
    name: Maya Content Studio E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Maya Content Studio flow
        run: pnpm exec tsx src/cli/index.ts run test-maya-studio || true
        timeout-minutes: 20
        env:
          YEPAI_BASE_URL:       ${{ secrets.YEPAI_BASE_URL }}
          YEPAI_LOGIN_EMAIL:    ${{ secrets.YEPAI_LOGIN_EMAIL }}
          YEPAI_LOGIN_PASSWORD: ${{ secrets.YEPAI_LOGIN_PASSWORD }}

      - name: Upload Studio reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio-reports
          path: reports/studio-*.json
          if-no-files-found: ignore

      - name: Upload Studio screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio-screenshots
          path: screenshots/studio-*.png
          if-no-files-found: ignore

  # ── Job 8: HTML report + notify ────────────────────────────────
  report:
    name: HTML Report & Notify
    runs-on: ubuntu-latest
    needs: [accuracy, triage, retry-flaky, auto-repair, digital-staff, maya-studio]
    if: always() && needs.accuracy.result != 'skipped'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore accuracy history caches
        run: |
          for agent in maya oscar daniel cody; do
            echo "Restoring cache for $agent..."
          done
        # Individual cache restores per agent
      - uses: actions/cache/restore@v4
        with:
          path: reports/maya-accuracy-*.json
          key: accuracy-history-maya-${{ github.ref }}
          restore-keys: accuracy-history-maya-
      - uses: actions/cache/restore@v4
        with:
          path: reports/oscar-accuracy-*.json
          key: accuracy-history-oscar-${{ github.ref }}
          restore-keys: accuracy-history-oscar-
      - uses: actions/cache/restore@v4
        with:
          path: reports/daniel-accuracy-*.json
          key: accuracy-history-daniel-${{ github.ref }}
          restore-keys: accuracy-history-daniel-
      - uses: actions/cache/restore@v4
        with:
          path: reports/cody-accuracy-*.json
          key: accuracy-history-cody-${{ github.ref }}
          restore-keys: accuracy-history-cody-

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports/
          merge-multiple: true

      - name: Generate HTML report & send email + Slack
        run: pnpm exec tsx scripts/report-html.ts --email --slack
        timeout-minutes: 5

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: reports/agent-test-report-*.html
