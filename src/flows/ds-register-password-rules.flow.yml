# Digital Staff — 注册密码规则验证
# 每个测试用独立邮箱+独立导航，避免前一个成功后影响后续步骤
# 关键发现：如果弱密码能注册成功，表示该规则 BUG — 会记录在截图和日志里

name: ds-register-password-rules
description: 注册密码规则验证 — 太短、无大写、无数字、无符号、超长、纯数字（每个独立运行）

steps:

  # ════════════════════════════════════════════════════════════════
  # 测试1：密码太短（5位）
  # ════════════════════════════════════════════════════════════════
  - id: nav-register-test1
    action: browser.navigate
    params:
      url: "{{DS_BASE_URL}}/#/login"
      waitUntil: "domcontentloaded"

  - id: click-signup-test1
    action: browser.click
    params:
      selector: "a:has-text('Sign up')"

  - id: wait-form-test1
    action: browser.waitForSelector
    params:
      selector: "input[placeholder='Full name']"
      timeout: 10000

  - id: fill-name-test1
    action: form.fillSingle
    params:
      selector: "input[placeholder='Full name']"
      value: "PW Test Short"

  - id: fill-email-test1
    action: form.fillSingle
    params:
      selector: "input[placeholder='name@company.com'], input[type='email']"
      value: "ds-pwrules-short@yopmail.com"

  - id: fill-pw-short
    action: form.fillSingle
    params:
      selector: "input[placeholder='Password'], input[type='password']"
      value: "Ab1@x"

  - id: submit-test1
    action: browser.click
    params:
      selector: "button:has-text('Create Account')"

  - id: wait-test1
    action: wait
    params:
      ms: 2000

  - id: check-test1
    action: browser.execute
    params:
      script: |
        const url = window.location.href;
        const onRegister = !!document.querySelector("input[placeholder='Password'], input[type='password']");
        const body = document.body.innerText;
        const hasPwError = body.toLowerCase().includes('password') || body.toLowerCase().includes('short') ||
                           body.toLowerCase().includes('least') || body.toLowerCase().includes('minimum') ||
                           document.querySelectorAll('[data-sonner-toast], .toaster li').length > 0;
        const navigatedAway = !onRegister && !url.includes('login');
        return {
          test: 'password_too_short (Ab1@x — 5 chars)',
          onRegisterPage: onRegister,
          hasPwError,
          result: navigatedAway ? '⚠️ BUG: short password was ACCEPTED (registered successfully)' : (hasPwError ? '✅ PASS: short password rejected with error' : '⚠️ Rejected but no clear error message'),
          bodySnippet: body.slice(0, 200)
        };
    output: test1

  - id: screenshot-test1
    action: browser.screenshot
    params:
      name: "ds-register-pw-01-too-short"

  # ════════════════════════════════════════════════════════════════
  # 测试2：无大写字母 (asdf@12345)
