          onRegisterPage: onRegister,
          result: navigatedAway ? '⚠️ 200-char password accepted — check if there is a server-side max length' : '✅ 200-char password rejected',
          bodySnippet: body.slice(0, 200)
        };
    output: test6

  - id: screenshot-test6
    action: browser.screenshot
    params:
