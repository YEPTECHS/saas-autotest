      value: "PW Test TooLong"

  - id: fill-email-test6
    action: form.fillSingle
    params:
      selector: "input[placeholder='name@company.com'], input[type='email']"
      value: "ds-pwrules-long@yopmail.com"

  - id: fill-pw-too-long
    action: form.fillSingle
    params:
      selector: "input[placeholder='Password'], input[type='password']"
      value: "Aa1@xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

  - id: check-input-length
    action: browser.execute
    params:
      script: |
        const pwInput = document.querySelector("input[placeholder='Password'], input[type='password']");
        const val = pwInput ? pwInput.value : '';
        return {
          attemptedLength: 200,
          actualLength: val.length,
          truncated: val.length < 200,
          note: val.length < 200 ? '✅ Input field enforces max length of ' + val.length : '⚠️ No max length enforced on input field (200 chars allowed)'
        };
    output: test6InputLen

  - id: submit-test6
