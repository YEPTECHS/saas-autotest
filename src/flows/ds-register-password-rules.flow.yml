        const hasPwError = body.toLowerCase().includes('uppercase') || body.toLowerCase().includes('capital') ||
                           body.toLowerCase().includes('password') ||
                           document.querySelectorAll('[data-sonner-toast], .toaster li').length > 0;
        const navigatedAway = !onRegister && !url.includes('login');
        return {
