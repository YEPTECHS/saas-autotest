          onRegisterPage: onRegister,
          hasPwError,
          result: navigatedAway ? '⚠️ BUG: password without uppercase was ACCEPTED' : (hasPwError ? '✅ PASS: rejected with error' : '⚠️ Rejected but no clear error message'),
