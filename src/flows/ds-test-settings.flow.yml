# Digital Staff — Settings 页面测试

name: ds-test-settings
description: 测试 Settings 页面 — 账户设置、偏好配置

steps:
  - include: ds-login.flow.yml

  - id: click-settings
    action: browser.click
    params:
      selector: "a:has-text('Settings'), [href*='settings'], nav a:has-text('Settings'), aside a:has-text('Settings')"

  - id: wait-page-load
    action: browser.waitForSelector
    params:
      selector: "h1, h2, [class*='heading'], [class*='title'], main"
      timeout: 15000

  - id: screenshot-settings
    action: browser.screenshot
    params:
      name: "ds-settings-page"

  - id: check-settings-content
    action: browser.waitForSelector
    params:
      selector: "main, [class*='content'], [class*='setting'], form, input, button"
      timeout: 10000

  - id: screenshot-content
    action: browser.screenshot
    params:
      name: "ds-settings-content"

  - id: log-success
    action: log
    params:
      message: "Settings 页面测试完成！"
