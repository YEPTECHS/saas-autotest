# Digital Staff — Subscription 深度验证
# 验证：套餐信息存在、Credit Balance 显示、当前套餐或选购界面正确

name: ds-validate-subscription
description: Subscription 深度验证 — 套餐信息、Credit Balance、当前套餐或选购界面

steps:
  - include: ds-login.flow.yml

  - id: wait-dashboard-data
    action: wait
    params:
      ms: 4000

  - id: screenshot-dashboard
    action: browser.screenshot
    params:
      name: "ds-validate-sub-dashboard"

  # ── 从 Dashboard 验证 Credit Balance 卡片存在 ─────────────────
  - id: verify-dashboard-credit-card
    action: browser.execute
    params:
      script: |
        const body = document.body.innerText;
        if (!body.includes('Credit Balance')) throw new Error('Credit Balance card not found on Dashboard');
        if (body.includes('Loading wallet') || body.includes('loading...')) {
          throw new Error('Credit Balance still loading on Dashboard');
        }
        return { creditCardVisible: true };

  # ── 导航到 Subscription ────────────────────────────────────
  - id: click-subscription
    action: browser.click
    params:
      selector: "a:has-text('Subscription'), a[href*='subscription'], nav a:has-text('Subscription'), aside a:has-text('Subscription')"

  - id: wait-subscription-loaded
    action: browser.waitForSelector
    params:
      selector: "h1, h2, main"
      timeout: 15000

  - id: wait-sub-data
    action: wait
    params:
      ms: 2000

  - id: screenshot-subscription
    action: browser.screenshot
    params:
      name: "ds-validate-sub-page"

  # ── 验证 Subscription 页有套餐信息 ──────────────────────────
  - id: verify-subscription-content
    action: browser.execute
    params:
      script: |
        const body = document.body.innerText;
        const hasPlanInfo = body.includes('plan') || body.includes('Plan') ||
                           body.includes('credit') || body.includes('Credit') ||
                           body.includes('billing') || body.includes('Billing') ||
                           body.includes('subscription') || body.includes('Subscription');
        if (!hasPlanInfo) throw new Error('Subscription page has no plan/credit/billing info. Body: ' + body.slice(0, 300));
        return { hasContent: true, preview: body.slice(0, 200) };

  # ── 验证有 Choose a Plan 或当前套餐信息 ─────────────────────
  - id: assert-plan-cta-or-current
    action: browser.execute
    params:
      script: |
        const body = document.body.innerText;
        const hasChoosePlan = body.includes('Choose') || body.includes('Subscribe') ||
                              body.includes('Upgrade') || body.includes('Get started');
        const hasCurrentPlan = body.includes('Active') || body.includes('Current') ||
                               body.includes('Starter') || body.includes('Pro') ||
                               body.includes('Business') || body.includes('Enterprise') ||
                               body.includes('Free') || body.includes('Trial');
        if (!hasChoosePlan && !hasCurrentPlan) {
          throw new Error('Subscription page shows neither plan selection nor current plan. Body: ' + body.slice(0, 300));
        }
        return { hasChoosePlan, hasCurrentPlan };

  # ── 验证页面有可操作的按钮 ───────────────────────────────────
  - id: verify-subscription-has-buttons
    action: browser.execute
    params:
      script: |
        const buttons = document.querySelectorAll('button');
        if (buttons.length === 0) throw new Error('No buttons found on Subscription page');
        return { buttonCount: buttons.length };

  - id: log-success
    action: log
    params:
      message: "Subscription 深度验证通过！Credit Balance 卡片存在，套餐信息正确显示。"
