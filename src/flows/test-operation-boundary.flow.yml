            check: function(a) { var l = a.toLowerCase(); return (l.includes('product') || l.includes('inventory') || l.includes('stock') || l.includes('highest')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-03', category: 'SA', q: 'How many orders were placed this week?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('order') || /\d+/.test(a)) && !l.includes('hashtag') ? 'PASS' : 'FAIL'; } },
          { id: 'SA-04', category: 'SA', q: 'What is the total revenue from fulfilled orders this month?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('revenue') || l.includes('fulfilled') || l.includes('order') || l.includes('total') || /\$[\d,]+/.test(a)) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-05', category: 'SA', q: 'Show me all orders that are currently pending fulfillment',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('pending') || l.includes('order') || l.includes('fulfillment')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-06', category: 'SA', q: 'Which products have zero inventory?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('zero') || l.includes('out of stock') || l.includes('inventory') || l.includes('product')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-07', category: 'SA', q: "What's the average order value this month?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('average') || l.includes('aov') || l.includes('order value') || /\$[\d.]+/.test(a)) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-08', category: 'SA', q: 'List all products added to the store in the last 30 days',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('product') || l.includes('new') || l.includes('added') || l.includes('recent')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-09', category: 'SA', q: 'How many customers have placed more than 3 orders?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('customer') || l.includes('order') || /\d+/.test(a)) && !l.includes('instagram') ? 'PASS' : 'FAIL'; } },
          { id: 'SA-10', category: 'SA', q: 'What was the best selling product last month?',
