          { id: 'SA-11', category: 'SA', q: 'Who are my top 5 customers by total spend?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('customer') || l.includes('top') || l.includes('spend') || l.includes('total') || /\$[\d,]+/.test(a)) && !l.includes('instagram') ? 'PASS' : 'FAIL'; } },
          { id: 'SA-12', category: 'SA', q: 'Which product has the highest number of returns?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('return') || l.includes('product') || l.includes('refund') || l.includes('most')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-13', category: 'SA', q: 'Show me products that have had zero sales this month',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('zero') || l.includes('no sale') || l.includes('product') || l.includes('0 sale') || l.includes('not sold')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-14', category: 'SA', q: 'How many store locations do I have set up in my account?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('location') || /\d+/.test(a) || l.includes('store') || l.includes('warehouse')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-15', category: 'SA', q: 'How many new customers registered in the last 7 days?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('customer') || /\d+/.test(a) || l.includes('new') || l.includes('register') || l.includes('7 day')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-16', category: 'SA', q: 'How many orders are currently pending payment?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('pending') || l.includes('payment') || l.includes('order') || /\d+/.test(a)) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-17', category: 'SA', q: 'What is the total value of my current inventory?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('inventory') || l.includes('value') || l.includes('total') || /\$[\d,]+/.test(a)) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-18', category: 'SA', q: 'Which products are currently on sale or have an active discount?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('sale') || l.includes('discount') || l.includes('product') || l.includes('price') || l.includes('promotion')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-19', category: 'SA', q: 'How many orders were fulfilled successfully last week?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('fulfilled') || l.includes('order') || /\d+/.test(a) || l.includes('complete') || l.includes('last week')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-20', category: 'SA', q: 'What is the total number of unique customers who have ever placed an order?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('customer') || /\d+/.test(a) || l.includes('unique') || l.includes('total')) && !l.includes('hashtag') ? 'PASS' : 'FAIL'; } }
        ];
        return window.__runBatch(tests);
    continueOnError: true
    output: saResults

  - id: save-sa
