              var wroteCalendar = (l.includes('monday') || l.includes('week') || l.includes('content plan')) && a.length > 150 && !redirected;
              return wroteCalendar ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-19', category: 'CD', q: 'What type of video content should I post on YouTube for my brand?',
            check: function(a) {
              var l = a.toLowerCase();
