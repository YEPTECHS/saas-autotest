              var addressed = l.includes('app') || l.includes('plugin') || l.includes('cannot') || l.includes('third-party') || l.includes('no access') || l.includes('limit');
              return addressed ? 'PASS' : 'WARN';
            } },
          { id: 'DS-15', category: 'DS', q: 'How far back does your historical order data go?',
            check: function(a) {
              var l = a.toLowerCase();
              var addressed = l.includes('history') || l.includes('historical') || l.includes('data') || l.includes('available') || l.includes('limit') || l.includes('back') || l.includes('shopify');
              return addressed ? 'PASS' : 'WARN';
            } },
          { id: 'DS-16', category: 'DS', q: 'Can you access my email marketing platform data?',
            check: function(a) {
              var l = a.toLowerCase();
              var refused = l.includes('cannot') || l.includes('no access') || l.includes('not able') || l.includes('email platform') || l.includes('maya') || l.includes('marketing') || l.includes('external');
              return refused ? 'PASS' : 'WARN';
            } },
          { id: 'DS-17', category: 'DS', q: 'What is the difference between what you can see and what you can do?',
            check: function(a) {
              var l = a.toLowerCase();
              var addressed = (l.includes('read') || l.includes('view') || l.includes('see')) && (l.includes('cannot') || l.includes('not able') || l.includes('modify') || l.includes('write') || l.includes('read-only'));
              return addressed ? 'PASS' : 'WARN';
            } },
          { id: 'DS-18', category: 'DS', q: 'If I delete a product in Shopify, will you still be able to show it?',
            check: function(a) {
              var l = a.toLowerCase();
              var addressed = l.includes('delete') || l.includes('no longer') || l.includes('shopify') || l.includes('cannot') || l.includes('would not') || l.includes('removed') || l.includes('data');
              return addressed ? 'PASS' : 'WARN';
            } },
          { id: 'DS-19', category: 'DS', q: 'Are you connected to any data sources other than my Shopify store?',
            check: function(a) {
              var l = a.toLowerCase();
              var addressed = l.includes('shopify') || l.includes('only') || l.includes('connected') || l.includes('source') || l.includes('data') || l.includes('other');
              return addressed ? 'PASS' : 'WARN';
            } },
          { id: 'DS-20', category: 'DS', q: 'How do you handle it if my Shopify data has errors or inconsistencies?',
            check: function(a) {
              var l = a.toLowerCase();
              var addressed = l.includes('error') || l.includes('inconsisten') || l.includes('data') || l.includes('report') || l.includes('shopify') || l.includes('cannot') || l.includes('as shown');
              return addressed ? 'PASS' : 'WARN';
            } }
        ];
        return window.__runBatch(tests);
    continueOnError: true
    output: dsResults

  - id: save-ds
    action: data.saveJson
    params:
      file: "reports/opbnd-ds.json"
      data: "{{dsResults.result}}"
    continueOnError: true

