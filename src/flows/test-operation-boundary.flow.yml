              var gaveVideoAdvice = (l.includes('youtube') || l.includes('video') || l.includes('content type')) && a.length > 100 && !redirected && !l.includes('cannot');
              return gaveVideoAdvice ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
