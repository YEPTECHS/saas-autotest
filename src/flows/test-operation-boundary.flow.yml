        if (!window.__runBatch) {
          window.__bndReport = window.__bndReport || [];
          window.__lastAI = function() {
            var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]'));
            for (var i = bubbles.length - 1; i >= 0; i--) {
              var cls = bubbles[i].className || '';
              if (!cls.includes('purple') && !cls.includes('bg-purple')) {
                var t = bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim();
                if (t.length > 10) return t;
              }
            }
            return '';
          };
          window.__aiSnapshots = function() {
            return Array.from(document.querySelectorAll('[class*="rounded-2xl"]')).filter(function(b) { return !b.className.includes('purple'); }).map(function(b) { return b.textContent.trim().substring(0, 60); });
          };
          window.__waitReply = function(snapBefore) { return new Promise(function(resolve) { setTimeout(function() { var tries=0; var t=setInterval(function() { tries++; var cur=window.__aiSnapshots(); var hasNew=cur.some(function(s){return s.length>10&&snapBefore.indexOf(s)===-1;}); if(hasNew||tries>120){clearInterval(t);setTimeout(resolve,2000);} },500); },3000); }); };
          window.__waitSendReady = function(maxSec) { return new Promise(function(resolve) { var maxT=(maxSec||60)*2; var tries=0; var t=setInterval(function() { tries++; var ta=document.querySelector('textarea[placeholder*="Message"]'); if(!ta){if(tries>=maxT){clearInterval(t);resolve(false);}return;} var container=ta.parentElement; var btn=container?container.querySelector('button'):null; if(!btn&&container&&container.parentElement)btn=container.parentElement.querySelector('button'); var ok=btn&&!btn.disabled&&btn.offsetParent!==null; if(ok||tries>=maxT){clearInterval(t);resolve(!!ok);} },500); }); };
          window.__clickSend = function() { var inp=document.querySelector('textarea[placeholder*="Message"]'); if(!inp)return false; var btn=inp.parentElement.querySelector('button')||Array.from(document.querySelectorAll('button')).find(function(b){return b.offsetParent!==null&&!b.disabled;})||Array.from(document.querySelectorAll('button')).pop(); if(btn){btn.click();return true;}return false; };
          window.__fill = function(text) { var inp=document.querySelector('textarea[placeholder*="Message"]'); if(!inp)return false; try{Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype,'value').set.call(inp,text);}catch(e){inp.value=text;} inp.dispatchEvent(new Event('input',{bubbles:true})); inp.dispatchEvent(new Event('change',{bubbles:true})); return true; };
          window.__runBatch = function(tests) { var results=[]; var chain=Promise.resolve(); tests.forEach(function(test) { chain=chain.then(function() { return window.__waitSendReady(60).then(function() { var snap=window.__aiSnapshots(); window.__fill(test.q); window.__clickSend(); return window.__waitReply(snap); }).then(function() { var a=window.__lastAI(); var status=test.check(a); results.push({id:test.id,category:test.category,q:test.q.substring(0,100),a:a.substring(0,300),status:status}); window.__bndReport.push({type:test.category,question:'['+test.id+'] '+test.q,answer:a.substring(0,300),status:status}); return {id:test.id,status:status}; }); }); }); return chain.then(function(){return results;}); };
          console.log('[pre-cd] helpers reinstalled');
        }
        return true;
    continueOnError: true

  # ════════════════════════════════════════════════════════
