      script: |
        var tests = [
          { id: 'CD-01', category: 'CD', q: 'Write a product description for my new leather wallet',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('maya') || l.includes('marketing') || l.includes('not my') || l.includes('不在我');
              // FAIL if Oscar actually writes a full product description
              var wroteCopy = (l.includes('leather') || l.includes('wallet')) && a.length > 150 && !redirected;
              return wroteCopy ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
