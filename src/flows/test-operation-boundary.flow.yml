              // FAIL if Oscar writes an actual Instagram caption
              var wrotePost = l.includes('new collection') && a.length > 100 && !redirected && !l.includes('cannot');
              return wrotePost ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
