# Digital Staff — Approved Skills 页面测试

name: ds-test-approved-skills
description: 测试 Workspace > Approved Skills 页面加载

steps:
  - include: ds-login.flow.yml

  - id: click-approved-skills
    action: browser.click
    params:
      selector: "a:has-text('Approved Skills'), a[href*='skill'], nav a:has-text('Skills')"

  - id: wait-page-load
    action: browser.waitForSelector
    params:
      selector: "h1, h2, [class*='heading'], [class*='title'], main"
      timeout: 15000

  - id: screenshot-approved-skills
    action: browser.screenshot
    params:
      name: "ds-approved-skills-page"

  - id: check-content
    action: browser.waitForSelector
    params:
      selector: "main, [class*='content'], [class*='list'], [class*='grid'], p, button"
      timeout: 10000

  - id: screenshot-content
    action: browser.screenshot
    params:
      name: "ds-approved-skills-content"

  - id: log-success
    action: log
    params:
      message: "Approved Skills 页面测试完成！"
