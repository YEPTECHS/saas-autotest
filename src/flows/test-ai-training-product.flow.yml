# YepAI Product Training Page Comprehensive Test
# Tests ALL functionality based on ProductTrainingPage.tsx

name: test-ai-training-product
description: Comprehensive test for Product Training - header, search, collections, products, pagination

steps:
  - include: _shared/login.steps.yml

  # ========================================
  # NAVIGATE TO PRODUCT TRAINING PAGE
  # ========================================

  - id: log-start
    action: log
    params:
      message: "=== Starting Product Training Comprehensive Test ==="

  - id: navigate-product
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-training/product"
      waitUntil: "domcontentloaded"

  - id: wait-page-load
    action: browser.waitForSelector
    params:
      selector: "main"
      timeout: 30000

  - id: wait-content-load
    action: wait
    params:
      ms: 3000

  # ========================================
  # TEST 1: HEADER ELEMENTS
  # ========================================

  - id: log-test-header
    action: log
    params:
      message: "--- TEST 1: Header Elements ---"

  # 1.1 Product Count Display
  - id: verify-product-count
    action: browser.execute
    params:
      script: |
        // Look for product count text (e.g., "123 products")
        const allElements = Array.from(document.querySelectorAll('span, div, p, h1, h2, h3'));
        const countElement = allElements.find(el => {
          const text = el.textContent || '';
          return text.match(/\d+\s*(products?|items?)/i) || text.includes('active products');
        });
        console.log('[TEST] Product count element:', countElement?.textContent);
        return { found: !!countElement, text: countElement?.textContent || '' };

  # 1.2 Select All Checkbox
  - id: verify-select-all-checkbox
    action: browser.execute
    params:
      script: |
        // Find the Select All checkbox - it's typically the first checkbox with "Select All" label nearby
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const labels = Array.from(document.querySelectorAll('label, span'));
        const selectAllLabel = labels.find(el => el.textContent?.toLowerCase().includes('select all'));
        const hasSelectAll = !!selectAllLabel || checkboxes.length > 0;
        console.log('[TEST] Select All checkbox found:', hasSelectAll, 'Checkboxes count:', checkboxes.length);
        return { found: hasSelectAll, checkboxCount: checkboxes.length };

  # 1.3 Sync/Train Now Button
  - id: verify-sync-button
    action: browser.execute
    params:
      script: |
        const buttons = Array.from(document.querySelectorAll('button'));
        const syncBtn = buttons.find(b => {
          const text = b.textContent?.toLowerCase() || '';
          return text.includes('sync') || text.includes('train') || text.includes('save');
        });
        console.log('[TEST] Sync/Train button:', syncBtn?.textContent);
        return { found: !!syncBtn, text: syncBtn?.textContent || '' };

  - id: screenshot-header
    action: browser.screenshot
    params:
      name: "product-training-01-header"

  # ========================================
  # TEST 2: GLOBAL SEARCH FUNCTIONALITY
  # ========================================

  - id: log-test-search
    action: log
    params:
      message: "--- TEST 2: Global Search Functionality ---"

  # 2.1 Search Input Exists
  - id: verify-search-input
    action: browser.execute
    params:
      script: |
        const searchInput = document.querySelector('input[type="text"], input[type="search"], input[placeholder*="search" i], input[placeholder*="Search" i]');
        console.log('[TEST] Search input found:', !!searchInput, 'Placeholder:', searchInput?.placeholder);
        return { found: !!searchInput, placeholder: searchInput?.placeholder || '' };

  # 2.2 Click on Search Input
  - id: focus-search-input
    action: browser.execute
    params:
      script: |
        const searchInput = document.querySelector('input[type="text"], input[type="search"], input[placeholder*="search" i]');
        if (searchInput) {
          searchInput.focus();
          searchInput.click();
          return true;
        }
        return false;
    continueOnError: true

  # 2.3 Type Search Query
  - id: type-search-query
    action: browser.execute
    params:
      script: |
        const searchInput = document.querySelector('input[type="text"], input[type="search"], input[placeholder*="search" i]');
        if (searchInput) {
          searchInput.value = 'test';
          searchInput.dispatchEvent(new Event('input', { bubbles: true }));
          return true;
        }
        return false;
    continueOnError: true

  - id: wait-search-results
    action: wait
    params:
      ms: 1500

  # 2.4 Verify Search Results Dropdown (if any)
  - id: verify-search-dropdown
    action: browser.execute
    params:
      script: |
        // Check for search results dropdown
        const dropdown = document.querySelector('[class*="dropdown"], [class*="search-results"], [class*="absolute"][class*="z-"]');
        const hasResults = !!dropdown && dropdown.children.length > 0;
        console.log('[TEST] Search dropdown found:', hasResults);
        return { found: hasResults };
    continueOnError: true

  # 2.5 Clear Search
  - id: clear-search
    action: browser.execute
    params:
      script: |
        const searchInput = document.querySelector('input[type="text"], input[type="search"], input[placeholder*="search" i]');
        if (searchInput) {
          searchInput.value = '';
          searchInput.dispatchEvent(new Event('input', { bubbles: true }));
          return true;
        }
        return false;
    continueOnError: true

  - id: screenshot-search
    action: browser.screenshot
    params:
      name: "product-training-02-search"

  # ========================================
  # TEST 3: COLLECTIONS DISPLAY
  # ========================================

  - id: log-test-collections
    action: log
    params:
      message: "--- TEST 3: Collections Display ---"

  # 3.1 Collection Cards Exist
  - id: verify-collection-cards
    action: browser.execute
    params:
      script: |
        // Collections are rendered as Cards with CardBody
        const cards = document.querySelectorAll('[class*="card"], [class*="Card"]');
        const collectionHeaders = document.querySelectorAll('[data-collection-name], [class*="collection"]');
        console.log('[TEST] Collection cards found:', cards.length, 'Headers:', collectionHeaders.length);
        return { cardCount: cards.length, headerCount: collectionHeaders.length };

  # 3.2 Collection Checkboxes
  - id: verify-collection-checkboxes
    action: browser.execute
    params:
      script: |
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        console.log('[TEST] Collection checkboxes found:', checkboxes.length);
        return { count: checkboxes.length };

  # 3.3 Collection Names and Product Counts
  - id: verify-collection-info
    action: browser.execute
    params:
      script: |
        // Find collection names (h3 elements) and product counts
        const h3Elements = document.querySelectorAll('h3');
        const productCounts = Array.from(document.querySelectorAll('span, div')).filter(el =>
          el.textContent?.match(/\d+\s*products?\s*available/i)
        );
        console.log('[TEST] Collection names found:', h3Elements.length, 'Product counts:', productCounts.length);

        // Get first 3 collection names
        const names = Array.from(h3Elements).slice(0, 3).map(h => h.textContent?.trim());
        console.log('[TEST] Collection names:', names);

        return { nameCount: h3Elements.length, countElements: productCounts.length, names: names };

  # 3.4 Expand/Collapse Buttons (Chevron Icons)
  - id: verify-expand-buttons
    action: browser.execute
    params:
      script: |
        // Look for chevron icons or expand buttons
        const chevrons = document.querySelectorAll('[class*="chevron"], [class*="Chevron"], button svg');
        const expandButtons = document.querySelectorAll('button');
        console.log('[TEST] Chevron icons:', chevrons.length, 'Buttons:', expandButtons.length);
        return { chevronCount: chevrons.length, buttonCount: expandButtons.length };

  - id: screenshot-collections
    action: browser.screenshot
    params:
      name: "product-training-03-collections"

  # ========================================
  # TEST 4: COLLECTION EXPAND/COLLAPSE
  # ========================================

  - id: log-test-expand
    action: log
    params:
      message: "--- TEST 4: Collection Expand/Collapse ---"

  # 4.1 Find and Click First Expandable Collection
  - id: expand-first-collection
    action: browser.execute
    params:
      script: |
        // Find a collection header with products (not 0 products)
        const cards = document.querySelectorAll('[class*="CardBody"], [class*="card-body"]');
        let expanded = false;

        for (const card of cards) {
          const productCountText = card.textContent || '';
          // Skip collections with 0 products
          if (productCountText.includes('0 products')) continue;

          // Find the expand button (usually has chevron)
          const expandBtn = card.querySelector('button');
          if (expandBtn) {
            expandBtn.click();
            expanded = true;
            console.log('[TEST] Clicked expand button for collection');
            break;
          }
        }

        if (!expanded) {
          // Fallback: click any button that might be expand
          const allButtons = Array.from(document.querySelectorAll('button'));
          const expandBtn = allButtons.find(b => b.querySelector('svg[class*="chevron" i]') || b.querySelector('[class*="Chevron"]'));
          if (expandBtn) {
            expandBtn.click();
            expanded = true;
          }
        }

        return { expanded };
    continueOnError: true

  - id: wait-expand
    action: wait
    params:
      ms: 2000

  # 4.2 Verify Products Loaded After Expand
  - id: verify-products-loaded
    action: browser.execute
    params:
      script: |
        // Check if products are now visible
        const productItems = document.querySelectorAll('[class*="product"], img[class*="object-cover"]');
        const productCheckboxes = document.querySelectorAll('input[type="checkbox"]');
        console.log('[TEST] Product items visible:', productItems.length, 'Checkboxes:', productCheckboxes.length);
        return { productCount: productItems.length, checkboxCount: productCheckboxes.length };
    continueOnError: true

  - id: screenshot-expanded
    action: browser.screenshot
    params:
      name: "product-training-04-expanded"

  # ========================================
  # TEST 5: PRODUCT ITEMS
  # ========================================

  - id: log-test-products
    action: log
    params:
      message: "--- TEST 5: Product Items ---"

  # 5.1 Product Images
  - id: verify-product-images
    action: browser.execute
    params:
      script: |
        const images = document.querySelectorAll('img[class*="object-cover"], img[alt]');
        console.log('[TEST] Product images found:', images.length);
        return { imageCount: images.length };
    continueOnError: true

  # 5.2 Product Names and Descriptions
  - id: verify-product-info
    action: browser.execute
    params:
      script: |
        // Product names are typically h4 elements
        const productNames = document.querySelectorAll('h4[class*="font-semibold"]');
        const descriptions = document.querySelectorAll('p[class*="text-gray-600"]');
        console.log('[TEST] Product names:', productNames.length, 'Descriptions:', descriptions.length);
        return { nameCount: productNames.length, descCount: descriptions.length };
    continueOnError: true

  # 5.3 Product Tags
  - id: verify-product-tags
    action: browser.execute
    params:
      script: |
        // Tags are rendered as spans with rounded-full class
        const tags = document.querySelectorAll('span[class*="rounded-full"]');
        console.log('[TEST] Product tags found:', tags.length);

        // Get sample tag texts
        const tagTexts = Array.from(tags).slice(0, 5).map(t => t.textContent?.trim());
        console.log('[TEST] Sample tags:', tagTexts);

        return { tagCount: tags.length, samples: tagTexts };
    continueOnError: true

  # 5.4 Product Checkboxes
  - id: verify-product-checkboxes
    action: browser.execute
    params:
      script: |
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
        console.log('[TEST] Product checkboxes:', checkboxes.length, 'Checked:', checkedCount);
        return { total: checkboxes.length, checked: checkedCount };
    continueOnError: true

  - id: screenshot-products
    action: browser.screenshot
    params:
      name: "product-training-05-products"

  # ========================================
  # TEST 6: PRODUCT SELECTION
  # ========================================

  - id: log-test-selection
    action: log
    params:
      message: "--- TEST 6: Product Selection ---"

  # 6.1 Toggle First Product Checkbox
  - id: toggle-product-checkbox
    action: browser.execute
    params:
      script: |
        // Find all checkboxes and skip the first one (which is likely Select All or Collection checkbox)
        const checkboxes = Array.from(document.querySelectorAll('input[type="checkbox"]'));
        if (checkboxes.length > 2) {
          const productCheckbox = checkboxes[2]; // Third checkbox should be a product
          const wasChecked = productCheckbox.checked;
          productCheckbox.click();
          console.log('[TEST] Toggled product checkbox. Was checked:', wasChecked, 'Now:', productCheckbox.checked);
          return { toggled: true, wasChecked, nowChecked: productCheckbox.checked };
        }
        return { toggled: false };
    continueOnError: true

  - id: wait-selection-update
    action: wait
    params:
      ms: 500

  # 6.2 Verify Selection State Changed
  - id: verify-selection-change
    action: browser.execute
    params:
      script: |
        // Check for status tags that indicate selection
        const selectedTags = document.querySelectorAll('span[class*="purple"]');
        const trainedTags = document.querySelectorAll('span[class*="green"]');
        console.log('[TEST] Selected tags:', selectedTags.length, 'Trained tags:', trainedTags.length);
        return { selectedCount: selectedTags.length, trainedCount: trainedTags.length };
    continueOnError: true

  - id: screenshot-selection
    action: browser.screenshot
    params:
      name: "product-training-06-selection"

  # ========================================
  # TEST 7: COLLECTION CHECKBOX (SELECT ALL IN CATEGORY)
  # ========================================

  - id: log-test-collection-checkbox
    action: log
    params:
      message: "--- TEST 7: Collection Checkbox ---"

  # 7.1 Find and Toggle Collection Checkbox
  - id: toggle-collection-checkbox
    action: browser.execute
    params:
      script: |
        // First checkbox in a collection header should be the "select all in collection" checkbox
        const cardBodies = document.querySelectorAll('[class*="CardBody"], [class*="card-body"]');
        for (const card of cardBodies) {
          const checkbox = card.querySelector('input[type="checkbox"]');
          if (checkbox) {
            const wasChecked = checkbox.checked;
            checkbox.click();
            console.log('[TEST] Toggled collection checkbox. Was:', wasChecked, 'Now:', checkbox.checked);
            return { toggled: true, wasChecked, nowChecked: checkbox.checked };
          }
        }
        return { toggled: false };
    continueOnError: true

  - id: wait-collection-toggle
    action: wait
    params:
      ms: 500

  - id: screenshot-collection-toggle
    action: browser.screenshot
    params:
      name: "product-training-07-collection-toggle"

  # ========================================
  # TEST 8: PRODUCTS PAGINATION
  # ========================================

  - id: log-test-product-pagination
    action: log
    params:
      message: "--- TEST 8: Products Pagination ---"

  # 8.1 Check for Pagination Buttons
  - id: verify-pagination-buttons
    action: browser.execute
    params:
      script: |
        const buttons = Array.from(document.querySelectorAll('button'));
        const prevBtn = buttons.find(b => b.textContent?.toLowerCase().includes('previous'));
        const nextBtn = buttons.find(b => b.textContent?.toLowerCase().includes('next'));
        const pageIndicator = document.querySelector('[class*="bg-purple-600"][class*="rounded-full"]');

        console.log('[TEST] Prev button:', !!prevBtn, 'Next button:', !!nextBtn, 'Page indicator:', !!pageIndicator);
        return {
          hasPrevious: !!prevBtn,
          hasNext: !!nextBtn,
          hasPageIndicator: !!pageIndicator,
          prevDisabled: prevBtn?.disabled,
          nextDisabled: nextBtn?.disabled
        };
    continueOnError: true

  # 8.2 Click Next Page (if available)
  - id: click-next-page
    action: browser.execute
    params:
      script: |
        const buttons = Array.from(document.querySelectorAll('button'));
        const nextBtn = buttons.find(b => b.textContent?.toLowerCase().includes('next') && !b.disabled);
        if (nextBtn) {
          nextBtn.click();
          console.log('[TEST] Clicked Next button');
          return { clicked: true };
        }
        return { clicked: false };
    continueOnError: true

  - id: wait-pagination
    action: wait
    params:
      ms: 2000

  - id: screenshot-pagination
    action: browser.screenshot
    params:
      name: "product-training-08-pagination"

  # ========================================
  # TEST 9: COLLECTION PAGINATION
  # ========================================

  - id: log-test-collection-pagination
    action: log
    params:
      message: "--- TEST 9: Collection Pagination ---"

  # 9.1 Scroll to Bottom to Find Collection Pagination
  - id: scroll-to-bottom
    action: browser.execute
    params:
      script: |
        window.scrollTo(0, document.body.scrollHeight);
        return true;

  - id: wait-scroll
    action: wait
    params:
      ms: 1000

  # 9.2 Check for Collection Pagination
  - id: verify-collection-pagination
    action: browser.execute
    params:
      script: |
        // Collection pagination is at the bottom of the page
        const buttons = Array.from(document.querySelectorAll('button'));
        const paginationButtons = buttons.filter(b => {
          const text = b.textContent?.toLowerCase() || '';
          return text.includes('previous') || text.includes('next');
        });
        console.log('[TEST] Collection pagination buttons found:', paginationButtons.length);
        return { buttonCount: paginationButtons.length };
    continueOnError: true

  - id: screenshot-collection-pagination
    action: browser.screenshot
    params:
      name: "product-training-09-collection-pagination"

  # ========================================
  # TEST 10: SELECT ALL CHECKBOX
  # ========================================

  - id: log-test-select-all
    action: log
    params:
      message: "--- TEST 10: Select All Checkbox ---"

  # 10.1 Scroll Back to Top
  - id: scroll-to-top
    action: browser.execute
    params:
      script: |
        window.scrollTo(0, 0);
        return true;

  - id: wait-scroll-top
    action: wait
    params:
      ms: 500

  # 10.2 Find and Toggle Select All Checkbox
  - id: find-select-all
    action: browser.execute
    params:
      script: |
        // Select All is typically the first checkbox or near "Select All" text
        const labels = Array.from(document.querySelectorAll('label, span, div'));
        const selectAllLabel = labels.find(el => el.textContent?.toLowerCase().includes('select all'));

        if (selectAllLabel) {
          // Find nearby checkbox
          const nearbyCheckbox = selectAllLabel.querySelector('input[type="checkbox"]') ||
                                selectAllLabel.parentElement?.querySelector('input[type="checkbox"]');
          if (nearbyCheckbox) {
            console.log('[TEST] Found Select All checkbox near label');
            return { found: true, checked: nearbyCheckbox.checked };
          }
        }

        // Fallback: first checkbox might be Select All
        const firstCheckbox = document.querySelector('input[type="checkbox"]');
        console.log('[TEST] Using first checkbox as Select All');
        return { found: !!firstCheckbox, checked: firstCheckbox?.checked };
    continueOnError: true

  - id: screenshot-select-all
    action: browser.screenshot
    params:
      name: "product-training-10-select-all"

  # ========================================
  # TEST 11: LOADING STATES (SKELETON)
  # ========================================

  - id: log-test-loading
    action: log
    params:
      message: "--- TEST 11: Loading States ---"

  # 11.1 Check for Skeleton Loaders
  - id: verify-skeleton-elements
    action: browser.execute
    params:
      script: |
        // Skeleton loaders typically have animate-pulse class
        const skeletons = document.querySelectorAll('[class*="skeleton"], [class*="animate-pulse"]');
        console.log('[TEST] Skeleton elements found:', skeletons.length);
        return { skeletonCount: skeletons.length };
    continueOnError: true

  # ========================================
  # TEST 12: RESPONSIVE DESIGN
  # ========================================

  - id: log-test-responsive
    action: log
    params:
      message: "--- TEST 12: Responsive Design ---"

  # 12.1 Check for Mobile Layout Elements
  - id: verify-responsive
    action: browser.execute
    params:
      script: |
        // Check for responsive classes
        const hiddenMd = document.querySelectorAll('[class*="hidden md:"], [class*="md:hidden"]');
        const mobileElements = document.querySelectorAll('[class*="md:flex"], [class*="flex-col"]');
        console.log('[TEST] Responsive elements - Hidden on desktop:', hiddenMd.length, 'Flex elements:', mobileElements.length);
        return { hiddenMdCount: hiddenMd.length, mobileCount: mobileElements.length };
    continueOnError: true

  # ========================================
  # FINAL SCREENSHOT
  # ========================================

  - id: screenshot-final
    action: browser.screenshot
    params:
      name: "product-training-final"

  - id: log-complete
    action: log
    params:
      message: "=== Product Training Comprehensive Test Completed ==="
