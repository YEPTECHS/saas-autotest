          function getAISnapshots() { return Array.from(document.querySelectorAll('[class*="rounded-2xl"]')).filter(function(b) { return !b.className.includes('purple') && !b.className.includes('bg-purple'); }).map(function(b) { return b.textContent.trim().substring(0, 80); }); }
