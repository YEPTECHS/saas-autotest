  # ── Refresh session before CC ──
  - id: refresh-for-cc
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/dashboard"
      waitUntil: "networkidle"
  - id: wait-cc-dash
    action: wait
    params:
      ms: 2000
  - id: nav-cc
    action: browser.navigate
    params:
