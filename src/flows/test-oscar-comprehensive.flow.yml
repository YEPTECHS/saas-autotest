          var dim = 'RV';
          console.log('[' + dim + '] Starting 30 questions');
          for (var i = 0; i < questions.length; i++) {
            var testId = dim + '-' + (i + 1).toString().padStart(2, '0');
            await waitSendReady(); var snap = getAISnapshots(); var startTime = Date.now();
            fillAndSend(questions[i]); await waitForNewReply(snap);
            var answer = getLastAI(); var duration = Date.now() - startTime;
            window.__compReport.push({ id: testId, question: questions[i], answer: answer.substring(0, 300), duration: duration, timestamp: new Date().toISOString() });
            console.log('[' + testId + '] ' + duration + 'ms | ' + answer.substring(0, 60));
          }
          console.log('[' + dim + '] Done'); return { dim: dim, count: questions.length };
        })();
    continueOnError: true

  # ── Refresh session before NT ──
  - id: refresh-for-nt
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/dashboard"
      waitUntil: "networkidle"
  - id: wait-nt-dash
    action: wait
    params:
      ms: 2000
  - id: nav-nt
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/operation/chat"
      waitUntil: "networkidle"
  - id: wait-nt-load
    action: wait
    params:
      ms: 3000

  # ── DIMENSION: NT — with real tone validation ──
  - id: run-nt
    action: browser.execute
    params:
      script: |
        (async function() {
          var tests = [
            { q: "What's my current status?", check: function(a) { return a.length > 10 ? 'PASS' : 'FAIL — no response'; } },
            { q: "I need numbers, not paragraphs", check: function(a) { var numbers = (a.match(/\d+/g) || []).length; var words = a.split(/\s+/).length; return numbers >= 2 && words < 300 ? 'PASS' : 'FAIL — too wordy or no numbers'; } },
            { q: "Just the facts, please", check: function(a) { var l = a.toLowerCase(); var filler = (l.match(/\b(certainly|absolutely|of course|great question|happy to)\b/g) || []).length; return filler <= 1 ? 'PASS' : 'FAIL — too much fluff (' + filler + ' filler phrases)'; } },
            { q: "Can you prioritize by urgency?", check: function(a) { var l = a.toLowerCase(); var priority = l.includes('urgent') || l.includes('critical') || l.includes('high') || l.includes('priority') || l.includes('first') || l.includes('1.') || l.includes('immediately'); return priority ? 'PASS' : 'FAIL — no prioritization language'; } },
            { q: "Give me a quick update on inventory", check: function(a) { return a.length < 1500 ? 'PASS' : 'FAIL — too long for quick update (' + a.length + ' chars)'; } },
            { q: "What do I need to fix TODAY?", check: function(a) { var l = a.toLowerCase(); var actionable = l.includes('need') || l.includes('should') || l.includes('fix') || l.includes('address') || l.includes('recommend') || l.includes('action'); return actionable ? 'PASS' : 'FAIL — not actionable'; } },
            { q: "Make it concise—one page maximum", check: function(a) { return a.length < 2000 ? 'PASS' : 'FAIL — exceeds one page (' + a.length + ' chars)'; } },
            { q: "I don't need full details, just the summary", check: function(a) { return a.length < 1200 ? 'PASS' : 'FAIL — not a summary (' + a.length + ' chars)'; } },
            { q: "What are my top 3 things to handle now?", check: function(a) { var items = (a.match(/\b[1-3]\b|[-•●▸]\s|first|second|third/gi) || []).length; return items >= 2 ? 'PASS' : 'FAIL — doesn\'t list top 3 items'; } },
            { q: "Can you break this down by region?", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL — no response'; } },
            { q: "Use short bullets, not sentences", check: function(a) { var bullets = (a.match(/[-•●▸>]\s|^\d+\./gm) || []).length; return bullets >= 3 ? 'PASS' : 'FAIL — no bullet structure (' + bullets + ' found)'; } },
            { q: "What's the most critical issue right now?", check: function(a) { var l = a.toLowerCase(); var critical = l.includes('critical') || l.includes('urgent') || l.includes('important') || l.includes('priority') || l.includes('main'); return critical ? 'PASS' : 'WARN — no criticality indicator'; } },
            { q: "Give me data I can use in a meeting", check: function(a) { var hasStructure = a.includes(':') || a.includes('-') || a.includes('•') || a.includes('|') || (a.match(/\n/g) || []).length >= 2; return hasStructure ? 'PASS' : 'FAIL — not meeting-ready format'; } },
            { q: "I need this in a report format", check: function(a) { var hasStructure = (a.match(/\n/g) || []).length >= 3 || a.includes(':') || a.includes('|'); return hasStructure ? 'PASS' : 'FAIL — not report format'; } },
            { q: "What's our forecast looking like?", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "Sort these by importance, not alphabetically", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "Don't include data I already know", check: function(a) { return a.length > 10 ? 'PASS' : 'FAIL'; } },
            { q: "Can you compare this to last month?", check: function(a) { var l = a.toLowerCase(); var comparison = l.includes('last month') || l.includes('compared') || l.includes('previous') || l.includes('vs') || l.includes('change') || l.includes('increase') || l.includes('decrease'); return comparison ? 'PASS' : 'WARN — no comparison language'; } },
            { q: "What changed since yesterday?", check: function(a) { var l = a.toLowerCase(); var change = l.includes('changed') || l.includes('updated') || l.includes('new') || l.includes('since') || l.includes('yesterday'); return change ? 'PASS' : 'WARN — no change indicators'; } },
            { q: "Is this normal or abnormal?", check: function(a) { var l = a.toLowerCase(); var assessment = l.includes('normal') || l.includes('abnormal') || l.includes('unusual') || l.includes('typical') || l.includes('expected') || l.includes('concern'); return assessment ? 'PASS' : 'FAIL — no assessment given'; } },
            { q: "I'm in a meeting—give me the headline only", check: function(a) { var sentences = a.split(/[.!?]+/).filter(function(s) { return s.trim().length > 5; }); return sentences.length <= 3 ? 'PASS' : 'FAIL — too long for headline (' + sentences.length + ' sentences)'; } },
            { q: "What's the risk level here?", check: function(a) { var l = a.toLowerCase(); var risk = l.includes('risk') || l.includes('high') || l.includes('low') || l.includes('medium') || l.includes('critical') || l.includes('concern'); return risk ? 'PASS' : 'FAIL — no risk assessment'; } },
            { q: "Suggest what I should do next", check: function(a) { var l = a.toLowerCase(); var action = l.includes('should') || l.includes('recommend') || l.includes('suggest') || l.includes('next') || l.includes('step') || l.includes('action'); return action ? 'PASS' : 'FAIL — no actionable suggestion'; } },
            { q: "Use emojis to highlight critical items", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "What do I need to escalate?", check: function(a) { var l = a.toLowerCase(); var escalate = l.includes('escalat') || l.includes('attention') || l.includes('urgent') || l.includes('manager') || l.includes('immediate'); return escalate ? 'PASS' : 'WARN — no escalation language'; } }
          ];
          function getAISnapshots() { return Array.from(document.querySelectorAll('[class*="rounded-2xl"]')).filter(function(b) { return !b.className.includes('purple') && !b.className.includes('bg-purple'); }).map(function(b) { return b.textContent.trim().substring(0, 80); }); }
          function getLastAI() { var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]')); for (var i = bubbles.length - 1; i >= 0; i--) { var cls = bubbles[i].className || ''; if (!cls.includes('purple') && !cls.includes('bg-purple')) { var t = bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim(); if (t.length > 10) return t; } } return ''; }
          function waitForNewReply(snap) { return new Promise(function(resolve) { setTimeout(function() { var tries = 0; var t = setInterval(function() { tries++; var cur = getAISnapshots(); var hasNew = cur.length > snap.length || cur.some(function(s) { return s.length > 10 && snap.indexOf(s) === -1; }); if (hasNew || tries > 120) { clearInterval(t); setTimeout(resolve, 2000); } }, 500); }, 3000); }); }
          function waitSendReady() { return new Promise(function(resolve) { var tries = 0; var t = setInterval(function() { tries++; var ta = document.querySelector('textarea[placeholder*="Message"]'); if (!ta) { if (tries >= 120) { clearInterval(t); resolve(false); } return; } var btn = ta.parentElement ? ta.parentElement.querySelector('button') : null; if (!btn && ta.parentElement && ta.parentElement.parentElement) btn = ta.parentElement.parentElement.querySelector('button'); var ok = btn && !btn.disabled && btn.offsetParent !== null; if (ok || tries >= 120) { clearInterval(t); resolve(!!ok); } }, 500); }); }
          function fillAndSend(text) { var inp = document.querySelector('textarea[placeholder*="Message"]'); if (!inp) return false; try { Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, text); } catch(e) { inp.value = text; } inp.dispatchEvent(new Event('input', { bubbles: true })); inp.dispatchEvent(new Event('change', { bubbles: true })); var btn = inp.parentElement.querySelector('button') || Array.from(document.querySelectorAll('button')).find(function(b) { return b.offsetParent !== null && !b.disabled; }); if (btn) { btn.click(); return true; } return false; }
          var dim = 'NT';
          console.log('[' + dim + '] Starting 25 questions — with tone validation');
          for (var i = 0; i < tests.length; i++) {
            var testId = dim + '-' + (i + 1).toString().padStart(2, '0');
            await waitSendReady(); var snap = getAISnapshots(); var startTime = Date.now();
            fillAndSend(tests[i].q); await waitForNewReply(snap);
            var answer = getLastAI(); var duration = Date.now() - startTime;
            var status = tests[i].check(answer);
            window.__compReport.push({ id: testId, question: tests[i].q, answer: answer.substring(0, 300), duration: duration, status: status, timestamp: new Date().toISOString() });
            console.log('[' + testId + '] ' + status + ' | ' + duration + 'ms');
          }
          console.log('[' + dim + '] Done'); return { dim: dim, count: tests.length };
        })();
    continueOnError: true

