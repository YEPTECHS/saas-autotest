# Daniel (SKU Gross Margin Analyst) Chat — Basic Stub Test
# Verifies /ai-team/profit/chat loads.
# Confirmed correct path via browser: bot-test.yepai.io/ai-team/profit/chat

name: test-analytics-chat-basic
description: Stub test for Daniel (SKU Gross Margin Analyst) chat page (/ai-team/profit/chat)

steps:
  # Shared login flow
  - include: _shared/login.steps.yml

  # Navigate to Daniel's profit chat
  - id: navigate-analytics-chat
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/profit/chat"
      waitUntil: "networkidle"

  # Wait for chat interface to load (textarea is the message input)
  - id: wait-chat-ui
    action: browser.waitForSelector
    params:
      selector: "textarea, main, [class*='chat'], h1"
      timeout: 15000

  # Small settle wait for async chat hydration
  - id: wait-settle
    action: wait
    params:
      ms: 2000

  # Screenshot
  - id: screenshot-analytics-chat
    action: browser.screenshot
    params:
      name: "analytics-chat-basic"

  - id: log-success
    action: log
    params:
      message: "Analytics chat (Daniel) stub test completed successfully!"