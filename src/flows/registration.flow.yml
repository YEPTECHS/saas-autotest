# YepAI User Registration Flow - Optimized
# Pre-defined selectors for fast execution

name: user-registration
description: Complete user registration with email verification (optimized)

# Variables are loaded from environment via CLI

# Pre-defined selectors (recorded from actual page)
selectors:
  register:
    firstName: "input[placeholder='Enter your first name']"
    lastName: "input[placeholder='Enter your last name']"
    organization: "input[placeholder='Enter your organization']"
    email: "input[placeholder='Enter your email']"
    password: "input[placeholder][type='password']:first-of-type"
    confirmPassword: "input[placeholder][type='password']:last-of-type"
    submitButton: "button[type='submit']"
  verification:
    codeInputs: "input[type='tel']"
    resendButton: "button:has-text('Resend code')"
  platformSelection:
    shopify: "[class*='platform']:has-text('Shopify')"
    otherPlatforms: "[class*='platform']:has-text('Other')"
    continueButton: "button:has-text('Continue')"

steps:
  # STEP 1: Navigate to base URL first (needed for localStorage access)
  - id: navigate-base
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}"
      waitUntil: "domcontentloaded"

  # STEP 2: Clean environment
  - id: clean-storage
    action: browser.execute
    params:
      script: |
        localStorage.clear();
        sessionStorage.clear();
        document.cookie.split(";").forEach(c => {
          document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
        });
    continueOnError: true

  # STEP 3: Navigate to register page
  - id: navigate-register
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/auth/register"
      waitUntil: "domcontentloaded"

  # STEP 4: Wait for form to be ready (single wait)
  - id: wait-form
    action: browser.waitForSelector
    params:
      selector: "input[placeholder='Enter your first name']"
      timeout: 10000

  # STEP 5-10: Fill fields sequentially (avoid race conditions)
  - id: fill-firstName
    action: form.fillSingle
    params:
      selector: "#firstName"
      value: "{{YEPAI_TEST_FIRST_NAME}}"

  - id: fill-lastName
    action: form.fillSingle
    params:
      selector: "#lastName"
      value: "{{YEPAI_TEST_LAST_NAME}}"

  - id: fill-org
    action: form.fillSingle
    params:
      selector: "#org"
      value: "{{YEPAI_TEST_ORGANIZATION}}"

  - id: fill-email
    action: form.fillSingle
    params:
      selector: "#email"
      value: "{{YEPAI_TEST_EMAIL}}"

  - id: fill-password
    action: form.fillSingle
    params:
      selector: "#password"
      value: "{{YEPAI_TEST_PASSWORD}}"

  - id: fill-confirm-password
    action: form.fillSingle
    params:
      selector: "#confirmPassword"
      value: "{{YEPAI_TEST_PASSWORD}}"

  # STEP 8: Wait for button to be enabled
  - id: wait-button-enabled
    action: browser.waitForSelector
    params:
      selector: "button[type='submit']:not([disabled])"
      timeout: 5000

  # STEP 9: Submit registration
  - id: submit-registration
    action: browser.click
    params:
      selector: "button[type='submit']"
    waitFor: navigation

  # STEP 11: Wait for verification page
  - id: wait-verification-page
    action: browser.waitForSelector
    params:
      selector: "input[type='tel']"
      timeout: 15000

  # ========================================
  # TEST CASE: Wrong Verification Code
  # ========================================

  - id: log-test-wrong-code
    action: log
    params:
      message: "Test Case: Verify error handling for wrong verification code"

  # Fill wrong verification code
  - id: fill-wrong-verification-code
    action: form.fillVerificationCode
    params:
      selector: "input[type='tel']"
      code: "000000"

  # Wait for error message to appear
  - id: wait-error-message
    action: browser.waitForSelector
    params:
      selector: "text=Verification failed"
      timeout: 8000
    continueOnError: true

  # Assert error is visible
  - id: assert-error-visible
    action: assert.visible
    params:
      selector: "text=Verification failed"
    continueOnError: true

  - id: log-error-verified
    action: log
    params:
      message: "Wrong code error verified - proceeding with correct code"

  # Clear the inputs before entering correct code
  - id: clear-verification-inputs
    action: browser.execute
    params:
      script: |
        const inputs = document.querySelectorAll("input[type='tel']");
        inputs.forEach(input => input.value = '');

  - id: wait-after-clear
    action: wait
    params:
      ms: 500

  # STEP 7: Get verification code from Gmail
  - id: get-verification-code
    action: gmail.getVerificationCode
    params:
      to: "{{YEPAI_TEST_EMAIL}}"
      subject: "verification code"
      codePattern: "\\d{6}"
      timeout: 60000
    output: verificationResult

  # STEP 7: Fill verification code (all 6 digits at once)
  - id: fill-verification-code
    action: form.fillVerificationCode
    params:
      selector: "input[type='tel']"
      code: "{{verificationResult.code}}"

  # STEP 8: Wait for redirect to platform selection (desktop layout)
  - id: wait-platform-selection
    action: browser.waitForSelector
    params:
      selector: ".lg\\:flex >> text=Choose Your Platform"
      timeout: 20000

  # ========================================
  # PHASE 2: Platform Selection
  # ========================================

  - id: log-phase2
    action: log
    params:
      message: "Phase 2: Platform Selection"

  # Scroll to ensure element is visible
  - id: scroll-to-platforms
    action: browser.execute
    params:
      script: |
        window.scrollTo(0, document.body.scrollHeight / 2);

  - id: wait-scroll
    action: wait
    params:
      ms: 500

  # Click "Other Platforms" option - target the clickable container
  - id: click-other-platform
    action: browser.execute
    params:
      script: |
        // Find the "Other Platforms" card by looking for its text and clicking the parent
        const cards = document.querySelectorAll('[class*="rounded-3xl"], [class*="rounded-2xl"]');
        for (const card of cards) {
          if (card.textContent.includes('Other Platforms')) {
            card.click();
            break;
          }
        }
        // Alternative: click by role
        const otherOption = document.evaluate("//div[contains(text(),'Other Platforms')]/ancestor::div[contains(@class,'cursor-pointer')]", document, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
        if (otherOption) otherOption.click();

  - id: wait-brief-1
    action: wait
    params:
      ms: 500

  # Click Continue button (find the visible one)
  - id: click-continue-platform
    action: browser.execute
    params:
      script: |
        const buttons = document.querySelectorAll("button");
        for (const btn of buttons) {
          if (btn.textContent.includes('Continue') && btn.offsetParent !== null) {
            btn.click();
            break;
          }
        }

  # Wait for questionnaire page
  - id: wait-questionnaire
    action: browser.waitForUrl
    params:
      pattern: "questionnaire"
      timeout: 15000

  # ========================================
  # PHASE 3: Questionnaire (5 steps)
  # ========================================

  - id: log-phase3
    action: log
    params:
      message: "Phase 3: Questionnaire"

  # Step 1: Fill website URL
  - id: wait-questionnaire-step1
    action: browser.waitForSelector
    params:
      selector: "input[placeholder*='example.com']"
      timeout: 10000

  - id: fill-website-url
    action: form.fillSingle
    params:
      selector: "input[placeholder*='example.com']"
      value: "https://test-store.example.com"

  - id: click-questionnaire-continue
    action: browser.execute
    params:
      script: |
        const btn = Array.from(document.querySelectorAll("button")).find(b =>
          b.textContent.includes('Continue') && b.offsetParent !== null && !b.disabled
        );
        if (btn) btn.click();

  - id: wait-step2
    action: wait
    params:
      ms: 1000

  # Step 2: Business Category - click first option (auto advances)
  - id: click-business-category
    action: browser.execute
    params:
      script: |
        const buttons = document.querySelectorAll("button[type='button']");
        for (const btn of buttons) {
          if (btn.offsetParent !== null && btn.querySelector('svg, [class*="icon"]')) {
            btn.click();
            break;
          }
        }

  - id: wait-step3
    action: wait
    params:
      ms: 1000

  # Step 3: Annual Revenue - click first option (auto advances)
  - id: click-annual-revenue
    action: browser.execute
    params:
      script: |
        const buttons = document.querySelectorAll("button[type='button']");
        for (const btn of buttons) {
          if (btn.offsetParent !== null && btn.querySelector('svg, [class*="icon"]')) {
            btn.click();
            break;
          }
        }

  - id: wait-step4
    action: wait
    params:
      ms: 1000

  # Step 4: Team Size - click first option (auto advances)
  - id: click-team-size
    action: browser.execute
    params:
      script: |
        const buttons = document.querySelectorAll("button[type='button']");
        for (const btn of buttons) {
          if (btn.offsetParent !== null && btn.querySelector('svg, [class*="icon"]')) {
            btn.click();
            break;
          }
        }

  - id: wait-step5
    action: wait
    params:
      ms: 1000

  # Step 5: Referral Source - select from dropdown
  - id: click-referral-dropdown
    action: browser.execute
    params:
      script: |
        // Click on the Select dropdown trigger
        const trigger = document.querySelector("[data-slot='trigger'], button[aria-haspopup='listbox']");
        if (trigger) trigger.click();

  - id: wait-dropdown-open
    action: wait
    params:
      ms: 500

  - id: select-referral-option
    action: browser.execute
    params:
      script: |
        // Click first option in dropdown
        const option = document.querySelector("[data-slot='listbox'] li, [role='option']");
        if (option) option.click();

  - id: wait-after-select
    action: wait
    params:
      ms: 500

  # Click "Let's get started" button
  - id: click-lets-get-started
    action: browser.execute
    params:
      script: |
        const btn = Array.from(document.querySelectorAll("button[type='submit']")).find(b =>
          b.offsetParent !== null && !b.disabled
        );
        if (btn) btn.click();

  # Wait for navigation to avatar configuration page
  - id: wait-avatar-page
    action: browser.waitForUrl
    params:
      pattern: "configuration-avatar"
      timeout: 60000

  # ========================================
  # PHASE 4: Avatar Configuration
  # ========================================

  - id: log-phase4
    action: log
    params:
      message: "Phase 4: Avatar Configuration"

  # Wait for page to fully load
  - id: wait-avatar-load
    action: wait
    params:
      ms: 2000

  # Click Finish button (desktop version - fixed position at bottom right)
  - id: click-finish-button
    action: browser.execute
    params:
      script: |
        (function() {
          // Desktop version: look for the Finish button
          const buttons = document.querySelectorAll('button');
          for (const btn of buttons) {
            if (btn.textContent.includes('Finish') && btn.offsetParent !== null) {
              btn.click();
              console.log('Clicked Finish button');
              return true;
            }
          }
          // Fallback: try any visible submit button
          const submitBtn = document.querySelector('button[type="submit"]:not([disabled])');
          if (submitBtn && submitBtn.offsetParent !== null) {
            submitBtn.click();
            console.log('Clicked submit button fallback');
            return true;
          }
          return false;
        })()

  - id: wait-after-finish
    action: wait
    params:
      ms: 3000

  # Wait for plan page
  - id: wait-plan-page
    action: browser.waitForUrl
    params:
      pattern: "plan-details"
      timeout: 30000

  # ========================================
  # PHASE 5: Plan Selection
  # ========================================

  - id: log-phase5
    action: log
    params:
      message: "Phase 5: Plan Selection"

  # Wait for plans to load
  - id: wait-plan-loaded
    action: wait
    params:
      ms: 3000

  # Click "Start 14-day free trial" button (first visible one for Starter plan)
  - id: select-plan
    action: browser.execute
    params:
      script: |
        (function() {
          // Find all "Start 14-day free trial" buttons and click the first visible one
          const buttons = document.querySelectorAll('button');
          for (const btn of buttons) {
            if (btn.textContent.includes('Start 14-day free trial') && btn.offsetParent !== null && !btn.disabled) {
              btn.click();
              console.log('Clicked Start trial button');
              return true;
            }
          }
          return false;
        })()

  # Wait for payment page
  - id: wait-payment-page
    action: browser.waitForUrl
    params:
      pattern: "payment"
      timeout: 15000

  # ========================================
  # PHASE 6: Payment (Stripe)
  # ========================================

  - id: log-phase6
    action: log
    params:
      message: "Phase 6: Payment"

  # Wait for page to load
  - id: wait-payment-load
    action: wait
    params:
      ms: 2000

  # Fill cardholder name using Playwright fill (proper React events)
  - id: fill-cardholder-name
    action: form.fillSingle
    params:
      selector: "input[name='cardholderName']"
      value: "Test User"

  # Click country select trigger button
  - id: click-country-trigger
    action: browser.click
    params:
      selector: "button[aria-haspopup='listbox']"

  - id: wait-country-dropdown
    action: wait
    params:
      ms: 1000

  # Select Australia from dropdown using hidden select
  - id: select-australia
    action: browser.execute
    params:
      script: |
        (function() {
          // Use the hidden select element directly
          const hiddenSelect = document.querySelector('select[name="billingAddress.country"]');
          if (hiddenSelect) {
            hiddenSelect.value = 'AU';
            hiddenSelect.dispatchEvent(new Event('change', { bubbles: true }));
            console.log('Selected Australia via hidden select');
          }
          // Also click the visible option if dropdown is open
          const options = document.querySelectorAll('[role="option"], [data-slot="listbox"] li');
          for (const opt of options) {
            if (opt.textContent.includes('Australia')) {
              opt.click();
              console.log('Clicked Australia option');
              return true;
            }
          }
          return false;
        })()

  - id: wait-after-country
    action: wait
    params:
      ms: 500

  # Fill address using Playwright fill
  - id: fill-address
    action: form.fillSingle
    params:
      selector: "input[name='billingAddress.address']"
      value: "123 Test Street, Sydney"

  # Wait for Stripe PaymentElement to load
  - id: wait-stripe-element
    action: browser.waitForSelector
    params:
      selector: "iframe[name*='__privateStripeFrame'], iframe[src*='stripe']"
      timeout: 30000

  - id: wait-stripe-ready
    action: wait
    params:
      ms: 5000

  # Fill Stripe PaymentElement (card details in iframe)
  - id: fill-stripe-payment
    action: stripe.fillPaymentElement
    params:
      cardNumber: "4242424242424242"
      expiry: "04/27"
      cvc: "321"

  - id: wait-before-submit
    action: wait
    params:
      ms: 2000

  # Click "Start Trial" button
  - id: click-pay-button
    action: browser.click
    params:
      selector: "button:has-text('Start Trial')"

  # Wait for success redirect (payment callback or dashboard)
  - id: wait-payment-success
    action: browser.waitForUrl
    params:
      pattern: "payment-callback|payment/payment-callback|dashboard|success|welcome|onboarding"
      timeout: 60000

  # ========================================
  # FINAL: Assert Success
  # ========================================

  - id: assert-final-success
    action: assert.url
    params:
      pattern: "dashboard|success|welcome|home|onboarding|payment-callback"

  - id: log-complete
    action: log
    params:
      message: "Full onboarding flow completed successfully!"
