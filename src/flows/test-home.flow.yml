# YepAI Home Page Test Flow
# Tests the main dashboard/home page

name: test-home
description: Test Home page loads correctly after login

steps:
  # Include shared login steps
  - include: _shared/login.steps.yml

  # ========================================
  # HOME PAGE TEST
  # ========================================

  - id: navigate-home
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/"
      waitUntil: "networkidle"

  - id: wait-main-content
    action: browser.waitForSelector
    params:
      selector: "main, [class*='dashboard'], [class*='home'], [class*='content']"
      timeout: 15000

  - id: verify-sidebar
    action: browser.waitForSelector
    params:
      selector: "[class*='sidebar'], nav, aside"
      timeout: 5000

  - id: screenshot-home
    action: browser.screenshot
    params:
      name: "home-page"

  - id: log-success
    action: log
    params:
      message: "Home page test completed successfully!"
