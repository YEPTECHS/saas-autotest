# YepAI Home Page Test Flow
# Tests the main dashboard/home page

name: test-home
description: Test Home page loads correctly after login

steps:
  # ========================================
  # LOGIN PHASE
  # ========================================

  - id: navigate-login
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/auth/login"
      waitUntil: "domcontentloaded"

  - id: wait-login-form
    action: browser.waitForSelector
    params:
      selector: "input[type='email'], input[name='email'], #email"
      timeout: 10000

  - id: fill-email
    action: form.fillSingle
    params:
      selector: "input[type='email'], input[name='email'], #email"
      value: "{{YEPAI_LOGIN_EMAIL}}"

  - id: fill-password
    action: form.fillSingle
    params:
      selector: "input[type='password'], input[name='password'], #password"
      value: "{{YEPAI_LOGIN_PASSWORD}}"

  - id: wait-submit-enabled
    action: browser.waitForSelector
    params:
      selector: "button[type='submit']:not([disabled])"
      timeout: 5000

  - id: click-login
    action: browser.click
    params:
      selector: "button[type='submit']"

  - id: wait-dashboard
    action: browser.waitForUrl
    params:
      pattern: "dashboard|home|ai-training|analytics|customers"
      timeout: 30000

  - id: log-login-success
    action: log
    params:
      message: "Login successful, starting Home page test..."

  # ========================================
  # HOME PAGE TEST
  # ========================================

  - id: navigate-home
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/"
      waitUntil: "networkidle"

  - id: wait-main-content
    action: browser.waitForSelector
    params:
      selector: "main, [class*='dashboard'], [class*='home'], [class*='content']"
      timeout: 15000

  - id: verify-sidebar
    action: browser.waitForSelector
    params:
      selector: "[class*='sidebar'], nav, aside"
      timeout: 5000

  - id: screenshot-home
    action: browser.screenshot
    params:
      name: "home-page"

  - id: log-success
    action: log
    params:
      message: "Home page test completed successfully!"
