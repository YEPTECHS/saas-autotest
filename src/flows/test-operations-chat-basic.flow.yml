# Oscar (Operations Analyst) Chat — Basic Stub Test
# Verifies /ai-team/operation/chat loads.
# Confirmed correct path via browser: bot-test.yepai.io/ai-team/operation/chat (singular)

name: test-operations-chat-basic
description: Stub test for Oscar (Operations Analyst) chat page (/ai-team/operation/chat)

steps:
  # Shared login flow
  - include: _shared/login.steps.yml

  # Navigate to Oscar's operation chat
  - id: navigate-operations-chat
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/operation/chat"
      waitUntil: "networkidle"

  # Wait for chat interface to load
  - id: wait-chat-ui
    action: browser.waitForSelector
    params:
      selector: "textarea, main, [class*='chat'], h1"
      timeout: 15000

  # Small settle wait
  - id: wait-settle
    action: wait
    params:
      ms: 2000

  # Screenshot
  - id: screenshot-operations-chat
    action: browser.screenshot
    params:
      name: "operations-chat-basic"

  - id: log-success
    action: log
    params:
      message: "Operations chat (Oscar) stub test completed successfully!"