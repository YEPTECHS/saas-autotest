# ============================================================
# SEO Boundary Test Suite — Cody
# URL: /ai-team/seo/chat
#
# Tests whether Cody:
#  SA — answers SEO questions and produces optimized product copy
#  CD — redirects (not answers) Operations/Profit/Marketing-content questions
#  AP — gives precise SEO-angle answers, not vague or wrong-domain responses
#  RF — refuses out-of-scope tasks (image generation, black-hat SEO, no-approval apply)
#
# ============================================================

name: test-cody-boundary
description: Boundary tests for SEO Chat (Cody) — skill accuracy, cross-domain rejection, answer precision, refusal/out-of-scope

steps:
  - include: _shared/login.steps.yml

  - id: nav-seo
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/seo/chat"
      waitUntil: "networkidle"

  - id: wait-load
    action: wait
    params:
      ms: 3000

  - id: screenshot-start
    action: browser.screenshot
    params:
      name: "seobnd-00-start"

  - id: set-timeout
    action: browser.setDefaultTimeout
    params:
      ms: 600000

  # ── Install shared helpers ──────────────────────────────────
  - id: install-helpers
    action: browser.execute
    params:
      script: |
        window.__bndReport = [];
        window.__lastAI = function() {
          var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]'));
          for (var i = bubbles.length - 1; i >= 0; i--) {
            var cls = bubbles[i].className || '';
            if (!cls.includes('purple') && !cls.includes('bg-purple')) {
              var t = bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim();
              if (t.length > 10) return t;
            }
          }
          return '';
        };
        window.__aiSnapshots = function() {
          return Array.from(document.querySelectorAll('[class*="rounded-2xl"]'))
            .filter(function(b) { return !b.className.includes('purple'); })
            .map(function(b) { return b.textContent.trim().substring(0, 60); });
        };
        window.__waitReply = function(snapBefore) {
          return new Promise(function(resolve) {
            setTimeout(function() {
              var tries = 0;
              var t = setInterval(function() {
                tries++;
                var cur = window.__aiSnapshots();
                var hasNew = cur.some(function(s) { return s.length > 10 && snapBefore.indexOf(s) === -1; });
                if (hasNew || tries > 120) { clearInterval(t); setTimeout(resolve, 2000); }
              }, 500);
            }, 3000);
          });
        };
        window.__waitSendReady = function(maxSec) {
          return new Promise(function(resolve) {
            var maxT = (maxSec || 60) * 2; var tries = 0;
            var t = setInterval(function() {
              tries++;
              var ta = document.querySelector('textarea');
              if (!ta) { if (tries >= maxT) { clearInterval(t); resolve(false); } return; }
              var container = ta.parentElement;
              var btn = container ? container.querySelector('button') : null;
              if (!btn && container && container.parentElement) btn = container.parentElement.querySelector('button');
              var ok = btn && !btn.disabled && btn.offsetParent !== null;
              if (ok || tries >= maxT) { clearInterval(t); resolve(!!ok); }
            }, 500);
          });
        };
        window.__clickSend = function() {
          var inp = document.querySelector('textarea');
          if (!inp) return false;
          var btn = inp.parentElement.querySelector('button') ||
            Array.from(document.querySelectorAll('button')).find(function(b) { return b.offsetParent !== null && !b.disabled; }) ||
            Array.from(document.querySelectorAll('button')).pop();
          if (btn) { btn.click(); return true; }
          return false;
        };
        window.__fill = function(text) {
          var inp = document.querySelector('textarea');
          if (!inp) return false;
          try {
            Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, text);
          } catch(e) { inp.value = text; }
          inp.dispatchEvent(new Event('input', { bubbles: true }));
          inp.dispatchEvent(new Event('change', { bubbles: true }));
          return true;
        };
        window.__runBatch = function(tests) {
          var results = [];
          var chain = Promise.resolve();
          tests.forEach(function(test) {
            chain = chain.then(function() {
              return window.__waitSendReady(60).then(function() {
                var snap = window.__aiSnapshots();
                window.__fill(test.q);
                window.__clickSend();
                return window.__waitReply(snap);
              }).then(function() {
                var a = window.__lastAI();
                var status = test.check(a);
                results.push({ id: test.id, category: test.category, q: test.q.substring(0, 100), a: a.substring(0, 300), status: status });
                window.__bndReport.push({ type: test.category, question: '[' + test.id + '] ' + test.q, answer: a.substring(0, 300), status: status });
                console.log('[' + test.id + ']', status, '|', a.substring(0, 80));
                return { id: test.id, status: status };
              });
            });
          });
          return chain.then(function() { return results; });
        };
        console.log('[SEOBoundary] Helpers installed');
        return true;
    continueOnError: true

  # ════════════════════════════════════════════════════════
  # PART 1 — SKILL ACCURACY (SA)
  # ════════════════════════════════════════════════════════
  - id: log-sa
    action: log
    params:
      message: "====== PART 1: SKILL ACCURACY ======"

  - id: run-sa
    action: browser.execute
    params:
      script: |
        var tests = [
          { id: 'SA-01', category: 'SA', q: 'Analyze my product catalog for SEO gaps.',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('seo') || l.includes('gap') || l.includes('keyword') || l.includes('title') || l.includes('description')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-02', category: 'SA', q: 'Write an optimized product title for a bamboo cutting board.',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('bamboo') || l.includes('cutting board') || l.includes('title') || l.includes('keyword')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-03', category: 'SA', q: 'Generate meta tags for my running shoes product page.',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('meta') || l.includes('title') || l.includes('description') || l.includes('tag')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-04', category: 'SA', q: 'Suggest long-tail keywords for my organic skincare product line.',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('keyword') || l.includes('long-tail') || l.includes('organic') || l.includes('skincare') || l.includes('search')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-05', category: 'SA', q: 'Which of my products have the weakest SEO titles?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('title') || l.includes('weak') || l.includes('seo') || l.includes('improve') || l.includes('optimize')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-06', category: 'SA', q: 'Draft an SEO-optimized description for wireless noise-cancelling headphones.',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('headphone') || l.includes('noise') || l.includes('description') || l.includes('keyword') || l.includes('seo')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-07', category: 'SA', q: 'How does the approval process work when you propose SEO changes?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('approv') || l.includes('proposal') || l.includes('review') || l.includes('confirm') || l.includes('apply')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-08', category: 'SA', q: 'What makes a good meta description for an e-commerce product page?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('meta') || l.includes('description') || l.includes('character') || l.includes('keyword') || l.includes('click')) ? 'PASS' : 'FAIL'; } }
        ];
        return window.__runBatch(tests);
    continueOnError: true
    output: saResults

  - id: save-sa
    action: data.saveJson
    params:
      file: "reports/seobnd-sa.json"
      data: "{{saResults.result}}"
    continueOnError: true

  - id: screenshot-sa
    action: browser.screenshot
    params:
      name: "seobnd-01-sa-done"
    continueOnError: true

  # ════════════════════════════════════════════════════════
  # PART 2 — CROSS-DOMAIN REJECTION (CD)
  # ════════════════════════════════════════════════════════
  - id: nav-cd
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/seo/chat"
      waitUntil: "networkidle"
    continueOnError: true

  - id: wait-cd
    action: wait
    params:
      ms: 2000
    continueOnError: true

  - id: reinstall-helpers-cd
    action: browser.execute
    params:
      script: |
        if (!window.__runBatch) {
          window.__bndReport = window.__bndReport || [];
          window.__lastAI = function() { var bubbles=Array.from(document.querySelectorAll('[class*="rounded-2xl"]')); for(var i=bubbles.length-1;i>=0;i--){var cls=bubbles[i].className||'';if(!cls.includes('purple')&&!cls.includes('bg-purple')){var t=bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i,'').trim();if(t.length>10)return t;}}return ''; };
          window.__aiSnapshots = function() { return Array.from(document.querySelectorAll('[class*="rounded-2xl"]')).filter(function(b){return !b.className.includes('purple');}).map(function(b){return b.textContent.trim().substring(0,60);}); };
          window.__waitReply = function(snapBefore) { return new Promise(function(resolve) { setTimeout(function() { var tries=0; var t=setInterval(function() { tries++; var cur=window.__aiSnapshots(); var hasNew=cur.some(function(s){return s.length>10&&snapBefore.indexOf(s)===-1;}); if(hasNew||tries>120){clearInterval(t);setTimeout(resolve,2000);} },500); },3000); }); };
          window.__waitSendReady = function(maxSec) { return new Promise(function(resolve) { var maxT=(maxSec||60)*2; var tries=0; var t=setInterval(function() { tries++; var ta=document.querySelector('textarea'); if(!ta){if(tries>=maxT){clearInterval(t);resolve(false);}return;} var container=ta.parentElement; var btn=container?container.querySelector('button'):null; if(!btn&&container&&container.parentElement)btn=container.parentElement.querySelector('button'); var ok=btn&&!btn.disabled&&btn.offsetParent!==null; if(ok||tries>=maxT){clearInterval(t);resolve(!!ok);} },500); }); };
          window.__clickSend = function() { var inp=document.querySelector('textarea'); if(!inp)return false; var btn=inp.parentElement.querySelector('button')||Array.from(document.querySelectorAll('button')).find(function(b){return b.offsetParent!==null&&!b.disabled;})||Array.from(document.querySelectorAll('button')).pop(); if(btn){btn.click();return true;}return false; };
