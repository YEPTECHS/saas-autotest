# QA Verification: YEP-408 — Password complexity enforcement
# Requirements: at least 8 characters, uppercase, lowercase, number, symbol
# Bug: weak passwords were accepted at registration
# Fix verification: each weak password must be REJECTED with a clear error message
# Valid password must still be ACCEPTED
#
# Uses fresh emails (v5 suffix) to avoid "email already registered" false negatives.
# STRICT mode: navigating away from register page = test FAILS (bug not fixed).
# Uses form.fillSingle to properly trigger React state updates (not raw JS .value).

name: ds-qa-yep408
description: "QA: YEP-408 — verify password complexity is now enforced at registration"

steps:

  # ════════════════════════════════════════════════════════════════
  # Case 1: No uppercase — asdf@12345 — must be REJECTED
  # ════════════════════════════════════════════════════════════════
  - id: nav-case1
    action: browser.navigate
    params:
      url: "{{DS_BASE_URL}}/#/login"
      waitUntil: "domcontentloaded"

  - id: click-signup-case1
    action: browser.click
    params:
      selector: "a:has-text('Sign up')"

  - id: wait-form-case1
    action: browser.waitForSelector
    params:
      selector: "input[placeholder='Full name']"
      timeout: 10000

  - id: fill-name-case1
    action: form.fillSingle
    params:
      selector: "input[placeholder='Full name']"
      value: "QA408 NoUpper"

  - id: fill-email-case1
    action: form.fillSingle
    params:
      selector: "input[placeholder='name@company.com'], input[type='email']"
      value: "ds-qa408-v6-noupper@yopmail.com"

  - id: fill-pw-case1
    action: form.fillSingle
    params:
      selector: "input[placeholder='Password'], input[type='password']"
      value: "asdf@12345"

  - id: submit-case1
    action: browser.click
    params:
      selector: "button:has-text('Create Account')"

  - id: wait-case1
    action: wait
    params:
      ms: 2000

  - id: screenshot-case1
    action: browser.screenshot
    params:
      name: "ds-qa408-01-no-uppercase"

  - id: verify-case1-rejected
    action: browser.execute
    params:
      script: |
        const url = window.location.href;
        const stillOnRegister = !!document.querySelector("input[type='password']");
        const body = document.body.innerText;
        const hasError = body.toLowerCase().includes('uppercase') || body.toLowerCase().includes('capital') ||
                         body.toLowerCase().includes('password') || body.toLowerCase().includes('weak') ||
                         body.toLowerCase().includes('complexity') || body.toLowerCase().includes('requirement') ||
                         document.querySelectorAll('[data-sonner-toast], .toaster li, [class*="error"], [class*="Error"]').length > 0;
        if (!stillOnRegister) {
          throw new Error('YEP-408 NOT FIXED: password "asdf@12345" (no uppercase) was ACCEPTED — user navigated away from register page to: ' + url);
        }
        return {
          case: 'no_uppercase (asdf@12345)',
          result: '✅ PASS: rejected as expected',
          hasErrorMessage: hasError,
          errorMessageNote: hasError ? 'Error message shown' : '⚠️ Rejected but no visible error message — UX issue',
          bodySnippet: body.slice(0, 300)
        };
    output: case1Result

  # ════════════════════════════════════════════════════════════════
  # Case 2: No number — Asdf@abcde — must be REJECTED
  # ════════════════════════════════════════════════════════════════
  - id: nav-case2
    action: browser.navigate
    params:
      url: "{{DS_BASE_URL}}/#/login"
      waitUntil: "domcontentloaded"

  - id: click-signup-case2
    action: browser.click
    params:
      selector: "a:has-text('Sign up')"

  - id: wait-form-case2
    action: browser.waitForSelector
    params:
