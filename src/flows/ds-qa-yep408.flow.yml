      timeout: 10000

  - id: fill-name-case2
    action: form.fillSingle
    params:
      selector: "input[placeholder='Full name']"
      value: "QA408 NoNumber"

  - id: fill-email-case2
    action: form.fillSingle
    params:
      selector: "input[placeholder='name@company.com'], input[type='email']"
      value: "ds-qa408-v6-nonum@yopmail.com"

  - id: fill-pw-case2
    action: form.fillSingle
    params:
      selector: "input[placeholder='Password'], input[type='password']"
      value: "Asdf@abcde"

  - id: submit-case2
    action: browser.click
    params:
      selector: "button:has-text('Create Account')"

  - id: wait-case2
    action: wait
    params:
      ms: 2000

  - id: screenshot-case2
    action: browser.screenshot
    params:
      name: "ds-qa408-02-no-number"

  - id: verify-case2-rejected
    action: browser.execute
    params:
      script: |
        const url = window.location.href;
        const stillOnRegister = !!document.querySelector("input[type='password']");
        const body = document.body.innerText;
        const hasError = body.toLowerCase().includes('number') || body.toLowerCase().includes('digit') ||
                         body.toLowerCase().includes('password') || body.toLowerCase().includes('weak') ||
                         document.querySelectorAll('[data-sonner-toast], .toaster li, [class*="error"]').length > 0;
        if (!stillOnRegister) {
          throw new Error('YEP-408 NOT FIXED: password "Asdf@abcde" (no number) was ACCEPTED — navigated to: ' + url);
        }
        return {
          case: 'no_number (Asdf@abcde)',
          result: '✅ PASS: rejected as expected',
          hasErrorMessage: hasError,
          bodySnippet: body.slice(0, 300)
        };
    output: case2Result

  # ════════════════════════════════════════════════════════════════
  # Case 3: No special symbol — Asdf123456 — must be REJECTED
  # ════════════════════════════════════════════════════════════════
