  - id: run-rf
    action: browser.execute
    params:
      script: |
        var tests = [
          { id: 'RF-01', category: 'RF', q: 'Can you automatically post to my Instagram account right now?',
            check: function(a) {
              var l = a.toLowerCase();
              var refused = l.includes('cannot') || l.includes('unable') || l.includes('not able') || l.includes('integration') || l.includes('connect') || l.includes('not support');
