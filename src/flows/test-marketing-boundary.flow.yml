  # ════════════════════════════════════════════════════════
  # PART 4 — INSTRUCTION COMPLIANCE (IC-01 ~ IC-08)
  # ════════════════════════════════════════════════════════
  - id: log-ic
    action: log
    params:
      message: "====== PART 4: INSTRUCTION COMPLIANCE (20 tests) — follows explicit format/constraint instructions ======"

  - id: run-ic
    action: browser.execute
    params:
      script: |
        var tests = [
          { id: 'IC-01', category: 'IC', q: 'Write a blog post about eco-friendly packaging in exactly 3 paragraphs',
            check: function(a) {
              var paras = a.split(/\n\n+/).filter(function(p) { return p.trim().length > 20; });
              return (paras.length === 3) ? 'PASS' : (paras.length >= 2 && paras.length <= 4 ? 'WARN' : 'FAIL');
            } },
          { id: 'IC-02', category: 'IC', q: 'Give me exactly 5 SEO keywords for "organic face cream" — numbered list only',
            check: function(a) {
              var numbered = a.match(/^\s*\d+[\.\)]\s+/mg);
              var count = numbered ? numbered.length : 0;
              return (count === 5) ? 'PASS' : (count > 0 ? 'WARN' : 'FAIL');
            } },
          { id: 'IC-03', category: 'IC', q: 'Write an Instagram caption for summer sale in under 50 words',
            check: function(a) {
              var words = a.trim().split(/\s+/).length;
              return (words <= 50) ? 'PASS' : (words <= 70 ? 'WARN' : 'FAIL');
            } },
          { id: 'IC-04', category: 'IC', q: 'Write product descriptions for a leather wallet in both English and Chinese',
            check: function(a) {
              var hasChinese = /[\u4e00-\u9fff]/.test(a);
              var hasEnglish = /[a-zA-Z]{3,}/.test(a);
              return (hasChinese && hasEnglish) ? 'PASS' : 'FAIL';
            } },
          { id: 'IC-05', category: 'IC', q: 'Give me a marketing strategy for my store using bullet points only, no paragraphs',
            check: function(a) {
              var bullets = a.match(/^\s*[-•*]\s+/mg);
              var hasBullets = bullets && bullets.length >= 3;
              return hasBullets ? 'PASS' : 'WARN';
            } },
          { id: 'IC-06', category: 'IC', q: 'Write a blog title and ONE sentence summary for 5 different blog topics about skincare',
            check: function(a) {
              var lines = a.split('\n').filter(function(l) { return l.trim().length > 10; });
              return (lines.length >= 5 && a.toLowerCase().includes('skincare')) ? 'PASS' : 'WARN';
            } },
          { id: 'IC-07', category: 'IC', q: 'Suggest 3 Instagram post ideas for my coffee brand — keep each idea under 20 words',
            check: function(a) {
              var l = a.toLowerCase();
              var hasCoffee = l.includes('coffee');
              var numbered = (a.match(/^\s*\d+[\.\)]/mg) || []).length;
              var bullets = (a.match(/^\s*[-•*]/mg) || []).length;
              return (hasCoffee && (numbered >= 3 || bullets >= 3)) ? 'PASS' : 'WARN';
            } },
          { id: 'IC-08', category: 'IC', q: 'Write a promotional email subject line for a flash sale — no more than 8 words',
            check: function(a) {
              // Extract the subject line (first non-empty line or "Subject:" line)
              var lines = a.split('\n').map(function(l) { return l.replace(/^subject\s*:?\s*/i, '').trim(); }).filter(function(l) { return l.length > 3; });
              var subject = lines[0] || '';
              var words = subject.split(/\s+/).length;
              return (words <= 8) ? 'PASS' : (words <= 12 ? 'WARN' : 'FAIL');
            } },
          { id: 'IC-09', category: 'IC', q: 'Write exactly 3 bullet points about why customers should trust my store',
            check: function(a) {
              var bullets = (a.match(/^\s*[-•*]\s+/mg) || []).length;
              var numbered = (a.match(/^\s*\d+[\.\)]\s+/mg) || []).length;
              var count = Math.max(bullets, numbered);
              return (count === 3) ? 'PASS' : (count > 0 ? 'WARN' : 'FAIL');
            } },
          { id: 'IC-10', category: 'IC', q: 'Translate the following into Spanish: "Free shipping on orders over $50, limited time only!"',
            check: function(a) {
              var l = a.toLowerCase();
              var hasSpanish = l.includes('envio') || l.includes('gratis') || l.includes('pedidos') || l.includes('tiempo') || l.includes('solo') || l.includes('envo') || l.includes('limitado');
              return hasSpanish ? 'PASS' : 'FAIL';
            } },
          { id: 'IC-11', category: 'IC', q: 'Describe my store\'s summer sale using only emojis — no words',
            check: function(a) {
              var hasEmoji = /[\u{1F300}-\u{1FFFF}]|[\u{2600}-\u{27BF}]/u.test(a);
              var hasWords = /[a-zA-Z]{3,}/.test(a);
              return (hasEmoji && !hasWords) ? 'PASS' : (hasEmoji ? 'WARN' : 'FAIL');
            } },
          { id: 'IC-12', category: 'IC', q: 'Give me a product tagline for a coffee brand in under 10 words',
            check: function(a) {
              var lines = a.split('\n').filter(function(l) { return l.trim().length > 3; });
              var tagline = lines[0] || '';
              var words = tagline.trim().split(/\s+/).length;
              return (words <= 10) ? 'PASS' : (words <= 15 ? 'WARN' : 'FAIL');
            } },
          { id: 'IC-13', category: 'IC', q: 'Write an Instagram caption for my new sneaker drop in a casual Gen-Z tone',
            check: function(a) {
              var l = a.toLowerCase();
              var hasCasualMarkers = l.includes('!!') || l.includes('omg') || l.includes('vibe') || l.includes('drop') || l.includes('fire') || l.includes('lit') || l.includes('slap') || a.includes('💥') || a.includes('🔥') || a.includes('✨');
              return hasCasualMarkers ? 'PASS' : 'WARN';
            } },
          { id: 'IC-14', category: 'IC', q: 'Write a formal press release headline and opening sentence for our new product launch',
            check: function(a) {
              var l = a.toLowerCase();
              var isFormal = l.includes('announces') || l.includes('pleased') || l.includes('proud') || l.includes('today') || l.includes('release') || l.includes('launch') || l.includes('officially');
              return (isFormal && a.length > 50) ? 'PASS' : 'WARN';
            } },
          { id: 'IC-15', category: 'IC', q: 'Give me exactly 7 tips for growing my store\'s Instagram following — numbered list',
            check: function(a) {
              var numbered = (a.match(/^\s*\d+[\.\)]\s+/mg) || []).length;
              return (numbered === 7) ? 'PASS' : (numbered > 0 ? 'WARN' : 'FAIL');
            } },
          { id: 'IC-16', category: 'IC', q: 'Write a marketing email using the AIDA framework (Attention, Interest, Desire, Action)',
            check: function(a) {
              var l = a.toLowerCase();
              var hasAIDA = (l.includes('attention') || l.includes('attention-grab')) && (l.includes('interest') || l.includes('desire') || l.includes('action'));
              var mentionsFramework = l.includes('aida') || hasAIDA;
              return (mentionsFramework && a.length > 100) ? 'PASS' : 'WARN';
            } },
          { id: 'IC-17', category: 'IC', q: 'Write a FAQ section for my store with exactly 5 questions and answers',
            check: function(a) {
              var qCount = (a.match(/^\s*(Q\d*[:.]|Q:|[A-Z][^.?!]*\?)/mg) || []).length;
              var numbered = (a.match(/^\s*\d+[\.\)]\s+/mg) || []).length;
              var count = Math.max(qCount, numbered);
              return (count >= 5) ? 'PASS' : (count > 0 ? 'WARN' : 'FAIL');
            } },
          { id: 'IC-18', category: 'IC', q: 'Summarize how to start email marketing in no more than 2 sentences',
            check: function(a) {
              var sentences = a.split(/[.!?]+/).filter(function(s) { return s.trim().length > 10; });
              return (sentences.length <= 2) ? 'PASS' : (sentences.length <= 4 ? 'WARN' : 'FAIL');
            } },
          { id: 'IC-19', category: 'IC', q: 'List 4 social media platforms I should use, with one reason each — use a table format',
            check: function(a) {
              var hasTable = a.includes('|') && a.split('|').length > 4;
              var hasList = (a.match(/^\s*[-•*\d][\.\)]\s+/mg) || []).length >= 4;
              return (hasTable || hasList) ? 'PASS' : 'WARN';
            } },
          { id: 'IC-20', category: 'IC', q: 'Write a product description for a yoga mat — keep it strictly positive, no caveats or qualifications',
            check: function(a) {
              var l = a.toLowerCase();
              var hasProduct = l.includes('yoga') || l.includes('mat') || l.includes('exercise');
              var hasCaveat = l.includes('however') || l.includes('but note') || l.includes('keep in mind') || l.includes('disclaimer');
              return (hasProduct && !hasCaveat && a.length > 50) ? 'PASS' : 'WARN';
            } }
        ];
        return window.__runBatch(tests);
    continueOnError: true
    output: icResults

