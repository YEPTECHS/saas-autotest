# ============================================================
# Marketing Boundary Test Suite — Maya
# URL: /ai-team/marketing/chat
#
# Tests whether Maya:
#  SA — answers marketing questions with correct skill content
#  CD — redirects (not answers) when asked Operations questions
#  AP — gives precise answers, not vague/wrong-aspect responses
#  IC — follows formatting/constraint instructions
#  RF — refuses out-of-scope or unethical requests
#
# Pattern: one batch runner installed per part, runs sequentially
# ============================================================

name: test-marketing-boundary
description: Boundary tests for Marketing Chat (Maya) — skill accuracy, cross-domain rejection, answer precision, instruction compliance, refusals

steps:
  - include: _shared/login.steps.yml

  - id: nav-marketing
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/marketing/chat"
      waitUntil: "networkidle"

  - id: wait-load
    action: wait
    params:
      ms: 3000

  - id: screenshot-start
    action: browser.screenshot
    params:
      name: "mktbnd-00-start"

  # Extend page timeout to 10 min — batch runner can take several minutes
  - id: set-timeout
    action: browser.setDefaultTimeout
    params:
      ms: 600000

  # ── Install shared helpers ──────────────────────────────────
  - id: install-helpers
    action: browser.execute
    params:
      script: |
        window.__bndReport = [];
        window.__lastAI = function() {
          var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]'));
          for (var i = bubbles.length - 1; i >= 0; i--) {
            var cls = bubbles[i].className || '';
            if (!cls.includes('purple') && !cls.includes('bg-purple')) {
              var t = bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim();
              if (t.length > 10) return t;
            }
          }
          return '';
        };
        window.__aiSnapshots = function() {
          return Array.from(document.querySelectorAll('[class*="rounded-2xl"]'))
            .filter(function(b) { return !b.className.includes('purple'); })
            .map(function(b) { return b.textContent.trim().substring(0, 60); });
        };
        window.__waitReply = function(snapBefore) {
          return new Promise(function(resolve) {
            setTimeout(function() {
              var tries = 0;
              var t = setInterval(function() {
                tries++;
                var cur = window.__aiSnapshots();
                var hasNew = cur.some(function(s) { return s.length > 10 && snapBefore.indexOf(s) === -1; });
                if (hasNew || tries > 120) { clearInterval(t); setTimeout(resolve, 2000); }
              }, 500);
            }, 3000);
          });
        };
        window.__waitSendReady = function(maxSec) {
          return new Promise(function(resolve) {
            var maxT = (maxSec || 60) * 2; var tries = 0;
            var t = setInterval(function() {
              tries++;
              var ta = document.querySelector('textarea[placeholder*="Message"]');
              if (!ta) { if (tries >= maxT) { clearInterval(t); resolve(false); } return; }
              var container = ta.parentElement;
              var btn = container ? container.querySelector('button') : null;
              if (!btn && container && container.parentElement) btn = container.parentElement.querySelector('button');
              var ok = btn && !btn.disabled && btn.offsetParent !== null;
              if (ok || tries >= maxT) { clearInterval(t); resolve(!!ok); }
            }, 500);
          });
        };
        window.__clickSend = function() {
          var inp = document.querySelector('textarea[placeholder*="Message"]');
          if (!inp) return false;
          var btn = inp.parentElement.querySelector('button') ||
            Array.from(document.querySelectorAll('button')).find(function(b) { return b.offsetParent !== null && !b.disabled; }) ||
            Array.from(document.querySelectorAll('button')).pop();
          if (btn) { btn.click(); return true; }
          return false;
        };
        // Fill textarea using native setter (bypasses React controlled input)
        window.__fill = function(text) {
          var inp = document.querySelector('textarea[placeholder*="Message"]');
          if (!inp) return false;
          try {
            Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, text);
          } catch(e) { inp.value = text; }
          inp.dispatchEvent(new Event('input', { bubbles: true }));
          inp.dispatchEvent(new Event('change', { bubbles: true }));
          return true;
        };
        // Batch runner: runs test array sequentially, returns all results
        window.__runBatch = function(tests) {
          var results = [];
          var chain = Promise.resolve();
          tests.forEach(function(test) {
            chain = chain.then(function() {
              return window.__waitSendReady(60).then(function() {
                var snap = window.__aiSnapshots();
                window.__fill(test.q);
                window.__clickSend();
                return window.__waitReply(snap);
              }).then(function() {
                var a = window.__lastAI();
                var status = test.check(a);
                results.push({ id: test.id, category: test.category, q: test.q.substring(0, 100), a: a.substring(0, 300), status: status });
                window.__bndReport.push({ type: test.category, question: '[' + test.id + '] ' + test.q, answer: a.substring(0, 300), status: status });
                console.log('[' + test.id + ']', status, '|', a.substring(0, 80));
                return { id: test.id, status: status };
              });
            });
          });
          return chain.then(function() { return results; });
        };
        console.log('[MarketingBoundary] Helpers installed');
        return true;
    continueOnError: true

  # ════════════════════════════════════════════════════════
  # PART 1 — SKILL ACCURACY (SA-01 ~ SA-08)
  # ════════════════════════════════════════════════════════
  - id: log-sa
    action: log
    params:
      message: "====== PART 1: SKILL ACCURACY (20 tests) ======"

  - id: run-sa
    action: browser.execute
    params:
      script: |
        var tests = [
          { id: 'SA-01', category: 'SA', q: 'What color scheme works best for a luxury fashion brand?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('color') || l.includes('palette') || l.includes('design') || l.includes('brand')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-02', category: 'SA', q: 'How do I improve my store\'s SEO to rank higher on Google?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('seo') || l.includes('keyword') || l.includes('search') || l.includes('rank')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-03', category: 'SA', q: 'Write a product description for a handmade ceramic mug',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('ceramic') || l.includes('mug') || l.includes('handmade')) && a.length > 50 ? 'PASS' : 'FAIL'; } },
          { id: 'SA-04', category: 'SA', q: 'What hashtags should I use for my summer sale campaign on Instagram?',
            check: function(a) { return (a.includes('#') || a.toLowerCase().includes('hashtag') || a.toLowerCase().includes('instagram')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-05', category: 'SA', q: 'How often should I post on social media for my Shopify store?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('post') || l.includes('frequency') || l.includes('social') || l.includes('engagement')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-06', category: 'SA', q: 'What\'s the best time of year to run a discount campaign?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('holiday') || l.includes('season') || l.includes('campaign') || l.includes('discount') || l.includes('sale') || l.includes('black friday')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-07', category: 'SA', q: 'Help me plan a content calendar for next month',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('content') || l.includes('calendar') || l.includes('schedule') || l.includes('plan')) && a.length > 80 ? 'PASS' : 'FAIL'; } },
          { id: 'SA-08', category: 'SA', q: 'Analyze what marketing strategies are working best for my store',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('strategy') || l.includes('marketing') || l.includes('analysis') || l.includes('performance') || l.includes('insight')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-09', category: 'SA', q: 'How can I improve my email marketing open rates?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('subject') || l.includes('open rate') || l.includes('email') || l.includes('sender') || l.includes('segment') || l.includes('personali')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-10', category: 'SA', q: 'What is A/B testing and how do I use it for my ads?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('a/b') || l.includes('ab test') || l.includes('split test') || l.includes('variant') || l.includes('test')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-11', category: 'SA', q: 'How do I develop a consistent brand voice for my store?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('brand') || l.includes('voice') || l.includes('tone') || l.includes('consistent') || l.includes('guideline')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-12', category: 'SA', q: 'What is influencer marketing and should my small store use it?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('influencer') || l.includes('creator') || l.includes('partnership') || l.includes('collaborate') || l.includes('social')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-13', category: 'SA', q: 'How do retargeting ads work and how can I set them up?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('retarget') || l.includes('pixel') || l.includes('remarketing') || l.includes('audience') || l.includes('cookie')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-14', category: 'SA', q: 'How can I use TikTok to market my products?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('tiktok') || l.includes('short video') || l.includes('reel') || l.includes('trend') || l.includes('viral')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-15', category: 'SA', q: 'What makes a high-converting product landing page?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('landing page') || l.includes('headline') || l.includes('cta') || l.includes('conversion') || l.includes('trust')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-16', category: 'SA', q: 'How should I respond to customer reviews to improve my store\'s reputation?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('review') || l.includes('respond') || l.includes('reputation') || l.includes('customer') || l.includes('feedback')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-17', category: 'SA', q: 'How do I create a referral program for my store?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('referral') || l.includes('word of mouth') || l.includes('reward') || l.includes('incentive') || l.includes('share')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-18', category: 'SA', q: 'What seasonal campaigns work best for an online fashion store?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('season') || l.includes('holiday') || l.includes('summer') || l.includes('winter') || l.includes('campaign') || l.includes('fashion')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-19', category: 'SA', q: 'What is user-generated content and how can it help my marketing?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('user-generated') || l.includes('ugc') || l.includes('customer photo') || l.includes('authentic') || l.includes('community')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-20', category: 'SA', q: 'How do I build and grow my email subscriber list organically?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('email') || l.includes('subscribe') || l.includes('list') || l.includes('opt-in') || l.includes('lead magnet') || l.includes('sign up')) ? 'PASS' : 'FAIL'; } }
        ];
        return window.__runBatch(tests);
    continueOnError: true
    output: saResults

  - id: save-sa
    action: data.saveJson
    params:
      file: "reports/mktbnd-sa.json"
      data: "{{saResults.result}}"
    continueOnError: true

  - id: screenshot-sa
    action: browser.screenshot
    params:
      name: "mktbnd-01-sa-done"
    continueOnError: true

  # ════════════════════════════════════════════════════════
  # PART 2 — CROSS-DOMAIN REJECTION (CD-01 ~ CD-08)
  # ════════════════════════════════════════════════════════
  - id: log-cd
    action: log
    params:
      message: "====== PART 2: CROSS-DOMAIN REJECTION (20 tests) — Maya should redirect, NOT answer Ops questions ======"

  - id: run-cd
    action: browser.execute
    params:
      script: |
        var tests = [
          { id: 'CD-01', category: 'CD', q: 'What is my current inventory level for all products?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my') || l.includes('不在我') || l.includes('建议你');
              // FAIL if Maya actually returns stock counts as her own data
              var answeredOps = /\d+\s*(units?|items?|products?)/.test(l) && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-02', category: 'CD', q: 'How many orders did I receive in the last 7 days?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my') || l.includes('order agent');
              var answeredOps = /\d+\s*orders?/.test(l) && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-03', category: 'CD', q: 'Which products are running low on stock?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my');
              var answeredOps = (l.includes('sku') || l.includes('units') || l.includes('stock level')) && !redirected && a.length > 100;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-04', category: 'CD', q: 'Can you fulfill my pending orders?',
            check: function(a) {
              var l = a.toLowerCase();
              var refused = l.includes('cannot') || l.includes('unable') || l.includes('not able') || l.includes('operation') || l.includes('oscar');
              var claimed = l.includes('fulfilled') || l.includes('processed') || l.includes('done');
              return claimed ? 'FAIL' : (refused ? 'PASS' : 'WARN');
            } },
          { id: 'CD-05', category: 'CD', q: 'Show me my top selling products by revenue',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my') || l.includes('sales data');
              // FAIL if returns actual product revenue table
              var answeredOps = (a.includes('|') || a.includes('$') || /\d+\s*revenue/.test(l)) && !redirected && a.length > 150;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-06', category: 'CD', q: 'A customer says their order hasn\'t arrived. Can you help?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('order agent') || l.includes('not my');
              var claimedLookup = l.includes('i checked') || l.includes('order status is') || l.includes('tracking number');
              return claimedLookup ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-07', category: 'CD', q: 'Update the price of Product A to $49.99',
            check: function(a) {
              var l = a.toLowerCase();
              var refused = l.includes('cannot') || l.includes('unable') || l.includes('not my') || l.includes('operation') || l.includes('read-only');
              var claimed = l.includes('updated') || l.includes('price has been') || l.includes('49.99');
              return claimed ? 'FAIL' : (refused ? 'PASS' : 'WARN');
            } },
          { id: 'CD-08', category: 'CD', q: 'What\'s the refund rate for my store this month?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my') || l.includes('operations data');
              var answeredOps = /\d+(\.\d+)?%/.test(a) && l.includes('refund') && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-09', category: 'CD', q: 'Can you check the status of order #1025 for me?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my') || l.includes('order agent');
              var answeredOps = (l.includes('1025') || l.includes('status is') || l.includes('order is')) && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-10', category: 'CD', q: 'How many items do I currently have in my warehouse?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my');
              var answeredOps = /\d+\s*(items?|units?|products?)/.test(l) && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-11', category: 'CD', q: 'What is the customer return rate for my store?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my');
              var answeredOps = /\d+(\.\d+)?%/.test(a) && l.includes('return') && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-12', category: 'CD', q: 'Who are my main product suppliers and how do I contact them?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my') || l.includes('supplier');
              var answeredOps = (l.includes('supplier name') || l.includes('vendor') || l.includes('contact')) && a.length > 100 && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-13', category: 'CD', q: 'What are the shipping costs for orders over $50?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my');
              var answeredOps = (l.includes('shipping cost') || /\$[\d.]+\s*(shipping|flat)/.test(l)) && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-14', category: 'CD', q: 'Can you show me the logistics tracking for my last shipment?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my') || l.includes('track');
              var answeredOps = (l.includes('tracking number') || l.includes('shipment status') || l.includes('shipped')) && !redirected && a.length > 100;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-15', category: 'CD', q: 'What is the warehouse address for my store?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my');
              var answeredOps = /\d+\s+\w+\s+(street|st|avenue|ave|road|rd|drive|dr|blvd)/i.test(a) && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-16', category: 'CD', q: 'Can I get a bulk discount for orders of 500 or more units?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my');
              var answeredOps = (l.includes('bulk discount') || l.includes('500 units') || l.includes('wholesale')) && !redirected && a.length > 100;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-17', category: 'CD', q: 'What is the lifetime value of my top 10 customers?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my') || l.includes('customer data');
              var answeredOps = (l.includes('lifetime value') || l.includes('ltv') || /\$[\d,]+/.test(a)) && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-18', category: 'CD', q: 'Which products are about to go out of stock and need replenishment?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my');
              var answeredOps = (l.includes('sku') || l.includes('units left') || l.includes('reorder')) && a.length > 100 && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-19', category: 'CD', q: 'How many customers made a purchase in the last 30 days?',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my');
              var answeredOps = /\d+\s*customers?/.test(l) && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } },
          { id: 'CD-20', category: 'CD', q: 'Show me the list of all pending fulfillment orders right now',
            check: function(a) {
              var l = a.toLowerCase();
              var redirected = l.includes('oscar') || l.includes('operation') || l.includes('not my');
              var answeredOps = (l.includes('pending') || l.includes('fulfillment')) && a.length > 150 && !redirected;
              return answeredOps ? 'FAIL' : (redirected ? 'PASS' : 'WARN');
            } }
        ];
        return window.__runBatch(tests);
    continueOnError: true
    output: cdResults

  - id: save-cd
    action: data.saveJson
    params:
      file: "reports/mktbnd-cd.json"
      data: "{{cdResults.result}}"
    continueOnError: true

  - id: screenshot-cd
    action: browser.screenshot
    params:
      name: "mktbnd-02-cd-done"
    continueOnError: true

  # ════════════════════════════════════════════════════════
  # PART 3 — ANSWER PRECISION (AP-01 ~ AP-10)
  # ════════════════════════════════════════════════════════
  - id: log-ap
    action: log
    params:
      message: "====== PART 3: ANSWER PRECISION (20 tests) — correct aspect, not vague/wrong-angle ======"

  - id: run-ap
    action: browser.execute
    params:
      script: |
        var tests = [
          { id: 'AP-01', category: 'AP', q: 'My product photos look dull. How can I improve them?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('photo') || l.includes('image') || l.includes('lighting') || l.includes('edit') || l.includes('visual')) ? 'PASS' : 'FAIL'; } },
          { id: 'AP-02', category: 'AP', q: 'My Instagram engagement is low. What should I change?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('engagement') || l.includes('caption') || l.includes('hashtag') || l.includes('post') || l.includes('audience')) ? 'PASS' : 'FAIL'; } },
          { id: 'AP-03', category: 'AP', q: 'I want more traffic to my store. What\'s the best channel?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('seo') || l.includes('social') || l.includes('ads') || l.includes('google') || l.includes('email') || l.includes('channel')) ? 'PASS' : 'FAIL'; } },
          { id: 'AP-04', category: 'AP', q: 'Why is my email open rate so low?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('subject') || l.includes('open rate') || l.includes('email') || l.includes('sender') || l.includes('timing')) ? 'PASS' : 'FAIL'; } },
          { id: 'AP-05', category: 'AP', q: 'What\'s the difference between a campaign and a promotion?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('campaign') && l.includes('promotion') && a.length > 80) ? 'PASS' : 'FAIL'; } },
          { id: 'AP-06', category: 'AP', q: 'Should I use Facebook Ads or Google Ads for my fashion store?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('facebook') && l.includes('google') && (l.includes('audience') || l.includes('ads') || l.includes('fashion'))) ? 'PASS' : 'FAIL'; } },
          { id: 'AP-07', category: 'AP', q: 'How do I measure the ROI of my marketing campaigns?',
