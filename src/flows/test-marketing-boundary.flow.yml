              var refused = l.includes('cannot help') || l.includes('unable to help') || l.includes('not enough info') && a.length < 80;
              var helpful = l.includes('tell me more') || l.includes('could you') || l.includes('what') || l.includes('which') || l.includes('?') || a.length > 100;
              return helpful ? 'PASS' : (refused ? 'FAIL' : 'WARN');
