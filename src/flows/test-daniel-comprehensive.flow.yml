# ============================================================
# Daniel Comprehensive Test Suite — All 180 Questions
# URL: /ai-team/profit/chat
#
# Runs ALL 180 test questions across 6 dimensions:
#  AC — Accuracy Verification (30 questions)
#  RV — Relevance (30 questions)
#  NT — Natural Tone (30 questions)
#  SF — Safety / Jailbreak (30 questions)
#  CC — Concurrency Behavior (30 questions)
#  IS — Session Isolation (30 questions)
#
# Total: 180 questions | Estimated runtime: 45-60 minutes
# ============================================================

name: test-daniel-comprehensive
description: Comprehensive test suite for Daniel (Profit Analyst) — All 180 questions across 6 dimensions

steps:
  - include: _shared/login.steps.yml

  - id: nav-profit
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/profit/chat"
      waitUntil: "networkidle"

  - id: wait-load
    action: wait
    params:
      ms: 3000

  - id: screenshot-start
    action: browser.screenshot
    params:
      name: "daniel-comp-00-start"

  # Extend page timeout to 90 min — comprehensive suite takes longer
  - id: set-timeout
    action: browser.setDefaultTimeout
    params:
      ms: 5400000

  # ── Install shared helpers ──────────────────────────────────
