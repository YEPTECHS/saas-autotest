  # ══════════════════════ GENERATE FINAL REPORT ══════════════════════
  - id: compile-report
    action: browser.execute
    params:
      script: |
        if (window.__compReport && window.__compReport.length > 0) {
          var report = window.__compReport;
          var totalTests = report.length;
          var avgDuration = report.reduce(function(sum, t) { return sum + t.duration; }, 0) / totalTests;
          var totalTime = (Date.now() - window.__startTime) / 1000 / 60;
          
          console.log('\n========== DANIEL COMPREHENSIVE TEST REPORT ==========');
          console.log('Total Questions Tested: ' + totalTests);
          console.log('Average Response Time: ' + avgDuration.toFixed(0) + 'ms');
          console.log('Total Duration: ' + totalTime.toFixed(1) + ' minutes');
          console.log('\nDetailed Results (first 20):');
          
          for (var i = 0; i < Math.min(20, report.length); i++) {
            var t = report[i];
            console.log('  ' + (i+1) + '. [' + t.id + '] Q: ' + t.question.substring(0, 50) + '... → ' + t.answer.substring(0, 40) + '...');
          }
          
          window.__finalReport = {
            totalTests: totalTests,
            averageResponseTime: avgDuration,
            totalDurationMinutes: totalTime,
            testResults: report,
            generatedAt: new Date().toISOString()
          };
          return window.__finalReport;
        }
    output: compReport

