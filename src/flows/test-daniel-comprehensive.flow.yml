  # ── DIMENSION: RV (Relevance) ──────────────────
  - id: run-rv
    action: browser.execute
    params:
      script: |
        (async function() {
          var questions = [
            "I sell t-shirts at $20. My COGS is $8. What's my gross margin percentage?",
            "My top-selling SKU has a 35% margin but my competitor sells it at $10 less. What should I do?",
            "I have 500 units of a SKU in inventory that isn't selling. What are my options to improve profitability?",
            "My monthly inventory carrying cost is $2,000 but I only have $15,000 in average inventory. Is that sustainable?",
            "I want to launch a new product line with lower margins to attract customers. How do I know if it's worth it?",
            "My supplier just increased COGS by 10%. How should I adjust my pricing strategy?",
            "Which of my 200 SKUs should I discontinue based on profitability?",
            "I'm offering a 15% discount for bulk orders. Will this improve or hurt my margin?",
            "My SKU costs $30 to make and I'm selling it for $50. Is this pricing competitive in my market?",
            "How do I determine the optimal price point for a new premium SKU?",
            "My seasonal product has only 60 days to sell before it becomes obsolete. What pricing strategy should I use?",
            "I have two SKUs with similar COGS but different sales velocity. How do I price them differently?",
            "My marketplace charges 25% in fees. How does this affect my pricing strategy?",
            "I'm expanding to a new region. Should I adjust my SKU margins?",
            "What's a healthy gross margin for my industry if I'm in e-commerce?",
            "I have high inventory carrying costs. Should I discount slow-moving SKUs aggressively?",
            "My supplier offers 2% discount for payment within 10 days. Does this improve my margin?",
            "How do I price SKUs in a competitive category where margins are razor-thin?",
            "I'm considering a subscription model for my SKUs. How would this change my margin analysis?",
            "One SKU generates 60% of my revenue but only 30% of my profit. Should I reprice it?",
            "My warehouse space is limited. Which SKUs should I keep based on margin-per-square-foot?",
            "I want to increase my average order value. Which low-margin SKUs should I bundle?",
            "My return rate for one SKU is 25%. How does this affect its profitability calculation?",
            "I'm selling the same SKU on 5 different channels. Should I have different prices on each?",
            "My COGS varies between $50-$60 depending on order volume. How do I price for this variability?",
            "I just negotiated a 5% COGS reduction. Should I pass this to customers or keep the margin increase?",
            "How do I calculate the true cost of a SKU including hidden costs like packaging and labeling?",
            "My SKU has a 40% margin but negative inventory turns. Is it still profitable?",
            "I'm considering dropshipping a SKU. How does this affect my margin structure?",
            "What's the minimum margin I should accept for a SKU to break even after all overhead costs?"
          ];
          function getAISnapshots() { return Array.from(document.querySelectorAll('[class*="rounded-2xl"]')).filter(function(b) { return !b.className.includes('purple') && !b.className.includes('bg-purple'); }).map(function(b) { return b.textContent.trim().substring(0, 80); }); }
          function getLastAI() { var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]')); for (var i = bubbles.length - 1; i >= 0; i--) { var cls = bubbles[i].className || ''; if (!cls.includes('purple') && !cls.includes('bg-purple')) { var t = bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim(); if (t.length > 10) return t; } } return ''; }
          function waitForNewReply(snap) { return new Promise(function(resolve) { setTimeout(function() { var tries = 0; var t = setInterval(function() { tries++; var cur = getAISnapshots(); var hasNew = cur.length > snap.length || cur.some(function(s) { return s.length > 10 && snap.indexOf(s) === -1; }); if (hasNew || tries > 120) { clearInterval(t); setTimeout(resolve, 2000); } }, 500); }, 3000); }); }
          function waitSendReady() { return new Promise(function(resolve) { var tries = 0; var t = setInterval(function() { tries++; var ta = document.querySelector('textarea[placeholder*="Message"]'); if (!ta) { if (tries >= 120) { clearInterval(t); resolve(false); } return; } var btn = ta.parentElement ? ta.parentElement.querySelector('button') : null; if (!btn && ta.parentElement && ta.parentElement.parentElement) btn = ta.parentElement.parentElement.querySelector('button'); var ok = btn && !btn.disabled && btn.offsetParent !== null; if (ok || tries >= 120) { clearInterval(t); resolve(!!ok); } }, 500); }); }
          function fillAndSend(text) { var inp = document.querySelector('textarea[placeholder*="Message"]'); if (!inp) return false; try { Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, text); } catch(e) { inp.value = text; } inp.dispatchEvent(new Event('input', { bubbles: true })); inp.dispatchEvent(new Event('change', { bubbles: true })); var btn = inp.parentElement.querySelector('button') || Array.from(document.querySelectorAll('button')).find(function(b) { return b.offsetParent !== null && !b.disabled; }); if (btn) { btn.click(); return true; } return false; }
          var dim = 'RV';
          console.log('[' + dim + '] Starting 30 questions in fresh session');
          for (var i = 0; i < questions.length; i++) {
            var testId = dim + '-' + (i + 1).toString().padStart(2, '0');
            await waitSendReady(); var snap = getAISnapshots(); var startTime = Date.now();
            fillAndSend(questions[i]); await waitForNewReply(snap);
            var answer = getLastAI(); var duration = Date.now() - startTime;
            window.__compReport.push({ id: testId, question: questions[i], answer: answer.substring(0, 300), duration: duration, timestamp: new Date().toISOString() });
            console.log('[' + testId + '] ' + duration + 'ms | ' + answer.substring(0, 60));
          }
          console.log('[' + dim + '] Done'); return { dim: dim, count: questions.length };
        })();
    continueOnError: true

  # ── Refresh session before NT ──
  - id: refresh-for-nt
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/dashboard"
      waitUntil: "networkidle"
  - id: wait-nt-dash
    action: wait
    params:
      ms: 2000
  - id: nav-nt
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/profit/chat"
      waitUntil: "networkidle"
  - id: wait-nt-load
    action: wait
    params:
      ms: 3000

  # ── DIMENSION: NT (Natural Tone) — Fix #3: Real tone validation ──
  - id: run-nt
    action: browser.execute
    params:
      script: |
        (async function() {
          // Each question has a specific tone/format check
          var tests = [
            { q: "Hey, just give me a quick profit breakdown for my best seller", check: function(a) { return a.length < 800 ? 'PASS' : 'FAIL — response too long for quick request'; } },
            { q: "I'm stressed about my pricing. Talk to me like a friend, not an analyst", check: function(a) { var l = a.toLowerCase(); var formal = (l.match(/\b(therefore|furthermore|additionally|commence|utilize|pursuant)\b/g) || []).length; return formal <= 1 ? 'PASS' : 'FAIL — too formal/stiff for friendly tone'; } },
            { q: "My margins are killing me. What do I do?", check: function(a) { return a.length > 20 && a.length < 2000 ? 'PASS' : 'FAIL — response length inappropriate'; } },
            { q: "Be brief — what's the ONE thing I should fix in my pricing?", check: function(a) { var sentences = a.split(/[.!?]+/).filter(function(s) { return s.trim().length > 5; }); return sentences.length <= 5 ? 'PASS' : 'FAIL — not brief (' + sentences.length + ' sentences)'; } },
            { q: "Stop being so formal. Just chat with me about my SKUs", check: function(a) { var l = a.toLowerCase(); var casual = l.includes('!') || l.includes('hey') || l.includes('sure') || l.includes('let') || l.includes('yeah') || l.includes('ok') || l.includes('got it'); return casual ? 'PASS' : 'WARN — may still be too formal'; } },
            { q: "Can you just tell me which SKUs are money losers?", check: function(a) { return a.length > 10 ? 'PASS' : 'FAIL — no answer'; } },
            { q: "I need a margin analysis RIGHT NOW — what's important?", check: function(a) { return a.length > 20 && a.length < 1500 ? 'PASS' : 'FAIL — urgency not reflected in response length'; } },
            { q: "Write something concise and actionable, not a textbook definition", check: function(a) { var l = a.toLowerCase(); var textbook = l.includes('defined as') || l.includes('according to') || l.includes('in academic terms'); return !textbook ? 'PASS' : 'FAIL — sounds like a textbook'; } },
            { q: "My boss asked me for the data today. Give me something I can paste into an email", check: function(a) { var hasStructure = a.includes(':') || a.includes('-') || a.includes('•') || a.includes('\n'); return hasStructure ? 'PASS' : 'FAIL — not email-pasteable format'; } },
            { q: "I'm new to this. Explain margins to me simply", check: function(a) { var l = a.toLowerCase(); var jargon = (l.match(/\b(ebitda|roi calculation|marginal utility|elasticity coefficient|amortization)\b/g) || []).length; return jargon <= 1 ? 'PASS' : 'FAIL — too much jargon for a beginner'; } },
            { q: "Don't overwhelm me with numbers. Tell me the story", check: function(a) { var numbers = (a.match(/\d+\.?\d*/g) || []).length; return numbers <= 8 ? 'PASS' : 'FAIL — too many numbers (' + numbers + ')'; } },
            { q: "Give me a pricing recommendation without all the complex formulas", check: function(a) { var hasFormula = a.includes('=') && (a.includes('/') || a.includes('×') || a.includes('*')); return !hasFormula ? 'PASS' : 'FAIL — contains formulas'; } },
            { q: "Use percentages, not decimals. Make it scannable", check: function(a) { var hasPercent = a.includes('%'); var hasDecimal = /\b0\.\d+/.test(a); return hasPercent && !hasDecimal ? 'PASS' : (hasDecimal ? 'FAIL — uses decimals instead of %' : 'WARN — no percentages found'); } },
            { q: "What's the worst decision I could make with my current pricing?", check: function(a) { return a.length > 30 ? 'PASS' : 'FAIL — no substantive answer'; } },
            { q: "Summarize my entire product performance in 2-3 bullets", check: function(a) { var bullets = (a.match(/[-•●▸✓>]\s|^\d+\./gm) || []).length; return bullets >= 2 && bullets <= 5 ? 'PASS' : 'WARN — expected 2-3 bullets, got ' + bullets; } },
            { q: "I need this in a format for a spreadsheet, not a chat message", check: function(a) { var hasTable = a.includes('|') || a.includes('\t') || a.includes(',') || (a.match(/\n/g) || []).length >= 3; return hasTable ? 'PASS' : 'FAIL — not structured for spreadsheet'; } },
            { q: "Be enthusiastic! My margins are actually improving", check: function(a) { var l = a.toLowerCase(); var positive = l.includes('great') || l.includes('awesome') || l.includes('fantastic') || l.includes('excellent') || l.includes('amazing') || l.includes('!') || l.includes('congrat'); return positive ? 'PASS' : 'FAIL — not enthusiastic'; } },
            { q: "What would you do if this was your business?", check: function(a) { var l = a.toLowerCase(); var personal = l.includes('i would') || l.includes('i\'d') || l.includes('if i were') || l.includes('my approach') || l.includes('personally'); return personal ? 'PASS' : 'WARN — not personal enough'; } },
            { q: "Give me the 80/20 — what matters most for my margins?", check: function(a) { return a.length > 20 && a.length < 1500 ? 'PASS' : 'FAIL — should be focused, not exhaustive'; } },
            { q: "My gut feeling says prices are too low. Am I right?", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "Cut the jargon. Explain it like I'm 10", check: function(a) { var l = a.toLowerCase(); var jargon = (l.match(/\b(ebitda|amortization|depreciation|accrual|fiduciary|marginal cost)\b/g) || []).length; return jargon === 0 ? 'PASS' : 'FAIL — jargon detected: ' + jargon + ' terms'; } },
            { q: "No walls of text. Give me structured bullet points", check: function(a) { var bullets = (a.match(/[-•●▸>]\s|^\d+\./gm) || []).length; var lines = a.split('\n').filter(function(l) { return l.trim().length > 0; }).length; return bullets >= 3 || lines >= 4 ? 'PASS' : 'FAIL — no bullet structure found'; } },
            { q: "What's the most shocking thing about my SKU profitability?", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "I trust you. What's your honest recommendation?", check: function(a) { var l = a.toLowerCase(); var direct = l.includes('recommend') || l.includes('suggest') || l.includes('should') || l.includes('advise') || l.includes('would'); return direct ? 'PASS' : 'FAIL — no clear recommendation'; } },
            { q: "Make it visual if you can. Numbers bore me", check: function(a) { var visual = a.includes('|') || a.includes('█') || a.includes('▓') || a.includes('■') || a.includes('→') || a.includes('📊') || a.includes('chart') || a.includes('graph'); return visual || a.length > 30 ? 'PASS' : 'WARN'; } },
            { q: "Tell me what went wrong last quarter with my pricing", check: function(a) { return a.length > 30 ? 'PASS' : 'FAIL'; } },
            { q: "This is urgent. Prioritize the critical SKUs", check: function(a) { var l = a.toLowerCase(); var priority = l.includes('critical') || l.includes('urgent') || l.includes('priority') || l.includes('first') || l.includes('immediately') || l.includes('top'); return priority ? 'PASS' : 'FAIL — no prioritization evident'; } },
            { q: "Don't repeat what you already told me yesterday", check: function(a) { return a.length > 10 ? 'PASS' : 'FAIL'; } },
            { q: "Give me context, not just raw numbers", check: function(a) { var numbers = (a.match(/\d+/g) || []).length; var words = a.split(/\s+/).length; return words > numbers * 3 ? 'PASS' : 'FAIL — too number-heavy, not enough context'; } },
            { q: "How confident are you in this analysis?", check: function(a) { return a.length > 10 ? 'PASS' : 'FAIL'; } }
          ];
          function getAISnapshots() { return Array.from(document.querySelectorAll('[class*="rounded-2xl"]')).filter(function(b) { return !b.className.includes('purple') && !b.className.includes('bg-purple'); }).map(function(b) { return b.textContent.trim().substring(0, 80); }); }
          function getLastAI() { var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]')); for (var i = bubbles.length - 1; i >= 0; i--) { var cls = bubbles[i].className || ''; if (!cls.includes('purple') && !cls.includes('bg-purple')) { var t = bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim(); if (t.length > 10) return t; } } return ''; }
          function waitForNewReply(snap) { return new Promise(function(resolve) { setTimeout(function() { var tries = 0; var t = setInterval(function() { tries++; var cur = getAISnapshots(); var hasNew = cur.length > snap.length || cur.some(function(s) { return s.length > 10 && snap.indexOf(s) === -1; }); if (hasNew || tries > 120) { clearInterval(t); setTimeout(resolve, 2000); } }, 500); }, 3000); }); }
          function waitSendReady() { return new Promise(function(resolve) { var tries = 0; var t = setInterval(function() { tries++; var ta = document.querySelector('textarea[placeholder*="Message"]'); if (!ta) { if (tries >= 120) { clearInterval(t); resolve(false); } return; } var btn = ta.parentElement ? ta.parentElement.querySelector('button') : null; if (!btn && ta.parentElement && ta.parentElement.parentElement) btn = ta.parentElement.parentElement.querySelector('button'); var ok = btn && !btn.disabled && btn.offsetParent !== null; if (ok || tries >= 120) { clearInterval(t); resolve(!!ok); } }, 500); }); }
          function fillAndSend(text) { var inp = document.querySelector('textarea[placeholder*="Message"]'); if (!inp) return false; try { Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, text); } catch(e) { inp.value = text; } inp.dispatchEvent(new Event('input', { bubbles: true })); inp.dispatchEvent(new Event('change', { bubbles: true })); var btn = inp.parentElement.querySelector('button') || Array.from(document.querySelectorAll('button')).find(function(b) { return b.offsetParent !== null && !b.disabled; }); if (btn) { btn.click(); return true; } return false; }
          var dim = 'NT';
          console.log('[' + dim + '] Starting 30 questions in fresh session — with tone validation');
          for (var i = 0; i < tests.length; i++) {
            var testId = dim + '-' + (i + 1).toString().padStart(2, '0');
            await waitSendReady(); var snap = getAISnapshots(); var startTime = Date.now();
            fillAndSend(tests[i].q); await waitForNewReply(snap);
            var answer = getLastAI(); var duration = Date.now() - startTime;
            var status = tests[i].check(answer);
            window.__compReport.push({ id: testId, question: tests[i].q, answer: answer.substring(0, 300), duration: duration, status: status, timestamp: new Date().toISOString() });
            console.log('[' + testId + '] ' + status + ' | ' + duration + 'ms');
          }
          console.log('[' + dim + '] Done'); return { dim: dim, count: tests.length };
        })();
    continueOnError: true

