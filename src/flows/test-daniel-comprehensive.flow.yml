# ============================================================
# Daniel Comprehensive Test Suite — All 180 Questions
# URL: /ai-team/profit/chat
#
# Runs ALL 180 test questions across 6 dimensions:
#  AC — Accuracy Verification (30 questions)
#  RV — Relevance (30 questions)
#  NT — Natural Tone (30 questions)
#  SF — Safety / Jailbreak (30 questions)
#  CC — Concurrency Behavior (30 questions)
#  IS — Session Isolation (30 questions)
#
# Total: 180 questions | Estimated runtime: 45-60 minutes
# ============================================================

name: test-daniel-comprehensive
description: Comprehensive test suite for Daniel (Profit Analyst) — All 180 questions across 6 dimensions

steps:
  - include: _shared/login.steps.yml

  - id: nav-profit
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/profit/chat"
      waitUntil: "networkidle"

  - id: wait-load
    action: wait
    params:
      ms: 3000

  - id: screenshot-start
    action: browser.screenshot
    params:
      name: "daniel-comp-00-start"

  # Extend page timeout to 90 min — comprehensive suite takes longer
  - id: set-timeout
    action: browser.setDefaultTimeout
    params:
      ms: 5400000

  # ── Install shared helpers (persists across page refreshes via __compReport stored in test runner) ──
  - id: install-helpers
    action: browser.execute
    params:
      script: |
        // Global report array — will be re-attached after each page refresh
        window.__compReport = [];
        window.__startTime = Date.now();
        console.log('[DanielComp] Helpers ready');
        return true;

  # ══════════════════════ RUN ALL QUESTIONS ══════════════════════
  # Fix #1: Each dimension runs in a FRESH chat session (navigate away & back)
  # Fix #2: Snapshot-based response capture (compare before/after bubble count)
  # Fix #3: NT dimension has real tone/format validation

  # ── DIMENSION: AC (Accuracy Verification) ──────────────────
  - id: run-ac
    action: browser.execute
    params:
      script: |
        (async function() {
          var questions = [
            "What does SKU stand for?",
            "What does COGS stand for and how is it used in margin calculations?",
            "How is gross margin percentage calculated?",
            "What is the difference between markup and margin?",
            "What does inventory turnover rate measure?",
            "What is the break-even point and how do you calculate it?",
            "What does ASP stand for in pricing?",
            "What is price elasticity and why does it matter for SKU pricing?",
            "What is the difference between contribution margin and gross margin?",
            "Define fixed costs vs variable costs",
            "What is inventory carrying cost?",
            "What does AOV stand for and how is it calculated?",
            "What is a loss leader strategy?",
            "What does competitive pricing mean?",
            "What is dynamic pricing?",
            "Define vendor-managed inventory (VMI)",
            "What is the difference between cost-plus pricing and value-based pricing?",
            "What does FIFO stand for in inventory accounting?",
            "What is economic order quantity (EOQ)?",
            "Define price discrimination",
            "What is the formula for Return on Investment (ROI)?",
            "What does channel margin mean?",
            "What is the difference between list price and selling price?",
            "Define SKU proliferation",
            "What is the impact of bulk discounts on margin?",
            "What is cannibalization in product pricing?",
            "What is the difference between gross margin and net margin?",
            "Define seasonal adjustment in pricing",
            "What is the Pareto principle and how does it apply to SKU profitability?",
            "What is price floor and price ceiling?"
          ];
          // ── Shared helpers (re-installed per dimension after page refresh) ──
          function getAISnapshots() {
            return Array.from(document.querySelectorAll('[class*="rounded-2xl"]'))
              .filter(function(b) { return !b.className.includes('purple') && !b.className.includes('bg-purple'); })
              .map(function(b) { return b.textContent.trim().substring(0, 80); });
          }
          function getLastAI() {
            var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]'));
            for (var i = bubbles.length - 1; i >= 0; i--) {
              var cls = bubbles[i].className || '';
              if (!cls.includes('purple') && !cls.includes('bg-purple')) {
                var t = bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim();
                if (t.length > 10) return t;
              }
            }
            return '';
          }
          function waitForNewReply(snapBefore) {
            return new Promise(function(resolve) {
              setTimeout(function() {
                var tries = 0;
                var t = setInterval(function() {
                  tries++;
                  var cur = getAISnapshots();
                  var hasNew = cur.length > snapBefore.length || cur.some(function(s) { return s.length > 10 && snapBefore.indexOf(s) === -1; });
                  if (hasNew || tries > 120) { clearInterval(t); setTimeout(resolve, 2000); }
                }, 500);
              }, 3000);
            });
          }
          function waitSendReady() {
            return new Promise(function(resolve) {
              var tries = 0;
              var t = setInterval(function() {
                tries++;
                var ta = document.querySelector('textarea[placeholder*="Message"]');
                if (!ta) { if (tries >= 120) { clearInterval(t); resolve(false); } return; }
                var btn = ta.parentElement ? ta.parentElement.querySelector('button') : null;
                if (!btn && ta.parentElement && ta.parentElement.parentElement) btn = ta.parentElement.parentElement.querySelector('button');
                var ok = btn && !btn.disabled && btn.offsetParent !== null;
                if (ok || tries >= 120) { clearInterval(t); resolve(!!ok); }
              }, 500);
            });
          }
          function fillAndSend(text) {
            var inp = document.querySelector('textarea[placeholder*="Message"]');
            if (!inp) return false;
            try { Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, text); } catch(e) { inp.value = text; }
            inp.dispatchEvent(new Event('input', { bubbles: true }));
            inp.dispatchEvent(new Event('change', { bubbles: true }));
            var btn = inp.parentElement.querySelector('button') ||
              Array.from(document.querySelectorAll('button')).find(function(b) { return b.offsetParent !== null && !b.disabled; });
            if (btn) { btn.click(); return true; }
            return false;
          }

          var dim = 'AC';
          console.log('[' + dim + '] Starting 30 questions in fresh session');
          for (var i = 0; i < questions.length; i++) {
            var testId = dim + '-' + (i + 1).toString().padStart(2, '0');
            await waitSendReady();
            var snap = getAISnapshots();
            var startTime = Date.now();
            fillAndSend(questions[i]);
            await waitForNewReply(snap);
            var answer = getLastAI();
            var duration = Date.now() - startTime;
            window.__compReport.push({ id: testId, question: questions[i], answer: answer.substring(0, 300), duration: duration, timestamp: new Date().toISOString() });
            console.log('[' + testId + '] ' + duration + 'ms | ' + answer.substring(0, 60));
          }
          console.log('[' + dim + '] Done — ' + questions.length + ' tests');
          return { dim: dim, count: questions.length };
        })();
    continueOnError: true

  # ── Refresh session before RV ──
  - id: refresh-for-rv
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/dashboard"
      waitUntil: "networkidle"
  - id: wait-rv-dash
    action: wait
    params:
      ms: 2000
  - id: nav-rv
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/profit/chat"
