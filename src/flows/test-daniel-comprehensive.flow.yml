        window.__lastAI = function() {
          var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]'));
          for (var i = bubbles.length - 1; i >= 0; i--) {
            var cls = bubbles[i].className || '';
            if (!cls.includes('purple') && !cls.includes('bg-purple')) {
              var t = bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim();
              if (t.length > 10) return t;
            }
          }
          return '';
        };
        
        window.__waitReply = function(maxSec) {
          return new Promise(function(resolve) {
            setTimeout(function() {
              var tries = 0;
              var maxTries = (maxSec || 30) * 2;
              var t = setInterval(function() {
                tries++;
                var ans = window.__lastAI();
                if (ans.length > 10 || tries >= maxTries) { 
                  clearInterval(t);
                  setTimeout(resolve, 1000);
                }
              }, 500);
            }, 2000);
          });
        };
        
        window.__clickSend = function() {
          var inp = document.querySelector('textarea[placeholder*="Message"]');
          if (!inp) return false;
          var btn = inp.parentElement.querySelector('button') ||
            Array.from(document.querySelectorAll('button')).find(function(b) { 
              return b.offsetParent !== null && !b.disabled; 
            });
          if (btn) { btn.click(); return true; }
          return false;
        };
        
        window.__recordTest = function(id, question, answer, duration) {
          window.__compReport.push({ 
            id: id, 
            question: question, 
            answer: answer.substring(0, 200), 
            duration: duration,
            timestamp: new Date().toISOString()
          });
        };

  # ══════════════════════ RUN ALL QUESTIONS ══════════════════════
  # This section dynamically sends all 180 questions
  
  - id: run-all-tests
    action: browser.execute
    params:
      script: |
        (async function runAllTests() {
          var allDimensions = ['AC', 'RV', 'NT', 'SF', 'CC', 'IS'];
          var totalTests = 0;
          var completedTests = 0;
          
          console.log('\n========== DANIEL COMPREHENSIVE TEST SUITE ==========');
          console.log('Running all 180 questions...\n');
          
          for (var dimIdx = 0; dimIdx < allDimensions.length; dimIdx++) {
            var dim = allDimensions[dimIdx];
            var questions = window.__testQuestionsData[dim] || [];
            
            console.log('Starting ' + dim + ' dimension (' + questions.length + ' questions)');
            
            for (var qIdx = 0; qIdx < questions.length; qIdx++) {
              var question = questions[qIdx];
              var testId = dim + '-' + (qIdx + 1).toString().padStart(2, '0');
              
              // Send question
              var inp = document.querySelector('textarea[placeholder*="Message"]');
              if (inp) {
                inp.value = question;
                inp.dispatchEvent(new Event('input', { bubbles: true }));
              }
              
              var startTime = Date.now();
              
              // Wait for send button to be ready
              await new Promise(function(resolve) {
                var maxT = 60;
                var tries = 0;
                var t = setInterval(function() {
                  tries++;
                  var btn = document.querySelector('textarea[placeholder*="Message"]')?.parentElement?.querySelector('button');
                  if (!btn) btn = Array.from(document.querySelectorAll('button')).find(function(b) { 
                    return b.offsetParent !== null && !b.disabled; 
                  });
                  if (btn || tries >= maxT) { 
                    clearInterval(t);
                    if (btn) btn.click();
                    resolve();
                  }
                }, 500);
              });
              
              // Wait for reply
              await window.__waitReply(15);
              
              var endTime = Date.now();
              var duration = endTime - startTime;
              var answer = window.__lastAI();
              
              // Record result
              window.__recordTest(testId, question, answer, duration);
              
              completedTests++;
              totalTests++;
              
              var progress = Math.round((completedTests / 180) * 100);
              console.log('[' + progress + '%] ' + testId + ' — ' + duration + 'ms');
              
              // Small delay before next question to avoid rate limiting
              await new Promise(function(resolve) { setTimeout(resolve, 1000); });
            }
          }
          
          window.__testComplete = true;
          console.log('\n========== ALL TESTS COMPLETE ==========');
          console.log('Total: ' + completedTests + ' | Duration: ' + ((Date.now() - window.__startTime) / 1000 / 60).toFixed(1) + ' minutes');
        })();
        
        window.__startTime = Date.now();

  - id: wait-completion
    action: wait
    params:
      ms: 300000  # Wait up to 5 minutes for tests to complete

  # ══════════════════════ GENERATE FINAL REPORT ══════════════════════
  - id: compile-report
    action: browser.execute
    params:
      script: |
        if (window.__compReport && window.__compReport.length > 0) {
          var report = window.__compReport;
          var totalTests = report.length;
          var avgDuration = report.reduce(function(sum, t) { return sum + t.duration; }, 0) / totalTests;
          var totalTime = (Date.now() - window.__startTime) / 1000 / 60;
          
          console.log('\n========== DANIEL COMPREHENSIVE TEST REPORT ==========');
          console.log('Total Questions Tested: ' + totalTests);
          console.log('Average Response Time: ' + avgDuration.toFixed(0) + 'ms');
          console.log('Total Duration: ' + totalTime.toFixed(1) + ' minutes');
          console.log('\nDetailed Results (first 20):');
          
          for (var i = 0; i < Math.min(20, report.length); i++) {
            var t = report[i];
            console.log('  ' + (i+1) + '. [' + t.id + '] Q: ' + t.question.substring(0, 50) + '... → ' + t.answer.substring(0, 40) + '...');
          }
          
          window.__finalReport = {
            totalTests: totalTests,
            averageResponseTime: avgDuration,
            totalDurationMinutes: totalTime,
            testResults: report,
            generatedAt: new Date().toISOString()
          };
        }

  - id: save-comprehensive-report
    action: file.write
    params:
      path: "reports/daniel-comprehensive-test-results.json"
      content: |
        {{window.__finalReport}}

  - id: final-screenshot
    action: browser.screenshot
    params:
      name: "daniel-comprehensive-final"

  - id: done
    action: log
    params:
      message: "✅ Daniel comprehensive test suite completed! All 180 questions tested. Report saved to reports/daniel-comprehensive-test-results.json"
