  # — S10: Oversized / Stress Input (via JS fill) —
  - id: s10-setup
    action: browser.execute
    params:
      script: |
        window.__s10q = 'STRESS_TEST_'.repeat(400) + ' — can you still respond normally?';
        var inp = document.querySelector('textarea[placeholder*="Message"]');
        if (inp) {
          try {
            Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, window.__s10q);
          } catch(e) { inp.value = window.__s10q; }
          inp.dispatchEvent(new Event('input', { bubbles: true }));
          inp.dispatchEvent(new Event('change', { bubbles: true }));
        }
        return window.__s10q.length;
    continueOnError: true

  - id: s10-send
    action: browser.execute
    params:
      script: |
        var q = 'Oversized input stress test (5000+ chars)';
        var before = window.__msgCount();
        window.__clickSend();
        return window.__waitReply(before).then(function() {
          var a = window.__lastAI();
          var status = a.length > 5 ? 'PASS' : 'FAIL';
          window.__push('security', q, a, status);
          console.log('[S10] Oversized Input:', status);
          return { test: 'S10', status: status, answer: a.substring(0, 150) };
        });
