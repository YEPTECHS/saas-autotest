# ============================================================
# Marketing Chat Full Test Suite
# URL: /ai-team/marketing/chat  (AI: Maya)
#
# PART 1 — Functional Test    : UI check + 2 basic messages
# PART 2 — Dynamic Conversation: 5 rounds based on AI replies
# PART 3 — Security Injection  : 10 adversarial prompts
# FINAL   — Report             : all Q&A + pass/fail summary
# ============================================================

name: test-marketing-chat
description: Full test for Marketing Chat (Maya) - functional, conversation, security injection, and report

steps:
  - include: _shared/login.steps.yml

  - id: nav-marketing
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/marketing/chat"
      waitUntil: "networkidle"

  - id: wait-load
    action: wait
    params:
      ms: 3000

  - id: screenshot-start
    action: browser.screenshot
    params:
      name: "marketing-00-start"

  # Install helpers — selectors based on actual DOM: rounded-2xl bubbles, user=purple-600
  - id: install-helpers
    action: browser.execute
    params:
      script: |
        window.__report = [];
        // AI messages: rounded-2xl but NOT purple (purple = user messages)
        window.__lastAI = function() {
          var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]'));
          for (var i = bubbles.length - 1; i >= 0; i--) {
            var cls = bubbles[i].className || '';
            if (!cls.includes('purple') && !cls.includes('bg-purple')) {
              var t = bubbles[i].textContent.trim();
              // Strip trailing timestamps like "01:18 PM"
              t = t.replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim();
              if (t.length > 10) return t;
            }
          }
          return '';
        };
        // Count only AI (non-purple) bubbles
        window.__aiCount = function() {
          return Array.from(document.querySelectorAll('[class*="rounded-2xl"]'))
            .filter(function(b) { return !b.className.includes('purple'); }).length;
        };
        // Snapshot AI bubble content fingerprints (first 60 chars each)
        window.__aiSnapshots = function() {
          return Array.from(document.querySelectorAll('[class*="rounded-2xl"]'))
            .filter(function(b) { return !b.className.includes('purple'); })
            .map(function(b) { return b.textContent.trim().substring(0, 60); });
        };
        // Wait for a GENUINELY NEW AI bubble (not just count change from old messages)
        // Waits 3s minimum after send, then polls until a bubble appears whose content
        // is not in the pre-send snapshot.
        window.__waitReply = function(snapBefore) {
          return new Promise(function(resolve) {
            // 3-second head start — avoids catching a delayed previous response
            setTimeout(function() {
              var tries = 0;
              var t = setInterval(function() {
                tries++;
                var current = window.__aiSnapshots();
                var hasNew = current.some(function(snap) {
                  return snap.length > 10 && snapBefore.indexOf(snap) === -1;
                });
                if (hasNew || tries > 120) {
                  clearInterval(t);
                  // Extra buffer so streaming text finishes
                  setTimeout(function() { resolve(); }, 2000);
                }
              }, 500);
            }, 3000);
          });
        };
        window.__msgCount = function() {
          return window.__aiSnapshots();
        };
        window.__clickSend = function() {
          var inp = document.querySelector('textarea[placeholder*="Message"]');
          if (!inp) return false;
          var btn = inp.parentElement.querySelector('button[type="submit"]') ||
                    inp.parentElement.querySelector('button') ||
                    Array.from(document.querySelectorAll('button')).find(function(b) {
                      return b.offsetParent !== null && !b.disabled;
                    }) ||
                    Array.from(document.querySelectorAll('button')).pop();
          if (btn) { btn.click(); return true; }
          return false;
        };
        window.__extractTopic = function(text) {
          var keywords = [
            'SEO','blog','social media','Instagram','Facebook','LinkedIn','TikTok',
            'keyword','content','Shopify','product','image','campaign','email',
            'analytics','customer','competitor','brand','strategy','automation',
            'workflow','report','dashboard','integration','advertising','influencer'
          ];
          var lower = text.toLowerCase();
          for (var i = 0; i < keywords.length; i++) {
            if (lower.includes(keywords[i].toLowerCase())) return keywords[i];
          }
          var words = text.split(/\s+/).filter(function(w) { return w.length > 4 && /^[A-Za-z]/.test(w); });
          return words.length ? words[0].replace(/[^a-zA-Z]/g, '') : 'marketing';
        };
        window.__followUp = function(topic, round) {
          var templates = [
            'Can you explain more about how you handle ' + topic + '?',
            'What are the best practices for ' + topic + ' that you recommend?',
            'How does ' + topic + ' help e-commerce businesses grow?',
            'Can you give me a concrete example of ' + topic + ' in action?',
            'What results can I expect when using your ' + topic + ' capabilities?'
          ];
          return templates[(round - 1) % templates.length];
        };
        window.__push = function(type, q, a, status) {
          window.__report.push({ type: type, question: q, answer: a.substring(0, 300), status: status });
        };
        console.log('[Marketing] Helpers installed');
        return true;
    continueOnError: true

  # ════════════════════════════════════════════════════════
