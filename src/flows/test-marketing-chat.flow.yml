  # Reinstall all helpers after navigation
  - id: reinstall-helpers-part4
    action: browser.execute
    params:
      script: |
        window.__report = window.__report || [];
        window.__lastAI = function() {
          var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]'));
          for (var i = bubbles.length - 1; i >= 0; i--) {
            var cls = bubbles[i].className || '';
            if (!cls.includes('purple') && !cls.includes('bg-purple')) {
              var t = bubbles[i].textContent.trim();
              t = t.replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim();
              if (t.length > 10) return t;
            }
          }
          return '';
        };
        window.__aiSnapshots = function() {
          return Array.from(document.querySelectorAll('[class*="rounded-2xl"]'))
            .filter(function(b) { return !b.className.includes('purple'); })
            .map(function(b) { return b.textContent.trim().substring(0, 60); });
        };
        window.__waitReply = function(snapBefore) {
          return new Promise(function(resolve) {
            setTimeout(function() {
              var tries = 0;
              var t = setInterval(function() {
                tries++;
                var current = window.__aiSnapshots();
                var hasNew = current.some(function(snap) {
                  return snap.length > 10 && snapBefore.indexOf(snap) === -1;
                });
                if (hasNew || tries > 120) { clearInterval(t); setTimeout(function() { resolve(); }, 2000); }
              }, 500);
            }, 3000);
          });
        };
        window.__msgCount = function() { return window.__aiSnapshots(); };
        window.__clickSend = function() {
          var inp = document.querySelector('textarea[placeholder*="Message"]');
          if (!inp) return false;
          var btn = inp.parentElement.querySelector('button') ||
                    Array.from(document.querySelectorAll('button')).find(function(b) { return b.offsetParent !== null && !b.disabled; }) ||
                    Array.from(document.querySelectorAll('button')).pop();
          if (btn) { btn.click(); return true; }
          return false;
        };
        window.__push = function(type, q, a, status) {
          window.__report.push({ type: type, question: q, answer: a.substring(0, 300), status: status });
        };
        return true;
    continueOnError: true

  # Install skill-specific helper: wait until last AI message stabilises + send-ready check
  - id: install-skill-helpers
    action: browser.execute
    params:
      script: |
        // Wait until the last AI bubble content stops changing AND meets minLength.
        // maxSec default = 180 (3 min) — covers blog+image generation.
        window.__waitStable = function(minLength, maxSec) {
          return new Promise(function(resolve) {
            var last = '';
            var stableCount = 0;
            var totalTries = 0;
            var maxTries = (maxSec || 180) * 2;
            var t = setInterval(function() {
              totalTries++;
              var a = window.__lastAI();
              var meetsLength = a.length >= (minLength || 50);
              if (meetsLength && a === last) {
                stableCount++;
                if (stableCount >= 4) { clearInterval(t); resolve(a); return; }
              } else {
                stableCount = 0;
                last = a;
              }
              if (totalTries >= maxTries) { clearInterval(t); resolve(last || a); }
            }, 500);
          });
        };
        // Wait until the chat send button is enabled (chat not in "generating" state).
        // Needed between skill tests: blog/image generation keeps send disabled for minutes.
        // ONLY checks the button directly next to the textarea — avoids false positives
        // from other page buttons being enabled while chat is still generating.
        window.__waitSendReady = function(maxSec) {
          return new Promise(function(resolve) {
            var maxTries = (maxSec || 180) * 2;
            var tries = 0;
            var t = setInterval(function() {
              tries++;
              var ta = document.querySelector('textarea[placeholder*="Message"]');
              if (!ta) { if (tries >= maxTries) { clearInterval(t); resolve(false); } return; }
              // Only check the send button inside the textarea's immediate container
              var container = ta.parentElement;
              var sendBtn = container ? container.querySelector('button') : null;
              // Also try grandparent in case structure is: form > div > textarea + button
              if (!sendBtn && container && container.parentElement) {
                sendBtn = container.parentElement.querySelector('button');
              }
              var enabled = sendBtn && !sendBtn.disabled && sendBtn.offsetParent !== null;
              if (enabled || tries >= maxTries) { clearInterval(t); resolve(!!enabled); }
            }, 500);
          });
        };
        console.log('[Marketing] Skill helpers installed');
        return true;
    continueOnError: true

