    continueOnError: true

  - id: f1-send
    action: browser.execute
    params:
      script: |
        var before = window.__msgCount();
        window.__clickSend();
        return window.__waitReply(before).then(function() {
          var a = window.__lastAI();
          window.__push('functional', '你好，请问你能帮我做什么？', a, 'pass');
          console.log('[F1] A:', a.substring(0, 150));
          return { question: '你好，请问你能帮我做什么？', answer: a.substring(0, 200) };
