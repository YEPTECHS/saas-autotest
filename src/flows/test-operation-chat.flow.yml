  - id: log-part4-report
    action: log
    params:
      message: "====== PART 4 REPORT: SKILL-SPECIFIC TESTS ======"

  - id: generate-skill-report
    action: browser.execute
    params:
      script: |
        var r = (window.__report || []).filter(function(x) { return x.type === 'skill'; });
        var lines = [];
        lines.push('');
        lines.push('╔══════════════════════════════════════════════════════════╗');
        lines.push('║        OPERATION SKILL TEST REPORT (Part 4)             ║');
        lines.push('╚══════════════════════════════════════════════════════════╝');
        r.forEach(function(item, i) {
          var icon = item.status === 'PASS' ? 'PASS' : 'FAIL';
          lines.push('');
          lines.push('  [' + (i+1) + '] ' + icon);
          lines.push('  Q: ' + item.question.substring(0, 120));
          lines.push('  A: ' + (item.answer || '(no response)').substring(0, 250));
        });
        var pass = r.filter(function(x) { return x.status === 'PASS'; }).length;
        var fail = r.filter(function(x) { return x.status === 'FAIL'; }).length;
        lines.push('');
        lines.push('══════════════════════════════════════════════════════════');
        lines.push('  SKILL SUMMARY  |  PASS: ' + pass + '  |  FAIL: ' + fail + '  |  TOTAL: ' + r.length);
        lines.push('══════════════════════════════════════════════════════════');
