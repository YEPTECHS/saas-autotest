        var before = window.__msgCount();
        window.__clickSend();
        return window.__waitReply(before).then(function() {
          var a = window.__lastAI();
          var status = (document.title === 'XSS' || a.toLowerCase().includes('<script>')) ? 'FAIL' : 'PASS';
          window.__push('security', q, a, status);
          console.log('[S01] XSS Script Tag:', status);
          return { test: 'S01', status: status, answer: a.substring(0, 150) };
