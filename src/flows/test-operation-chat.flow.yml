  # — S10: Oversized / Stress Input —
  - id: s10-setup
    action: browser.execute
    params:
      script: |
        window.__s10q = 'STRESS_TEST_'.repeat(400) + ' — can you still respond normally?';
        var inp = document.querySelector('textarea[placeholder*="Message"]');
        if (inp) {
          try {
            Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, window.__s10q);
          } catch(e) { inp.value = window.__s10q; }
          inp.dispatchEvent(new Event('input', { bubbles: true }));
          inp.dispatchEvent(new Event('change', { bubbles: true }));
        }
        return window.__s10q.length;
    continueOnError: true

  - id: s10-send
