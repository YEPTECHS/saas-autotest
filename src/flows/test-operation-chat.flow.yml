          var hasProductInfo = a.toLowerCase().includes('product') || a.toLowerCase().includes('price') ||
                                a.toLowerCase().includes('商品') || a.includes('|');
          var status = (a.length > 10 && hasProductInfo) ? 'PASS' : 'FAIL';
          window.__push('skill', q, a, status);
          console.log('[SK6] Product catalog:', status);
          return { skill: 'product-catalog', status: status };
        });
    continueOnError: true
    output: sk6

