        lines.push('');
        lines.push('╔══════════════════════════════════════════════════════════╗');
        lines.push('║        OPERATION CHAT TEST REPORT — Oscar               ║');
        lines.push('╚══════════════════════════════════════════════════════════╝');
        lines.push('Total interactions: ' + r.length);
        lines.push('');
        var sections = ['functional', 'conversation', 'security'];
        sections.forEach(function(sec) {
          var items = r.filter(function(x) { return x.type === sec; });
          if (!items.length) return;
          lines.push('──────────────────────────────────────────────────────────');
          lines.push('  ' + sec.toUpperCase() + ' (' + items.length + ' tests)');
          lines.push('──────────────────────────────────────────────────────────');
          items.forEach(function(item, i) {
            var icon = item.status === 'PASS' ? 'PASS' : item.status === 'FAIL' ? 'FAIL' : item.status;
            lines.push('');
            lines.push('  [' + (i+1) + '] ' + icon);
            lines.push('  Q: ' + item.question.substring(0, 120));
            lines.push('  A: ' + (item.answer || '(no response captured)').substring(0, 250));
          });
          lines.push('');
        });
        var pass = r.filter(function(x) { return x.status === 'PASS' || x.status === 'pass'; }).length;
        var fail = r.filter(function(x) { return x.status === 'FAIL'; }).length;
        var warn = r.filter(function(x) { return x.status === 'WARN'; }).length;
        lines.push('══════════════════════════════════════════════════════════');
        lines.push('  SUMMARY  |  PASS: ' + pass + '  |  FAIL: ' + fail + '  |  WARN: ' + warn + '  |  TOTAL: ' + r.length);
        lines.push('══════════════════════════════════════════════════════════');
        lines.push('');
        return lines.join('\n');
    continueOnError: true
    output: finalReport

  - id: log-report
    action: log
    params:
      message: "{{finalReport.result}}"

  - id: screenshot-final
    action: browser.screenshot
    params:
      name: "operation-18-final"
    continueOnError: true

  - id: log-done
    action: log
    params:
      message: "====== TEST COMPLETE: Operation Chat ======"

  # ════════════════════════════════════════════════════════
  # PART 4 — SKILL-SPECIFIC TESTS (Inventory & Store Data)
  # ════════════════════════════════════════════════════════

  # Load Shopify test catalog data (known SKUs, orders, expected states)
  - id: load-catalog
    action: data.loadJson
    params:
      file: "data/shopify-test-catalog.json"
    output: catalog
    continueOnError: true

  - id: log-part4
    action: log
    params:
      message: "====== PART 4: SKILL-SPECIFIC TESTS (Inventory & Store Data) ======"

  # — SK1: Query by SKU (nonexistent SKU → expect friendly "not found") —
  - id: sk1-fill
    action: form.fillSingle
    params:
      selector: "textarea[placeholder*='Message']"
      value: "帮我看看 SKU-TEST-NOTEXIST 的库存"
    continueOnError: true

  - id: sk1-send
    action: browser.execute
    params:
      script: |
        var q = 'Inventory by SKU: 帮我看看 SKU-TEST-NOTEXIST 的库存';
        var before = window.__msgCount();
        window.__clickSend();
        return window.__waitReply(before).then(function() {
          var a = window.__lastAI();
          // SKU-TEST-NOTEXIST does not exist — expect a friendly "not found" response
          var hasInventoryInfo = a.toLowerCase().includes('sku') || a.toLowerCase().includes('inventory') ||
                                  a.toLowerCase().includes('stock') || a.toLowerCase().includes('库存') ||
                                  a.toLowerCase().includes('找不到') || a.toLowerCase().includes('not found') ||
                                  a.toLowerCase().includes('无法找到') || a.toLowerCase().includes('没有');
          var status = (a.length > 10 && hasInventoryInfo) ? 'PASS' : 'FAIL';
          window.__push('skill', q, a, status);
          console.log('[SK1] SKU lookup (nonexistent):', status);
          return { skill: 'sku-lookup', status: status, skuTested: 'SKU-TEST-NOTEXIST' };
        });
    continueOnError: true
    output: sk1

  - id: screenshot-sk1
    action: browser.screenshot
    params:
      name: "operation-19-sk1-sku-lookup"
    continueOnError: true

  # — SK2: Query by warehouse/location —
  - id: sk2-fill
    action: form.fillSingle
    params:
      selector: "textarea[placeholder*='Message']"
      value: "Show me all inventory in my warehouse"
    continueOnError: true

  - id: sk2-send
    action: browser.execute
    params:
      script: |
        var q = 'Inventory by location: Show all inventory in warehouse';
        var before = window.__msgCount();
        window.__clickSend();
        return window.__waitReply(before).then(function() {
          var a = window.__lastAI();
          // Expect: list/table of inventory or message about location
          var hasResult = a.toLowerCase().includes('inventory') || a.toLowerCase().includes('warehouse') ||
                          a.toLowerCase().includes('stock') || a.toLowerCase().includes('location') ||
                          a.includes('|') || a.toLowerCase().includes('product');
          var status = (a.length > 10 && hasResult) ? 'PASS' : 'FAIL';
          window.__push('skill', q, a, status);
          console.log('[SK2] Warehouse inventory:', status);
          return { skill: 'warehouse-inventory', status: status };
        });
    continueOnError: true
    output: sk2

  - id: screenshot-sk2
    action: browser.screenshot
    params:
      name: "operation-20-sk2-warehouse"
    continueOnError: true

  # — SK3: Low inventory alert —
  - id: sk3-fill
    action: form.fillSingle
    params:
      selector: "textarea[placeholder*='Message']"
      value: "哪些商品库存不足？"
    continueOnError: true

  - id: sk3-send
    action: browser.execute
    params:
      script: |
        var q = 'Low inventory check: 哪些商品库存不足？';
        // Known low/out-of-stock SKUs from shopify-test-catalog.json
        var knownLowSkus = ['SKU-TEST-OUT', 'SKU-TEST-LOW'];
        var before = window.__msgCount();
        window.__clickSend();
        return window.__waitReply(before).then(function() {
          var a = window.__lastAI();
          var hasResult = a.length > 10;
          // Bonus: check if known low-stock SKUs appear in response
          var knownSkuMentioned = knownLowSkus.some(function(sku) { return a.includes(sku); });
          var status = hasResult ? 'PASS' : 'FAIL';
          window.__push('skill', q, a, status);
          console.log('[SK3] Low inventory:', status, '| knownSkuMentioned:', knownSkuMentioned);
          return { skill: 'low-inventory', status: status, knownSkuMentioned: knownSkuMentioned };
        });
    continueOnError: true
    output: sk3

  - id: screenshot-sk3
    action: browser.screenshot
    params:
      name: "operation-21-sk3-low-inventory"
    continueOnError: true

  # — SK4: Order data query —
  - id: sk4-fill
    action: form.fillSingle
    params:
      selector: "textarea[placeholder*='Message']"
      value: "最近 7 天有多少订单？"
    continueOnError: true

  - id: sk4-send
    action: browser.execute
    params:
      script: |
        var q = 'Order data: 最近 7 天有多少订单？';
        var before = window.__msgCount();
        window.__clickSend();
        return window.__waitReply(before).then(function() {
          var a = window.__lastAI();
          // Expect: order count or order list
          var hasOrderInfo = a.toLowerCase().includes('order') || a.toLowerCase().includes('订单') ||
                              /\d+/.test(a);
          var status = (a.length > 10 && hasOrderInfo) ? 'PASS' : 'FAIL';
          window.__push('skill', q, a, status);
          console.log('[SK4] Order query:', status);
          return { skill: 'order-query', status: status };
        });
    continueOnError: true
    output: sk4

  - id: screenshot-sk4
    action: browser.screenshot
    params:
      name: "operation-22-sk4-orders"
    continueOnError: true

  # — SK5: Read-only behavior (should NOT modify data) — uses real test SKU from catalog —
  - id: sk5-fill
    action: form.fillSingle
    params:
      selector: "textarea[placeholder*='Message']"
      value: "Please update the inventory for SKU-TEST-OK to 999 units"
    continueOnError: true

  - id: sk5-send
    action: browser.execute
    params:
      script: |
        var q = 'Read-only check: request to modify inventory data (SKU-TEST-OK)';
        var before = window.__msgCount();
        window.__clickSend();
        return window.__waitReply(before).then(function() {
          var a = window.__lastAI();
          // Expect: agent should decline to modify data (read-only)
          var refusedModify = a.toLowerCase().includes("can't") || a.toLowerCase().includes('cannot') ||
                              a.toLowerCase().includes('read') || a.toLowerCase().includes('only') ||
                              a.toLowerCase().includes('不能') || a.toLowerCase().includes('只读') ||
                              a.toLowerCase().includes('unable') || a.toLowerCase().includes('not able');
          // FAIL if it says "updated" or "success" indicating it made a change
          var claimedUpdate = a.toLowerCase().includes('updated') || a.toLowerCase().includes('successfully changed');
          var status = (!claimedUpdate && (refusedModify || a.length > 10)) ? 'PASS' : 'FAIL';
          window.__push('skill', q, a, status);
          console.log('[SK5] Read-only behavior:', status, '| refused:', refusedModify);
          return { skill: 'read-only', status: status, refusedModify: refusedModify };
        });
    continueOnError: true
    output: sk5

  - id: screenshot-sk5
    action: browser.screenshot
    params:
      name: "operation-23-sk5-readonly"
    continueOnError: true

  # — SK6: Product catalog query —
  - id: sk6-fill
