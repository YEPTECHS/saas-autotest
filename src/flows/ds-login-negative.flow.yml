# Digital Staff — 登录 Negative Tests (负向测试)
# 验证登录表单对无效数据的错误处理

name: ds-login-negative
description: Digital Staff 登录验证（负向测试 — 空字段、错误密码、不存在账号）

steps:
  - id: navigate-login
    action: browser.navigate
    params:
      url: "{{DS_BASE_URL}}/#/login"
      waitUntil: "domcontentloaded"

  - id: wait-login-form
    action: browser.waitForSelector
    params:
      selector: "input[type='email'], input[name='email'], input[type='text']"
      timeout: 10000

  # ── 测试1：空表单提交 ─────────────────
  - id: click-submit-empty
    action: browser.click
    params:
      selector: "button[type='submit'], button:has-text('Sign in')"

  - id: screenshot-empty-submit
    action: browser.screenshot
    params:
      name: "ds-login-empty-validation"

  # ── 测试2：错误密码 ───────────────────
  - id: fill-email
    action: form.fillSingle
    params:
      selector: "input[type='email'], input[name='email']"
      value: "{{DS_LOGIN_EMAIL}}"

  - id: fill-wrong-password
    action: form.fillSingle
    params:
      selector: "input[type='password']"
      value: "WrongPassword999!"

  - id: click-submit-wrong-pw
    action: browser.click
    params:
      selector: "button[type='submit'], button:has-text('Sign in')"

  - id: wait-error-wrong-pw
    action: browser.waitForSelector
    params:
      selector: "[data-sonner-toast], .toaster li, [data-type='error'], [class*='error-message'], p:has-text('Invalid'), p:has-text('incorrect'), p:has-text('wrong'), p:has-text('failed'), p:has-text('error')"
      timeout: 15000

  - id: screenshot-wrong-password
    action: browser.screenshot
    params:
      name: "ds-login-wrong-password-error"

  # ── 测试3：不存在的邮箱 ───────────────
  - id: fill-nonexistent-email
    action: form.fillSingle
    params:
      selector: "input[type='email'], input[name='email']"
      value: "nonexistent-user-99999@fake.com"

  - id: fill-password-nonexistent
    action: form.fillSingle
    params:
      selector: "input[type='password']"
      value: "SomePassword123!"

  - id: click-submit-nonexistent
    action: browser.click
    params:
      selector: "button[type='submit'], button:has-text('Sign in')"

  - id: wait-error-nonexistent
    action: browser.waitForSelector
    params:
      selector: "[data-sonner-toast], .toaster li, [data-type='error'], [class*='error-message'], p:has-text('Invalid'), p:has-text('incorrect'), p:has-text('wrong'), p:has-text('failed'), p:has-text('error')"
      timeout: 15000

  - id: screenshot-nonexistent-email
    action: browser.screenshot
    params:
      name: "ds-login-nonexistent-email-error"

  - id: log-success
    action: log
    params:
      message: "Digital Staff 登录负向测试完成！"
