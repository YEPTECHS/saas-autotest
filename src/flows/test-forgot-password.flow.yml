# Forgot Password Flow
# Tests the forgot password page (unauthenticated)

name: test-forgot-password
description: Test Forgot Password page - form validation and UI elements

steps:
  # STEP 1: Navigate to forgot password page (no login needed)
  - id: navigate-forgot-password
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/auth/forgot-password"
      waitUntil: "domcontentloaded"

  # STEP 2: Wait for page to load
  - id: wait-page-load
    action: browser.waitForSelector
    params:
      selector: "input[type='email'], input[name='email']"
      timeout: 10000

  # STEP 3: Log test start
  - id: log-start
    action: log
    params:
      message: "Testing Forgot Password page..."

  # TEST CASE 1: Verify page heading
  - id: log-test-heading
    action: log
    params:
      message: "--- TEST 1: Verify page heading ---"

  - id: verify-heading
    action: browser.waitForSelector
    params:
      selector: "h1, h2, [class*='title'], [class*='heading']"
      timeout: 5000

  # TEST CASE 2: Verify email input exists
  - id: log-test-input
    action: log
    params:
      message: "--- TEST 2: Verify email input ---"

  - id: verify-email-input
    action: browser.waitForSelector
    params:
      selector: "input[type='email'], input[name='email']"
      timeout: 5000

  # TEST CASE 3: Submit with empty email (validation)
  - id: log-test-empty-submit
    action: log
    params:
      message: "--- TEST 3: Submit empty form ---"

  - id: click-reset-button-empty
    action: browser.click
    params:
      selector: "button[type='submit']"

  - id: wait-after-empty-submit
    action: wait
    params:
      ms: 1000

  - id: screenshot-empty-validation
    action: browser.screenshot
    params:
      name: "forgot-password-empty-validation"

  # TEST CASE 4: Fill invalid email and submit
  - id: log-test-invalid-email
    action: log
    params:
      message: "--- TEST 4: Submit invalid email ---"

  - id: fill-invalid-email
    action: form.fillSingle
    params:
      selector: "input[type='email'], input[name='email']"
      value: "notanemail"

  - id: click-reset-invalid
    action: browser.click
    params:
      selector: "button[type='submit']"

  - id: wait-after-invalid
    action: wait
    params:
      ms: 1000

  - id: screenshot-invalid-email
    action: browser.screenshot
    params:
      name: "forgot-password-invalid-email"

  # TEST CASE 5: Fill valid email and submit
  - id: log-test-valid-email
    action: log
    params:
      message: "--- TEST 5: Submit valid email ---"

  - id: clear-and-fill-valid-email
    action: form.fillSingle
    params:
      selector: "input[type='email'], input[name='email']"
      value: "{{YEPAI_LOGIN_EMAIL}}"

  - id: click-reset-valid
    action: browser.click
    params:
      selector: "button[type='submit']"

  - id: wait-after-valid-submit
    action: wait
    params:
      ms: 2000

  - id: screenshot-after-submit
    action: browser.screenshot
    params:
      name: "forgot-password-after-submit"

  # TEST CASE 6: Verify Back to Login link
  - id: log-test-back-link
    action: log
    params:
      message: "--- TEST 6: Verify Back to Login link ---"

  - id: navigate-back-forgot
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/auth/forgot-password"
      waitUntil: "domcontentloaded"

  - id: wait-back-link
    action: browser.waitForSelector
    params:
      selector: "a[href*='login'], button:has-text('Back'), a:has-text('Back')"
      timeout: 5000

  - id: click-back-to-login
    action: browser.click
    params:
      selector: "a[href*='login'], button:has-text('Back'), a:has-text('Back')"

  - id: wait-login-page
    action: browser.waitForSelector
    params:
      selector: "input[type='email'], input[name='email']"
      timeout: 10000

  - id: screenshot-back-login
    action: browser.screenshot
    params:
      name: "forgot-password-back-to-login"

  - id: log-success
    action: log
    params:
      message: "Forgot Password page test completed successfully!"
