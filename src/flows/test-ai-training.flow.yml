# YepAI AI Training Full Test Suite
# Tests all AI Training section pages: Knowledge, Product, Preview

name: test-ai-training
description: Full test suite for all AI Training pages

steps:
  - include: _shared/login.steps.yml

  # ========================================
  # TEST 1: Knowledge Base Page
  # ========================================

  - id: log-knowledge-start
    action: log
    params:
      message: "=== Testing Knowledge Base page ==="

  - id: navigate-knowledge
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-training/knowledge"
      waitUntil: "networkidle"

  - id: wait-knowledge
    action: browser.waitForSelector
    params:
      selector: "main"
      timeout: 15000

  - id: screenshot-knowledge
    action: browser.screenshot
    params:
      name: "ai-training-knowledge"

  - id: log-knowledge-done
    action: log
    params:
      message: "Knowledge Base page loaded"

  # ========================================
  # TEST 2: Product Training Page
  # ========================================

  - id: log-product-start
    action: log
    params:
      message: "=== Testing Product Training page ==="

  - id: wait-before-product
    action: wait
    params:
      ms: 1000

  - id: navigate-product
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-training/product"
      waitUntil: "domcontentloaded"

  - id: wait-product
    action: browser.waitForSelector
    params:
      selector: "main, body"
      timeout: 30000

  - id: wait-product-load
    action: wait
    params:
      ms: 3000

  # Verify key elements
  - id: verify-product-elements
    action: browser.execute
    params:
      script: |
        const elements = {
          checkbox: !!document.querySelector('input[type="checkbox"]'),
          search: !!document.querySelector('input[type="text"], input[type="search"]'),
          button: !!document.querySelector('button'),
          cards: document.querySelectorAll('[class*="card"], [class*="Card"]').length
        };
        console.log('Product Training elements:', JSON.stringify(elements));
        return elements.checkbox || elements.search || elements.button;

  - id: screenshot-product
    action: browser.screenshot
    params:
      name: "ai-training-product"

  - id: log-product-done
    action: log
    params:
      message: "Product Training page loaded"

  # ========================================
  # TEST 3: Preview & Test Page
  # ========================================

  - id: log-preview-start
    action: log
    params:
      message: "=== Testing Preview & Test page ==="

  - id: wait-before-preview
    action: wait
    params:
      ms: 2000

  - id: navigate-preview
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-training/preview"
      waitUntil: "domcontentloaded"
    continueOnError: true

  - id: wait-preview
    action: browser.waitForSelector
    params:
      selector: "main, body"
      timeout: 30000

  - id: wait-preview-load
    action: wait
    params:
      ms: 3000

  # Verify chat/preview interface
  - id: verify-preview-elements
    action: browser.execute
    params:
      script: |
        const elements = {
          input: !!document.querySelector('input, textarea'),
          chat: !!document.querySelector('[class*="chat"], [class*="message"], [class*="preview"]'),
          button: !!document.querySelector('button')
        };
        console.log('Preview elements:', JSON.stringify(elements));
        return elements.input || elements.chat;

  - id: screenshot-preview
    action: browser.screenshot
    params:
      name: "ai-training-preview"

  - id: log-preview-done
    action: log
    params:
      message: "Preview & Test page loaded"

  # ========================================
  # SUMMARY
  # ========================================

  - id: log-complete
    action: log
    params:
      message: "=== All AI Training pages tested successfully! ==="
