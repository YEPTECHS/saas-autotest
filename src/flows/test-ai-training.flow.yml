# YepAI AI Training Pages Test Flow
# Tests Knowledge Base, Product Training, and Preview & Test pages

name: test-ai-training
description: Test all AI Training section pages

steps:
  # ========================================
  # LOGIN PHASE
  # ========================================

  - id: navigate-login
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/auth/login"
      waitUntil: "domcontentloaded"

  - id: wait-login-form
    action: browser.waitForSelector
    params:
      selector: "input[type='email'], input[name='email'], #email"
      timeout: 10000

  - id: fill-email
    action: form.fillSingle
    params:
      selector: "input[type='email'], input[name='email'], #email"
      value: "{{YEPAI_LOGIN_EMAIL}}"

  - id: fill-password
    action: form.fillSingle
    params:
      selector: "input[type='password'], input[name='password'], #password"
      value: "{{YEPAI_LOGIN_PASSWORD}}"

  - id: wait-submit-enabled
    action: browser.waitForSelector
    params:
      selector: "button[type='submit']:not([disabled])"
      timeout: 5000

  - id: click-login
    action: browser.click
    params:
      selector: "button[type='submit']"

  - id: wait-dashboard
    action: browser.waitForUrl
    params:
      pattern: "dashboard|home|ai-training|analytics|customers"
      timeout: 30000

  - id: log-login-success
    action: log
    params:
      message: "Login successful, starting AI Training tests..."

  # ========================================
  # TEST 1: Knowledge Base Page
  # ========================================

  - id: log-knowledge-start
    action: log
    params:
      message: "Testing Knowledge Base page..."

  - id: navigate-knowledge
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-training/knowledge"
      waitUntil: "networkidle"

  - id: wait-knowledge-content
    action: browser.waitForSelector
    params:
      selector: "main, [class*='knowledge'], [class*='content']"
      timeout: 15000

  - id: screenshot-knowledge
    action: browser.screenshot
    params:
      name: "ai-training-knowledge"

  - id: log-knowledge-done
    action: log
    params:
      message: "Knowledge Base page loaded successfully"

  # ========================================
  # TEST 2: Product Training Page
  # ========================================

  - id: log-product-start
    action: log
    params:
      message: "Testing Product Training page..."

  - id: navigate-product
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-training/product"
      waitUntil: "networkidle"

  - id: wait-product-content
    action: browser.waitForSelector
    params:
      selector: "main, [class*='product'], [class*='training']"
      timeout: 15000

  - id: screenshot-product
    action: browser.screenshot
    params:
      name: "ai-training-product"

  - id: log-product-done
    action: log
    params:
      message: "Product Training page loaded successfully"

  # ========================================
  # TEST 3: Preview & Test Page
  # ========================================

  - id: log-preview-start
    action: log
    params:
      message: "Testing Preview & Test page..."

  - id: navigate-preview
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-training/preview"
      waitUntil: "networkidle"

  - id: wait-preview-content
    action: browser.waitForSelector
    params:
      selector: "main, [class*='preview'], [class*='test']"
      timeout: 15000

  - id: screenshot-preview
    action: browser.screenshot
    params:
      name: "ai-training-preview"

  - id: log-preview-done
    action: log
    params:
      message: "Preview & Test page loaded successfully"

  # Final summary
  - id: log-ai-training-complete
    action: log
    params:
      message: "All AI Training pages tested successfully!"
