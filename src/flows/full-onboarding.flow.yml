# YepAI Full Onboarding Flow
# Complete user journey: Registration -> Email Verification -> Shopify Installation

name: full-onboarding
description: Complete YepAI onboarding including registration and Shopify app installation

variables:
  baseUrl: "{{YEPAI_BASE_URL}}"
  testEmail: "{{YEPAI_TEST_EMAIL}}"
  testPassword: "{{YEPAI_TEST_PASSWORD}}"
  testFirstName: "{{YEPAI_TEST_FIRST_NAME}}"
  testLastName: "{{YEPAI_TEST_LAST_NAME}}"
  testOrganization: "{{YEPAI_TEST_ORGANIZATION}}"
  shopifyStore: "{{SHOPIFY_STORE_URL}}"
  shopifyEmail: "{{SHOPIFY_EMAIL}}"
  shopifyPassword: "{{SHOPIFY_PASSWORD}}"
  selectedPlan: "{{SHOPIFY_SELECTED_PLAN}}"

steps:
  # ============================================
  # PHASE 1: User Registration
  # ============================================

  - id: log-phase-1
    action: log
    params:
      message: "=== PHASE 1: User Registration ==="

  - id: navigate-register
    action: browser.navigate
    params:
      url: "{{baseUrl}}/auth/register"

  - id: wait-register-form
    action: browser.waitForSelector
    params:
      selector: "form"
      timeout: 10000

  - id: fill-registration
    action: form.fill
    params:
      fields:
        firstName: "{{testFirstName}}"
        lastName: "{{testLastName}}"
        email: "{{testEmail}}"
        password: "{{testPassword}}"
        organization: "{{testOrganization}}"

  - id: accept-terms
    action: browser.click
    params:
      selector: "input[type='checkbox']"
    continueOnError: true

  - id: submit-registration
    action: browser.click
    params:
      selector: "button[type='submit']"
    waitFor: navigation

  - id: screenshot-after-register
    action: browser.screenshot
    params:
      path: "screenshots/phase1_registration_submitted.png"

  # ============================================
  # PHASE 2: Email Verification
  # ============================================

  - id: log-phase-2
    action: log
    params:
      message: "=== PHASE 2: Email Verification ==="

  - id: wait-verification-page
    action: browser.waitForUrl
    params:
      pattern: "verify|confirmation"
      timeout: 15000

  - id: wait-for-email
    action: gmail.waitForEmail
    params:
      to: "{{testEmail}}"
      subject: "YepAI"
      timeout: 90000
    output: verificationEmail

  - id: extract-code
    action: gmail.extractCode
    params:
      email: "{{verificationEmail}}"
      pattern: "\\d{6}"
    output: verificationCode

  - id: log-code
    action: log
    params:
      message: "Verification code: {{verificationCode}}"

  - id: enter-code
    action: form.fill
    params:
      fields:
        code: "{{verificationCode}}"
        verificationCode: "{{verificationCode}}"

  - id: submit-verification
    action: browser.click
    params:
      selector: "button[type='submit'], button:has-text('Verify')"

  - id: wait-after-verification
    action: browser.waitForUrl
    params:
      pattern: "dashboard|onboarding|home"
      timeout: 15000

  - id: screenshot-after-verification
    action: browser.screenshot
    params:
      path: "screenshots/phase2_email_verified.png"

  # ============================================
  # PHASE 3: Shopify Installation
  # ============================================

  - id: log-phase-3
    action: log
    params:
      message: "=== PHASE 3: Shopify Installation ==="

  - id: navigate-installation
    action: browser.navigate
    params:
      url: "{{baseUrl}}/installation"

  - id: wait-installation-page
    action: browser.waitForSelector
    params:
      selector: "[data-tab='shopify'], button:has-text('Shopify')"
      timeout: 10000

  - id: click-shopify-tab
    action: browser.click
    params:
      selector: "[data-tab='shopify'], button:has-text('Shopify')"

  - id: wait-for-install-button
    action: wait
    params:
      ms: 1000

  - id: click-install
    action: browser.click
    params:
      selector: "button:has-text('Install'), button:has-text('Connect')"

  - id: wait-shopify-page
    action: browser.waitForUrl
    params:
      pattern: "shopify\\.com|myshopify\\.com"
      timeout: 30000

  - id: shopify-store-input
    action: form.fill
    params:
      fields:
        shop: "{{shopifyStore}}"
    continueOnError: true

  - id: shopify-submit-store
    action: browser.click
    params:
      selector: "button[type='submit']"
    continueOnError: true

  - id: shopify-wait-login
    action: browser.waitForSelector
    params:
      selector: "input[type='email'], input[name='account[email]']"
      timeout: 15000
    continueOnError: true

  - id: shopify-fill-email
    action: browser.type
    params:
      selector: "input[type='email'], input[name='account[email]']"
      text: "{{shopifyEmail}}"
    continueOnError: true

  - id: shopify-continue
    action: browser.click
    params:
      selector: "button[type='submit']"
    continueOnError: true

  - id: shopify-wait-password
    action: browser.waitForSelector
    params:
      selector: "input[type='password']"
      timeout: 10000
    continueOnError: true

  - id: shopify-fill-password
    action: browser.type
    params:
      selector: "input[type='password']"
      text: "{{shopifyPassword}}"
    continueOnError: true

  - id: shopify-login
    action: browser.click
    params:
      selector: "button[type='submit']"
    continueOnError: true

  - id: shopify-wait-authorize
    action: browser.waitForSelector
    params:
      selector: "button:has-text('Install'), button:has-text('Approve')"
      timeout: 30000
    continueOnError: true

  - id: shopify-authorize
    action: browser.click
    params:
      selector: "button:has-text('Install app'), button:has-text('Install')"

  - id: wait-callback
    action: browser.waitForUrl
    params:
      pattern: "yepai|callback"
      timeout: 45000

  - id: select-plan
    action: browser.click
    params:
      selector: "[data-plan='{{selectedPlan}}'], button:has-text('Select')"
    continueOnError: true

  - id: wait-success
    action: browser.waitForSelector
    params:
      selector: "[data-status='connected'], :has-text('Connected')"
      timeout: 30000

  - id: screenshot-final
    action: browser.screenshot
    params:
      path: "screenshots/phase3_onboarding_complete.png"

  # ============================================
  # COMPLETE
  # ============================================

  - id: log-complete
    action: log
    params:
      message: "=== FULL ONBOARDING COMPLETED SUCCESSFULLY ==="
