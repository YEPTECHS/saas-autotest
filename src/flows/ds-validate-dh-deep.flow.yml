        if (!confirmBtn) return { skipped: true, reason: 'No confirm dialog appeared' };
        confirmBtn.click();
        return { confirmed: true, label: confirmBtn.textContent.trim() };
    output: deleteConfirmResult

  - id: wait-after-delete
    action: wait
    params:
      ms: 2000

  - id: screenshot-after-delete
    action: browser.screenshot
    params:
      name: "ds-dh-deep-28-after-delete"

  - id: verify-test-dh-deleted
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"]')).filter(c =>
          c.textContent.includes('Test Automation DH')
        );
        const body = document.body.innerText;
        const hasSuccessToast = body.toLowerCase().includes('deleted') || body.toLowerCase().includes('removed') ||
                                !!document.querySelector('[data-sonner-toast]');
        return {
          testDhStillVisible: cards.length > 0,
          deleted: cards.length === 0,
          hasSuccessToast
        };
    output: deleteVerifyResult

  # ════════════════════════════════════════════════════════════════
  # Group 8: Dashboard 计数一致性验证
  # ════════════════════════════════════════════════════════════════
  - id: capture-dh-total-on-list
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"]')).filter(c => {
          const t = c.textContent.trim();
          return t.includes('Running') || t.includes('Idle') || t.includes('Stopped');
        });
        const running = cards.filter(c => c.textContent.includes('Running')).length;
        return { totalOnListPage: cards.length, runningOnListPage: running };
    output: dhListCount

  - id: navigate-to-dashboard
    action: browser.click
    params:
      selector: "nav a:has-text('Dashboard'), aside a:has-text('Dashboard'), a[href*='dashboard']"

  - id: wait-dashboard-load
    action: browser.waitForSelector
    params:
      selector: "h1, h2, [class*='card']"
      timeout: 15000

  - id: wait-dashboard-data
    action: wait
    params:
      ms: 4000

  - id: screenshot-dashboard-comparison
    action: browser.screenshot
    params:
      name: "ds-dh-deep-29-dashboard-comparison"

  - id: verify-dh-count-matches-dashboard
    action: browser.execute
    params:
      script: |
        const body = document.body.innerText;
        const dhMatch = body.match(/(\d+)\s*\/\s*(\d+)\s*(currently running|active digital human|Digital Human)/i);
        if (!dhMatch) {
          return { warning: 'Could not find X/Y digital human counter on Dashboard', bodySnippet: body.slice(0, 400) };
        }
        return { dashboardRunning: parseInt(dhMatch[1]), dashboardTotal: parseInt(dhMatch[2]), rawMatch: dhMatch[0] };
    output: dashboardDhCount

  - id: log-success
    action: log
    params:
      message: "Digital Humans 全面深度验证完成！8组测试：卡片审计、过滤计数、3-dot菜单(Edit+Delete)、搜索边界、详情页(4tabs)、Chat、Create完整流程(填字段+Next/Back+创建+清理)、Dashboard一致性。"
