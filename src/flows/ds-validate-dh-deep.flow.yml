# Digital Staff — Digital Humans 深度验证 (Enhanced)
# 覆盖：卡片完整性审计、过滤器计数、3-dot菜单（Edit/Delete）、搜索边界、
#        卡片详情页、Detail Tabs、Chat按钮、
#        Create完整流程（填字段+Next+Back+所有步骤按钮+实际创建+清理）、
#        Dashboard 计数一致性

name: ds-validate-dh-deep
description: Digital Humans 全面深度验证 — 卡片审计、过滤、3-dot菜单、搜索、详情、Chat、Create完整流程、Dashboard一致性

steps:
  - include: ds-login.flow.yml

  - id: navigate-dh
    action: browser.click
    params:
      selector: "nav a:has-text('Digital Humans'), aside a:has-text('Digital Humans'), a[href*='digital']"

  - id: wait-dh-page
    action: browser.waitForSelector
    params:
      selector: "h1:has-text('Digital Humans')"
      timeout: 15000

  - id: wait-cards-settle
    action: wait
    params:
      ms: 2000

  - id: screenshot-dh-list
    action: browser.screenshot
    params:
      name: "ds-dh-deep-01-list"

  # ════════════════════════════════════════════════════════════════
  # Group 1: 卡片完整性审计
  # ════════════════════════════════════════════════════════════════
  - id: audit-dh-cards
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"]')).filter(c => {
          const t = c.textContent.trim();
          return t.length > 10 && (t.includes('Running') || t.includes('Idle') || t.includes('Stopped'));
        });
        if (cards.length === 0) return { total: 0, note: '⚠️ Fresh account — no DH cards yet. Card/filter/3-dot/search/detail tests will be skipped; Create flow will run.' };
        const inventory = cards.map((card, i) => {
          const text = card.textContent;
          const statusMatch = text.match(/Running|Idle|Stopped/);
          const buttons = card.querySelectorAll('button, a[role="button"]');
          return {
            index: i,
            status: statusMatch ? statusMatch[0] : 'UNKNOWN',
            buttonCount: buttons.length,
            buttonLabels: Array.from(buttons).map(b => b.textContent.trim().slice(0, 20)),
            preview: text.slice(0, 80).trim().replace(/\s+/g, ' ')
          };
        });
        const noStatus = inventory.filter(c => c.status === 'UNKNOWN');
        if (noStatus.length > 0) throw new Error('Cards missing status badge: ' + JSON.stringify(noStatus));
        const noButtons = inventory.filter(c => c.buttonCount === 0);
        if (noButtons.length > 0) throw new Error('Cards missing action buttons: ' + JSON.stringify(noButtons));
        return { total: inventory.length, cards: inventory };
    output: dhInventory

  # ════════════════════════════════════════════════════════════════
  # Group 2: 过滤器计数一致性验证
  # ════════════════════════════════════════════════════════════════
  - id: click-all-tab
    action: browser.click
    params:
      selector: "button:has-text('All'), [role='tab']:has-text('All'), [class*='tab']:has-text('All')"

  - id: wait-all-tab
    action: wait
    params:
      ms: 800

  - id: capture-all-count
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"]')).filter(c => {
          const t = c.textContent.trim();
          return t.includes('Running') || t.includes('Idle') || t.includes('Stopped');
        });
        return { allCount: cards.length };
    output: allTabCount

  - id: click-running-tab
    action: browser.click
    params:
      selector: "button:has-text('Running'), [role='tab']:has-text('Running'), [class*='tab']:has-text('Running')"

  - id: wait-running-tab
    action: wait
    params:
      ms: 800

  - id: screenshot-running-filter
    action: browser.screenshot
    params:
      name: "ds-dh-deep-02-running-filter"

  - id: verify-running-filter-accuracy
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"]')).filter(c => {
          const t = c.textContent.trim();
          return t.includes('Running') || t.includes('Idle') || t.includes('Stopped');
        });
        const idleVisible = cards.filter(c => c.textContent.includes('Idle'));
        if (idleVisible.length > 0) throw new Error('Running filter showing Idle cards (' + idleVisible.length + '). Filter broken.');
        return { runningCount: cards.length, pass: true };
    output: runningFilterResult

  - id: click-idle-tab
    action: browser.click
    params:
      selector: "button:has-text('Idle'), [role='tab']:has-text('Idle'), [class*='tab']:has-text('Idle')"

  - id: wait-idle-tab
    action: wait
    params:
      ms: 800

  - id: screenshot-idle-filter
    action: browser.screenshot
    params:
      name: "ds-dh-deep-03-idle-filter"

  - id: verify-idle-filter-accuracy
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"]')).filter(c => {
          const t = c.textContent.trim();
          return t.includes('Running') || t.includes('Idle') || t.includes('Stopped');
        });
        const runningVisible = cards.filter(c => c.textContent.includes('Running') && !c.textContent.includes('Idle'));
        if (runningVisible.length > 0) throw new Error('Idle filter showing Running cards (' + runningVisible.length + '). Filter broken.');
        return { idleCount: cards.length, pass: true };
    output: idleFilterResult

  - id: click-all-tab-restore
    action: browser.click
    params:
      selector: "button:has-text('All'), [role='tab']:has-text('All'), [class*='tab']:has-text('All')"

  - id: wait-all-restored
    action: wait
    params:
      ms: 800

  # ════════════════════════════════════════════════════════════════
  # Group 3 (NEW): 卡片 3-dot 菜单完整验证
  # ════════════════════════════════════════════════════════════════
  - id: find-and-click-three-dot-menu
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"]')).filter(c => {
          const t = c.textContent.trim();
          return t.includes('Running') || t.includes('Idle');
        });
        if (cards.length === 0) return { skipped: true, reason: 'No cards found' };
        const card = cards[0];
        const dots = Array.from(card.querySelectorAll('button, [role="button"]')).find(b => {
          const text = b.textContent.trim();
          const label = (b.getAttribute('aria-label') || '').toLowerCase();
          const cls = (b.className || '').toLowerCase();
          return text === '...' || text === '⋮' || text === '···' || text === '•••' ||
                 label.includes('more') || label.includes('option') || label.includes('menu') ||
                 cls.includes('more') || cls.includes('kebab') || cls.includes('dots') ||
                 cls.includes('ellipsis') || cls.includes('dropdown');
        });
        if (!dots) {
          const allBtns = Array.from(card.querySelectorAll('button')).map(b => ({
            text: b.textContent.trim(), label: b.getAttribute('aria-label') || '', cls: b.className.slice(0, 50)
          }));
          return { found: false, cardButtons: allBtns };
        }
        dots.click();
        return { found: true, clicked: true, btnText: dots.textContent.trim(), btnLabel: dots.getAttribute('aria-label') || '' };
    output: threeDotClickResult

  - id: wait-dropdown-open
    action: wait
    params:
      ms: 800

  - id: screenshot-three-dot-dropdown
    action: browser.screenshot
    params:
      name: "ds-dh-deep-04-dots-dropdown"

  - id: verify-dropdown-has-options
    action: browser.execute
    params:
      script: |
        const dropdowns = document.querySelectorAll('[role="menu"], [role="listbox"], [class*="dropdown"], [class*="Dropdown"], [class*="popover"], [class*="Popover"], [data-radix-popper-content-wrapper]');
        if (dropdowns.length === 0) {
          return { dropdownFound: false, bodySnippet: document.body.innerText.slice(0, 300) };
        }
        const menuItems = new Set();
        dropdowns.forEach(d => {
          d.querySelectorAll('[role="menuitem"], [role="option"], button, a, li').forEach(i => {
            const t = i.textContent.trim();
            if (t.length > 0 && t.length < 50) menuItems.add(t);
          });
        });
        return { dropdownFound: true, menuItems: [...menuItems] };
    output: dropdownOptions

  # Click Edit from dropdown (if available)
  - id: click-edit-from-dropdown
    action: browser.execute
    params:
      script: |
        const editBtn = Array.from(document.querySelectorAll('[role="menuitem"], [role="option"], button, a')).find(el => {
          const t = el.textContent.trim().toLowerCase();
          return t === 'edit' || t === 'rename' || t === 'settings' || t === 'configure';
        });
        if (!editBtn) {
          document.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape', bubbles: true }));
          return { skipped: true, reason: 'No edit option found', closing: true };
        }
        editBtn.click();
        return { clicked: true, label: editBtn.textContent.trim() };
    output: editClickResult

  - id: wait-after-edit-click
    action: wait
    params:
      ms: 1500

  - id: screenshot-after-edit-click
    action: browser.screenshot
    params:
      name: "ds-dh-deep-05-dots-edit-result"

  # If Edit opened a modal/form, capture fields then close it
  - id: capture-edit-modal-if-opened
    action: browser.execute
    params:
      script: |
        const modal = document.querySelector('[role="dialog"], [class*="modal"], [class*="Modal"], [class*="sheet"], [class*="Sheet"]');
        if (!modal) return { modalOpened: false };
        const inputs = Array.from(modal.querySelectorAll('input, textarea, select')).map(i => ({
          type: i.type || 'text', placeholder: i.placeholder || '', value: i.value || ''
        }));
        const buttons = Array.from(modal.querySelectorAll('button')).map(b => b.textContent.trim());
        return { modalOpened: true, inputs, buttons };
    output: editModalInfo

  - id: screenshot-edit-modal
    action: browser.screenshot
    params:
      name: "ds-dh-deep-06-dots-edit-modal"

  # Navigate back to DH list (Edit may open a modal OR a full page — direct nav is safest)
  - id: navigate-back-after-edit
    action: browser.navigate
    params:
      url: "{{DS_BASE_URL}}/#/digital-humans"
      waitUntil: "domcontentloaded"

  - id: wait-dh-list-after-edit
    action: browser.waitForSelector
    params:
      selector: "h1:has-text('Digital Humans')"
      timeout: 15000

  - id: wait-cards-after-edit
    action: wait
    params:
      ms: 1500

  # Reopen 3-dot menu to test Delete option (verify it exists, but DON'T actually delete)
  - id: reopen-dots-for-delete-check
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"]')).filter(c => {
          const t = c.textContent.trim();
          return t.includes('Running') || t.includes('Idle');
        });
        if (cards.length === 0) return { skipped: true, reason: 'No cards' };
        const dots = Array.from(cards[0].querySelectorAll('button, [role="button"]')).find(b => {
          const text = b.textContent.trim();
          const label = (b.getAttribute('aria-label') || '').toLowerCase();
          const cls = (b.className || '').toLowerCase();
          return text === '...' || text === '⋮' || label.includes('more') || label.includes('option') ||
                 cls.includes('more') || cls.includes('kebab') || cls.includes('dots') || cls.includes('ellipsis');
        });
        if (!dots) return { skipped: true, reason: 'No 3-dot button found' };
        dots.click();
        return { opened: true };
    output: dotsReopenResult

  - id: wait-dots-reopen
    action: wait
    params:
      ms: 800

  - id: screenshot-dots-reopen
    action: browser.screenshot
    params:
      name: "ds-dh-deep-07-dots-reopen"

  - id: check-delete-option-exists
    action: browser.execute
    params:
      script: |
        const allMenuItems = Array.from(document.querySelectorAll('[role="menuitem"], [role="option"]')).map(i => i.textContent.trim());
        const allBtnText = Array.from(document.querySelectorAll('button')).map(b => b.textContent.trim());
        const combined = [...new Set([...allMenuItems, ...allBtnText])].filter(t => t.length > 0 && t.length < 50);
        const hasDelete = combined.some(t => t.toLowerCase().includes('delete') || t.toLowerCase().includes('remove'));
        document.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape', bubbles: true }));
        return { hasDeleteOption: hasDelete, allMenuItems, closedWithEscape: true };
    output: deleteOptionCheck

  - id: wait-dropdown-dismissed
    action: wait
    params:
      ms: 500

  - id: navigate-back-after-dots
    action: browser.navigate
    params:
      url: "{{DS_BASE_URL}}/#/digital-humans"
      waitUntil: "domcontentloaded"

  - id: verify-back-on-dh-list-after-dots
    action: browser.waitForSelector
    params:
      selector: "h1:has-text('Digital Humans')"
      timeout: 15000

  # ════════════════════════════════════════════════════════════════
  # Group 4: 搜索功能深度验证
  # ════════════════════════════════════════════════════════════════
  - id: search-existing-name
    action: browser.type
    params:
      selector: "input[placeholder*='Search'], input[placeholder*='search'], input[placeholder*='name']"
      text: "Marketing"
      clear: true

  - id: wait-search-existing
    action: wait
    params:
      ms: 1000

  - id: screenshot-search-marketing
    action: browser.screenshot
    params:
      name: "ds-dh-deep-08-search-marketing"

  - id: verify-search-filters-cards
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"]')).filter(c => {
          const t = c.textContent.trim();
          return t.includes('Running') || t.includes('Idle') || t.includes('Stopped');
        });
        const nonMarketing = cards.filter(c => !c.textContent.toLowerCase().includes('marketing'));
        const hasNoResults = document.body.innerText.toLowerCase().includes('no results') ||
                             document.body.innerText.toLowerCase().includes('no digital human') ||
                             document.body.innerText.toLowerCase().includes('not found');
        return {
          visibleCards: cards.length,
          nonMarketingCards: nonMarketing.length,
          hasNoResultsMessage: hasNoResults,
          searchWorking: nonMarketing.length === 0 || cards.length === 0 || hasNoResults
        };
    output: searchMarketingResult

  - id: search-nonexistent
    action: browser.type
    params:
      selector: "input[placeholder*='Search'], input[placeholder*='search'], input[placeholder*='name']"
      text: "zzz_nonexistent_xyz_999"
      clear: true

  - id: wait-search-nonexistent
    action: wait
    params:
      ms: 1000

  - id: screenshot-search-empty
    action: browser.screenshot
    params:
      name: "ds-dh-deep-09-search-no-results"

  - id: verify-no-results-state
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"]')).filter(c => {
          const t = c.textContent.trim();
          return t.includes('Running') || t.includes('Idle') || t.includes('Stopped');
        });
        const body = document.body.innerText;
        const hasEmptyMessage = body.toLowerCase().includes('no results') ||
                                body.toLowerCase().includes('no digital human') ||
                                body.toLowerCase().includes('not found') ||
                                body.toLowerCase().includes('no match');
        return {
          visibleCards: cards.length,
          hasEmptyMessage,
          emptyStateHandled: cards.length === 0 || hasEmptyMessage
        };
    output: noResultsState

  - id: clear-search
    action: browser.type
    params:
      selector: "input[placeholder*='Search'], input[placeholder*='search'], input[placeholder*='name']"
      text: ""
      clear: true

  - id: wait-search-cleared
    action: wait
    params:
      ms: 1000

  - id: verify-cards-restored-after-clear
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"]')).filter(c => {
          const t = c.textContent.trim();
          return t.includes('Running') || t.includes('Idle') || t.includes('Stopped');
        });
        if (cards.length === 0) return { restoredCount: 0, note: '⚠️ Fresh account — no cards to restore after search clear' };
        return { restoredCount: cards.length };
    output: searchClearedResult

  # ════════════════════════════════════════════════════════════════
  # Group 5: 卡片详情页导航 + Tab 验证
  # ════════════════════════════════════════════════════════════════
  - id: click-first-dh-card
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"]')).filter(c => {
          const t = c.textContent.trim();
          return t.includes('Running') || t.includes('Idle');
        });
        if (cards.length === 0) return { skipped: true, reason: '⚠️ Fresh account — no DH cards; detail/chat tests skipped, Create flow will run' };
        const card = cards[0];
        const clickable = card.querySelector('h2, h3, [class*="name"], [class*="title"]') || card;
        clickable.click();
        return { clicked: true, cardPreview: card.textContent.trim().slice(0, 60).replace(/\s+/g, ' ') };
    output: cardClickResult

  - id: wait-detail-navigation
    action: wait
    params:
      ms: 2000

  - id: screenshot-dh-detail
    action: browser.screenshot
    params:
      name: "ds-dh-deep-10-detail-page"

  - id: verify-detail-page-loaded
    action: browser.execute
    params:
      script: |
        const url = window.location.href;
        const body = document.body.innerText;
        const headings = Array.from(document.querySelectorAll('h1, h2, h3')).map(h => h.textContent.trim()).filter(t => t.length > 0);
        return { url, headings, bodyLength: body.length };
    output: detailNavResult

  - id: capture-detail-tabs
    action: browser.execute
    params:
      script: |
        const tabs = Array.from(document.querySelectorAll('[role="tab"], button[class*="tab"], [class*="TabsTrigger"]'))
          .filter(t => t.textContent.trim().length > 0 && t.textContent.trim().length < 30);
        return { tabCount: tabs.length, tabs: tabs.map(t => t.textContent.trim()) };
    output: detailTabs

  - id: screenshot-detail-tabs
    action: browser.screenshot
    params:
      name: "ds-dh-deep-11-detail-tabs"

  - id: click-second-detail-tab
    action: browser.execute
    params:
      script: |
        const tabs = Array.from(document.querySelectorAll('[role="tab"], [class*="TabsTrigger"]'))
          .filter(t => t.textContent.trim().length > 0);
        if (tabs.length < 2) return { skipped: true, reason: 'Only ' + tabs.length + ' tab(s)' };
        const label = tabs[1].textContent.trim();
        tabs[1].click();
        return { clicked: true, tabLabel: label };
    output: secondTabClick

  - id: wait-second-tab
    action: wait
    params:
      ms: 1000

  - id: screenshot-second-tab
    action: browser.screenshot
    params:
      name: "ds-dh-deep-12-detail-second-tab"

  - id: click-third-detail-tab
    action: browser.execute
    params:
      script: |
        const tabs = Array.from(document.querySelectorAll('[role="tab"], [class*="TabsTrigger"]'))
          .filter(t => t.textContent.trim().length > 0);
        if (tabs.length < 3) return { skipped: true, reason: 'Only ' + tabs.length + ' tab(s)' };
        const label = tabs[2].textContent.trim();
        tabs[2].click();
        return { clicked: true, tabLabel: label };
    output: thirdTabClick

  - id: wait-third-tab
    action: wait
    params:
      ms: 1000

  - id: screenshot-third-tab
    action: browser.screenshot
    params:
      name: "ds-dh-deep-13-detail-third-tab"

  - id: click-fourth-detail-tab
    action: browser.execute
    params:
      script: |
        const tabs = Array.from(document.querySelectorAll('[role="tab"], [class*="TabsTrigger"]'))
          .filter(t => t.textContent.trim().length > 0);
        if (tabs.length < 4) return { skipped: true, reason: 'Only ' + tabs.length + ' tab(s)' };
        const label = tabs[3].textContent.trim();
        tabs[3].click();
        return { clicked: true, tabLabel: label };
    output: fourthTabClick

  - id: wait-fourth-tab
    action: wait
    params:
      ms: 1000

  - id: screenshot-fourth-tab
    action: browser.screenshot
    params:
      name: "ds-dh-deep-14-detail-fourth-tab"

  # ── Channels tab 专项验证 (YEP-417) ────────────────────────────
  - id: click-channels-tab
    action: browser.execute
    params:
      script: |
        const tabs = Array.from(document.querySelectorAll('[role="tab"], [class*="TabsTrigger"]'))
          .filter(t => t.textContent.trim().length > 0);
        const channelsTab = tabs.find(t => t.textContent.trim().toLowerCase() === 'channels');
        if (!channelsTab) {
          // Try by index (5th tab)
          if (tabs.length >= 5) { tabs[4].click(); return { clicked: true, method: 'index 4', label: tabs[4].textContent.trim() }; }
          return { skipped: true, reason: 'No Channels tab found', allTabs: tabs.map(t => t.textContent.trim()) };
        }
        channelsTab.click();
        return { clicked: true, method: 'by label', label: 'Channels' };
    output: channelsTabClick

  - id: wait-channels-tab
    action: wait
    params:
      ms: 1500

  - id: screenshot-channels-tab
    action: browser.screenshot
    params:
      name: "ds-dh-deep-15-channels-tab"

  - id: verify-channels-tab-structure
    action: browser.execute
    params:
      script: |
        const body = document.body.innerText;
        const hasBoundChannels = body.includes('Bound Channels') || body.includes('bound channel');
        const hasAddBtn = Array.from(document.querySelectorAll('button')).some(b =>
          b.textContent.trim().toLowerCase().includes('add channel')
        );
        const hasBindBtn = Array.from(document.querySelectorAll('button')).some(b =>
          b.textContent.trim().toLowerCase().includes('bind')
        );
        return { hasBoundChannels, hasAddBtn, hasBindBtn, bodySnippet: body.slice(0, 200) };
    output: channelsTabStructure

  # Click + Add Channel button
  - id: click-add-channel-button
    action: browser.execute
    params:
      script: |
        const addBtn = Array.from(document.querySelectorAll('button')).find(b =>
          b.textContent.trim().toLowerCase().includes('add channel')
        );
        if (!addBtn) return { skipped: true, reason: 'No + Add Channel button found' };
        addBtn.click();
        return { clicked: true, label: addBtn.textContent.trim() };
    output: addChannelClick

  - id: wait-add-channel-modal
    action: wait
    params:
      ms: 1500

  - id: screenshot-add-channel-modal
    action: browser.screenshot
    params:
      name: "ds-dh-deep-16-add-channel-modal"

  # YEP-417: Check for autofill bug — modal inputs must NOT be pre-filled with login credentials
  - id: check-add-channel-autofill-bug
    action: browser.execute
    params:
      script: |
        const modal = document.querySelector('[role="dialog"], [class*="modal"], [class*="Modal"], [class*="sheet"], [class*="Sheet"]');
        if (!modal) return { modalFound: false, note: 'No modal opened' };
        const inputs = Array.from(modal.querySelectorAll('input'));
        const inputDetails = inputs.map(i => ({
          type: i.type || 'text',
          value: i.value || '',
          placeholder: i.placeholder || '',
          autocomplete: i.getAttribute('autocomplete') || 'not set',
          name: i.name || '',
          id: i.id || ''
        }));
        const preFilledInputs = inputDetails.filter(i => i.value.length > 0);
        const hasAutofillBug = preFilledInputs.length > 0;
        // Specifically check if login email/password pattern was autofilled
        const hasEmailAutofill = preFilledInputs.some(i =>
          i.type === 'email' || i.value.includes('@') || i.type === 'password'
        );
        return {
          modalFound: true,
          inputCount: inputs.length,
          inputDetails,
          preFilledCount: preFilledInputs.length,
          hasAutofillBug,
          hasEmailAutofill,
