  - id: hp-02-wait
    action: wait
    params:
      ms: 6000

  # ════════════════════════════════════════════════════════
  # PART 10 — ACCURACY VERIFICATION (AC-01 ~ AC-30)
  # ════════════════════════════════════════════════════════
  - id: log-ac
    action: log
    params:
      message: "====== PART 10: ACCURACY VERIFICATION (30 tests) ======"

  - id: run-ac
    action: browser.execute
    params:
      script: |
        var tests = [
          { id: 'AC-01', category: 'AC', q: 'What does SKU mean in inventory?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('stock keeping unit') || l.includes('sku')) ? 'PASS' : 'FAIL'; } },
          { id: 'AC-02', category: 'AC', q: 'What does COGS stand for and how is it calculated?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('cost of goods sold') || l.includes('cogs')) && a.length > 50 ? 'PASS' : 'FAIL'; } },
          { id: 'AC-03', category: 'AC', q: 'What is gross margin and how does it differ from net margin?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('gross margin') && (l.includes('net') || l.includes('revenue'))) ? 'PASS' : 'FAIL'; } },
          { id: 'AC-04', category: 'AC', q: 'What is contribution margin and why is it important?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('contribution') && l.includes('margin')) && a.length > 50 ? 'PASS' : 'FAIL'; } },
          { id: 'AC-05', category: 'AC', q: 'What is break-even point and how do you calculate it?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('break') && l.includes('even') && (l.includes('cost') || l.includes('unit') || l.includes('fixed'))) ? 'PASS' : 'FAIL'; } },
          { id: 'AC-06', category: 'AC', q: 'What is the difference between markup and margin?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('markup') && l.includes('margin') && a.length > 80) ? 'PASS' : 'FAIL'; } },
          { id: 'AC-07', category: 'AC', q: 'What does MAP pricing stand for?',
            check: function(a) { var l = a.toLowerCase(); return (l.includes('minimum advertised price') || l.includes('map')) ? 'PASS' : 'FAIL'; } },
