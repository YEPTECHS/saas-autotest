            check: function(a) { var l = a.toLowerCase(); return (l.includes('operating') && (l.includes('margin') || l.includes('income'))) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-07', category: 'SA', q: "Break down the typical components of COGS for an e-commerce product.",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('cogs') || l.includes('cost')) && (l.includes('material') || l.includes('labor') || l.includes('manufacturing') || l.includes('shipping')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-08', category: 'SA', q: "If I give a 20% discount on a $100 product with $50 COGS, what happens to my margin?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('margin') || l.includes('%') || l.includes('80') || l.includes('37')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-09', category: 'SA', q: "How do I compare margins across multiple SKUs to find the most profitable ones?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('sku') || l.includes('compar') || l.includes('margin') || l.includes('rank')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-10', category: 'SA', q: "What is weighted average margin and when should I use it?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('weighted') && (l.includes('average') || l.includes('margin'))) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-11', category: 'SA', q: "How do landed costs affect my product margin calculation?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('landed') || (l.includes('shipping') && l.includes('cost'))) && l.includes('margin') ? 'PASS' : 'FAIL'; } },
          { id: 'SA-12', category: 'SA', q: "How should I factor product return rates into margin analysis?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('return') && (l.includes('margin') || l.includes('cost'))) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-13', category: 'SA', q: "How do I calculate the margin for a product bundle?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('bundle') && (l.includes('margin') || l.includes('cost') || l.includes('price'))) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-14', category: 'SA', q: "Is it better to have high volume at low margin or low volume at high margin?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('volume') && l.includes('margin')) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-15', category: 'SA', q: "How do I set different margin targets for premium vs economy product tiers?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('premium') || l.includes('tier') || l.includes('margin') || l.includes('target')) && a.length > 50 ? 'PASS' : 'FAIL'; } },
          { id: 'SA-16', category: 'SA', q: "How does FIFO vs LIFO inventory costing affect my margin reports?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('fifo') || l.includes('lifo')) && l.includes('margin') ? 'PASS' : 'FAIL'; } },
          { id: 'SA-17', category: 'SA', q: "How do subscription-based pricing models affect SKU margin calculations?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('subscription') && (l.includes('margin') || l.includes('recurring'))) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-18', category: 'SA', q: "What is a loss leader strategy and how does it impact overall margin?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('loss leader') || (l.includes('loss') && l.includes('leader'))) ? 'PASS' : 'FAIL'; } },
          { id: 'SA-19', category: 'SA', q: "How do currency exchange rate fluctuations affect my imported product COGS?",
            check: function(a) { var l = a.toLowerCase(); return (l.includes('currency') || l.includes('exchange')) && (l.includes('cost') || l.includes('cogs')) ? 'PASS' : 'FAIL'; } }
        ];
        return window.__runBatch(tests);
    continueOnError: true
    output: saResults

