# SalesClaw 💼 test dont delete — 15 轮对话逻辑测试
# 关键：waitForSelector 等 input 恢复 "Type a message..." 再发下一条
name: ds-chat-sales
description: "SalesClaw 15轮对话 — 销售技巧、异议处理、谈判、签约全覆盖"

steps:
  - id: navigate-login
    action: browser.navigate
    params:
      url: "{{DS_BASE_URL}}/#/login"
      waitUntil: "domcontentloaded"

  - id: wait-form
    action: browser.waitForSelector
    params:
      selector: "input[type='email'], input[type='text']"
      timeout: 15000

  - id: fill-email
    action: form.fillSingle
    params:
      selector: "input[type='email'], input[type='text']"
      value: "{{DS_LOGIN_EMAIL}}"

  - id: fill-password
    action: form.fillSingle
    params:
      selector: "input[type='password']"
      value: "{{DS_LOGIN_PASSWORD}}"

  - id: click-login
    action: browser.click
    params:
      selector: "button[type='submit'], button:has-text('Sign in')"

  - id: wait-dashboard
    action: browser.waitForSelector
    params:
      selector: "nav, aside, [class*='sidebar']"
      timeout: 30000

  - id: nav-dh
    action: browser.navigate
    params:
      url: "{{DS_BASE_URL}}/#/digital-humans"
      waitUntil: "domcontentloaded"

  - id: wait-dh
    action: browser.waitForSelector
    params:
      selector: "h1:has-text('Digital Humans')"
      timeout: 15000

  - id: wait-cards
    action: wait
    params:
      ms: 2000

  - id: open-sales-chat
    action: browser.execute
    params:
      script: |
        const cards = Array.from(document.querySelectorAll('[class*="card"], [class*="Card"], li, article'));
        const t = cards.find(c => c.textContent.includes('SalesClaw') && c.textContent.includes('test dont delete'));
        if (!t) return { found: false };
        const btn = Array.from(t.querySelectorAll('button')).find(b => b.textContent.trim() === 'Chat');
        if (btn) { btn.click(); return { clicked: true }; }
        return { found: true, noBtn: true };

  - id: wait-chat-input-ready
    action: browser.waitForSelector
    params:
      selector: "input[placeholder*='Type a message'], input[placeholder*='message']"
      timeout: 15000

  - id: screenshot-start
    action: browser.screenshot
    params:
      name: "sales-00-chat-opened"

  # ── Round 1: 了解销售角色 ────────────────────────────────────────
  - id: msg1
    action: form.fillSingle
    params:
      selector: "input[placeholder*='Type a message'], input[placeholder*='message'], input[placeholder*='Message']"
      value: "我是一个B2B SaaS销售，产品定价999元/月，目标客户是50-200人的中小企业。你能帮我制定一套完整的销售流程吗？"
  - id: send1
    action: browser.execute
    params:
      script: |
        const btn = Array.from(document.querySelectorAll('button')).find(b => b.textContent.trim().toLowerCase() === 'send' || (b.getAttribute('aria-label')||'').toLowerCase().includes('send') || b.type === 'submit');
        if (btn) btn.click(); return { sent: !!btn };
  - id: wait-resp1
    action: browser.waitForSelector
    params:
      selector: "input[placeholder*='Type a message'], input[placeholder*='message']"
      timeout: 300000
  - id: shot1
    action: browser.screenshot
    params:
      name: "sales-01-resp"

