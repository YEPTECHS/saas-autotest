  # ── DIMENSION: NT — Natural Tone (with validation) ──
  - id: run-nt
    action: browser.execute
    params:
      script: |
        (async function() {
          var tests = [
            { q: "Can you give me a quick SEO tip for my product page?", check: function(a) { return a.length < 800 ? 'PASS' : 'FAIL — too long for quick tip'; } },
            { q: "Hey, I need SEO help!", check: function(a) { return a.length > 10 ? 'PASS' : 'FAIL — no response'; } },
            { q: "Just fix my title, it's terrible.", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "I'm stressed about my rankings. Any advice?", check: function(a) { var l = a.toLowerCase(); var empathy = l.includes('understand') || l.includes('stress') || l.includes('worry') || l.includes('normal') || l.includes('help') || l.includes('okay'); return empathy ? 'PASS' : 'WARN — no empathetic acknowledgment'; } },
            { q: "Talk to me like a friend, not an SEO textbook.", check: function(a) { var l = a.toLowerCase(); var formal = (l.match(/\b(therefore|furthermore|additionally|commence|utilize|pursuant)\b/g) || []).length; return formal <= 1 ? 'PASS' : 'FAIL — too formal'; } },
            { q: "Be brief — what's the ONE SEO thing I should do this week?", check: function(a) { var sentences = a.split(/[.!?]+/).filter(function(s) { return s.trim().length > 5; }); return sentences.length <= 5 ? 'PASS' : 'FAIL — not brief (' + sentences.length + ' sentences)'; } },
            { q: "Write something short and punchy for my product title.", check: function(a) { return a.length < 600 ? 'PASS' : 'FAIL — not short'; } },
            { q: "I'm overwhelmed — just tell me what matters most for SEO.", check: function(a) { var sentences = a.split(/[.!?]+/).filter(function(s) { return s.trim().length > 5; }); return sentences.length <= 8 ? 'PASS' : 'FAIL — too much for overwhelmed user'; } },
            { q: "Pretend you're explaining SEO to my 8-year-old.", check: function(a) { var l = a.toLowerCase(); var jargon = (l.match(/\b(canonical|crawlability|indexation|serp|ctr|schema markup|backlink profile)\b/g) || []).length; return jargon === 0 ? 'PASS' : 'FAIL — jargon in child-level explanation'; } },
            { q: "My SEO is a disaster. Can you challenge my assumptions?", check: function(a) { var l = a.toLowerCase(); var challenge = l.includes('however') || l.includes('actually') || l.includes('but') || l.includes('consider') || l.includes('what if') || l.includes('might not'); return challenge ? 'PASS' : 'FAIL — no assumption challenged'; } },
            { q: "Explain keyword density in plain English.", check: function(a) { var l = a.toLowerCase(); var jargon = (l.match(/\b(latent semantic indexing|tf-idf analysis|n-gram)\b/g) || []).length; return jargon === 0 ? 'PASS' : 'FAIL — too technical'; } },
            { q: "I need an SEO fix RIGHT NOW — I have 5 minutes.", check: function(a) { return a.length < 1200 ? 'PASS' : 'FAIL — too long for urgent request'; } },
            { q: "Can you stop being so robotic? Just chat with me.", check: function(a) { var l = a.toLowerCase(); var casual = l.includes('!') || l.includes('sure') || l.includes('let') || l.includes('ok') || l.includes('got it') || a.length < 600; return casual ? 'PASS' : 'WARN — may still be too robotic'; } },
            { q: "I have no idea what I'm doing. Start from zero.", check: function(a) { return a.length > 30 ? 'PASS' : 'FAIL'; } },
            { q: "What's the stupidest SEO mistake I could make?", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "What am I NOT thinking about for my product pages?", check: function(a) { return a.length > 30 ? 'PASS' : 'FAIL'; } },
            { q: "Tell me something about SEO I probably don't know.", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "I need inspiration, not a lecture.", check: function(a) { var l = a.toLowerCase(); var inspiring = l.includes('imagine') || l.includes('idea') || l.includes('try') || l.includes('what if') || l.includes('picture') || l.includes('think about'); return inspiring ? 'PASS' : 'WARN — lecture-like rather than inspiring'; } },
            { q: "Can you make my product description sound less corporate?", check: function(a) { var l = a.toLowerCase(); var corporate = (l.match(/\b(synergy|leverage|optimize|utilize|facilitate|stakeholder)\b/g) || []).length; return corporate === 0 ? 'PASS' : 'FAIL — corporate jargon found'; } },
            { q: "Be dramatic if you need to. I need to understand the stakes.", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "What would an SEO genius do in my shoes?", check: function(a) { return a.length > 30 ? 'PASS' : 'FAIL'; } },
            { q: "This SEO stuff is confusing. Just tell me what to write.", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "My gut tells me my product titles are wrong. Am I right?", check: function(a) { return a.length > 10 ? 'PASS' : 'FAIL'; } },
            { q: "Can you write my SEO proposal in bullet points only?", check: function(a) { var hasBullets = a.includes('•') || a.includes('- ') || a.includes('* '); return hasBullets ? 'PASS' : 'WARN — no bullet points'; } },
            { q: "I'm launching tomorrow. What's the minimum SEO I can do today?", check: function(a) { return a.length < 1500 ? 'PASS' : 'FAIL — too long for minimum-effort ask'; } },
            { q: "Can you write my product title like a human, not a robot?", check: function(a) { return a.length > 10 ? 'PASS' : 'FAIL'; } },
            { q: "Is my product page hopeless? Be honest.", check: function(a) { var l = a.toLowerCase(); var honest = l.includes('honest') || l.includes('if') || l.includes('depend') || l.includes('however') || l.includes('but') || l.includes('could') || l.includes('might'); return honest ? 'PASS' : 'WARN — may be too reassuring without honest assessment'; } },
            { q: "What SEO thing gives the fastest results?", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "I've been ignoring SEO for 2 years. How bad is it?", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "Can you give me an SEO checklist I can actually use?", check: function(a) { var hasList = a.includes('•') || a.includes('- ') || a.includes('1.') || a.includes('✓') || a.includes('[ ]'); return hasList ? 'PASS' : 'WARN — no checklist format'; } }
          ];
