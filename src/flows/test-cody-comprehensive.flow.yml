          function waitForNewReply(snap) { return new Promise(function(resolve) { setTimeout(function() { var tries = 0; var t = setInterval(function() { tries++; var cur = getAISnapshots(); var hasNew = cur.length > snap.length || cur.some(function(s) { return s.length > 10 && snap.indexOf(s) === -1; }); if (hasNew || tries > 120) { clearInterval(t); setTimeout(resolve, 2000); } }, 500); }, 3000); }); }
          function waitSendReady() { return new Promise(function(resolve) { var tries = 0; var t = setInterval(function() { tries++; var ta = document.querySelector('textarea'); if (!ta) { if (tries >= 120) { clearInterval(t); resolve(false); } return; } var btn = ta.parentElement ? ta.parentElement.querySelector('button') : null; if (!btn && ta.parentElement && ta.parentElement.parentElement) btn = ta.parentElement.parentElement.querySelector('button'); var ok = btn && !btn.disabled && btn.offsetParent !== null; if (ok || tries >= 120) { clearInterval(t); resolve(!!ok); } }, 500); }); }
          function fillAndSend(text) { var inp = document.querySelector('textarea'); if (!inp) return false; try { Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, text); } catch(e) { inp.value = text; } inp.dispatchEvent(new Event('input', { bubbles: true })); inp.dispatchEvent(new Event('change', { bubbles: true })); var btn = inp.parentElement.querySelector('button') || Array.from(document.querySelectorAll('button')).find(function(b) { return b.offsetParent !== null && !b.disabled; }); if (btn) { btn.click(); return true; } return false; }
          var dim = 'NT';
          console.log('[' + dim + '] Starting 30 questions — with tone validation');
          for (var i = 0; i < tests.length; i++) {
            var testId = dim + '-' + (i + 1).toString().padStart(2, '0');
            await waitSendReady(); var snap = getAISnapshots(); var startTime = Date.now();
            fillAndSend(tests[i].q); await waitForNewReply(snap);
            var answer = getLastAI(); var duration = Date.now() - startTime;
            var status = tests[i].check(answer);
            window.__compReport.push({ id: testId, question: tests[i].q, answer: answer.substring(0, 300), duration: duration, status: status, timestamp: new Date().toISOString() });
            console.log('[' + testId + '] ' + status + ' | ' + duration + 'ms');
          }
          console.log('[' + dim + '] Done'); return { dim: dim, count: tests.length };
        })();
    continueOnError: true

