# ============================================================
# Cody Comprehensive Test Suite — All 180 Questions
# URL: /ai-team/seo/chat
#
# Runs ALL 180 test questions across 6 dimensions:
#  AC — Accuracy Verification (30 questions)
#  RV — Relevance (30 questions)
#  NT — Natural Tone (30 questions)
#  SF — Safety / Jailbreak (30 questions)
#  CC — Concurrency Behavior (30 questions)
#  IS — Session Isolation (30 questions)
#
# Total: 180 questions | Estimated runtime: 45-60 minutes
# ============================================================

name: test-cody-comprehensive
description: Comprehensive test suite for Cody (SEO Agent) — All 180 questions across 6 dimensions

steps:
  - include: _shared/login.steps.yml

  - id: nav-seo
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/seo/chat"
      waitUntil: "networkidle"

  - id: wait-load
    action: wait
    params:
      ms: 3000

  - id: screenshot-start
    action: browser.screenshot
    params:
      name: "cody-comp-00-start"

  - id: set-timeout
    action: browser.setDefaultTimeout
    params:
      ms: 5400000

  - id: install-helpers
    action: browser.execute
    params:
      script: |
        window.__compReport = [];
        window.__startTime = Date.now();
        console.log('[CodyComp] Helpers ready');
        return true;

  # ── DIMENSION: AC — Accuracy Verification ──
  - id: run-ac
    action: browser.execute
    params:
      script: |
        (async function() {
          var questions = ["What does SEO stand for?","What is the difference between on-page and off-page SEO?","What is a meta title and how long should it be?","What is a meta description and what is the recommended character limit?","What is keyword density and why does it matter?","What is a canonical tag and what problem does it solve?","What is an alt tag on an image?","What is a long-tail keyword?","What is the difference between organic and paid search results?","What is a sitemap and why is it important for SEO?","What does crawlability mean in SEO?","What is a 301 redirect and when should you use it?","What is thin content and why does Google penalise it?","What is keyword cannibalization?","What is a robots.txt file?","What is schema markup and what does it do?","What is bounce rate and how does it relate to SEO?","What is Core Web Vitals and why does it affect SEO?","What is the difference between a title tag and an H1 tag?","What is a backlink?","What is domain authority?","What is page speed and why does it matter for SEO?","What is duplicate content and how does it hurt rankings?","What is an XML sitemap?","What is structured data?","What does SERP stand for?","What is click-through rate (CTR) in SEO?","What is the difference between index and crawl?","What is anchor text?","What is an SEO audit?"];
          function getAISnapshots() { return Array.from(document.querySelectorAll('[class*="rounded-2xl"]')).filter(function(b) { return !b.className.includes('purple') && !b.className.includes('bg-purple'); }).map(function(b) { return b.textContent.trim().substring(0, 80); }); }
          function getLastAI() { var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]')); for (var i = bubbles.length - 1; i >= 0; i--) { var cls = bubbles[i].className || ''; if (!cls.includes('purple') && !cls.includes('bg-purple')) { var t = bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim(); if (t.length > 10) return t; } } return ''; }
          function waitForNewReply(snap) { return new Promise(function(resolve) { setTimeout(function() { var tries = 0; var t = setInterval(function() { tries++; var cur = getAISnapshots(); var hasNew = cur.length > snap.length || cur.some(function(s) { return s.length > 10 && snap.indexOf(s) === -1; }); if (hasNew || tries > 120) { clearInterval(t); setTimeout(resolve, 2000); } }, 500); }, 3000); }); }
          function waitSendReady() { return new Promise(function(resolve) { var tries = 0; var t = setInterval(function() { tries++; var ta = document.querySelector('textarea'); if (!ta) { if (tries >= 120) { clearInterval(t); resolve(false); } return; } var btn = ta.parentElement ? ta.parentElement.querySelector('button') : null; if (!btn && ta.parentElement && ta.parentElement.parentElement) btn = ta.parentElement.parentElement.querySelector('button'); var ok = btn && !btn.disabled && btn.offsetParent !== null; if (ok || tries >= 120) { clearInterval(t); resolve(!!ok); } }, 500); }); }
          function fillAndSend(text) { var inp = document.querySelector('textarea'); if (!inp) return false; try { Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, text); } catch(e) { inp.value = text; } inp.dispatchEvent(new Event('input', { bubbles: true })); inp.dispatchEvent(new Event('change', { bubbles: true })); var btn = inp.parentElement.querySelector('button') || Array.from(document.querySelectorAll('button')).find(function(b) { return b.offsetParent !== null && !b.disabled; }); if (btn) { btn.click(); return true; } return false; }
          var dim = 'AC';
          console.log('[' + dim + '] Starting 30 questions');
          for (var i = 0; i < questions.length; i++) {
            var testId = dim + '-' + (i + 1).toString().padStart(2, '0');
            await waitSendReady(); var snap = getAISnapshots(); var startTime = Date.now();
            fillAndSend(questions[i]); await waitForNewReply(snap);
            var answer = getLastAI(); var duration = Date.now() - startTime;
            window.__compReport.push({ id: testId, question: questions[i], answer: answer.substring(0, 300), duration: duration, timestamp: new Date().toISOString() });
            console.log('[' + testId + '] ' + duration + 'ms | ' + answer.substring(0, 60));
          }
          console.log('[' + dim + '] Done'); return { dim: dim, count: questions.length };
        })();
    continueOnError: true

