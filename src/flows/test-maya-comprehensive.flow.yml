# ============================================================
# Maya Comprehensive Test Suite — All 180 Questions
# URL: /ai-team/marketing/chat
#
# Runs ALL 180 test questions across 6 dimensions:
#  AC — Accuracy Verification (30 questions)
#  RV — Relevance (30 questions)
#  NT — Natural Tone (30 questions)
#  SF — Safety / Jailbreak (30 questions)
#  CC — Concurrency Behavior (30 questions)
#  IS — Session Isolation (30 questions)
#
# Total: 180 questions | Estimated runtime: 45-60 minutes
# ============================================================

name: test-maya-comprehensive
description: Comprehensive test suite for Maya (Marketing Agent) — All 180 questions across 6 dimensions

steps:
  - include: _shared/login.steps.yml

  - id: nav-marketing
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/marketing/chat"
      waitUntil: "networkidle"

  - id: wait-load
    action: wait
    params:
      ms: 3000

  - id: screenshot-start
    action: browser.screenshot
    params:
      name: "maya-comp-00-start"

  # Extend page timeout to 90 min — comprehensive suite takes longer
  - id: set-timeout
    action: browser.setDefaultTimeout
    params:
      ms: 5400000

  # ── Install shared helpers ──
  - id: install-helpers
    action: browser.execute
    params:
      script: |
        window.__compReport = [];
        window.__startTime = Date.now();
        console.log('[MayaComp] Helpers ready');
        return true;

  # ══════════════════════ RUN ALL QUESTIONS ══════════════════════
  # Fix #1: Each dimension runs in a FRESH chat session
  # Fix #2: Snapshot-based response capture
  # Fix #3: NT dimension has real tone/format validation

  # ── DIMENSION: AC ──
  - id: run-ac
    action: browser.execute
    params:
      script: |
        (async function() {
          var questions = ["What does SEO stand for?","What does CTR stand for in digital marketing?","What does ROAS stand for and how is it calculated?","What is the difference between reach and impressions on social media?","What does A/B testing mean in marketing?","What is a conversion rate in e-commerce?","What does CPM stand for and what does it measure?","What is bounce rate in web analytics?","What is the difference between organic and paid social media traffic?","What does CTA stand for?","What is email open rate and what is considered a good benchmark?","What is the difference between B2B and B2C marketing?","What does UGC stand for and why is it valuable?","What is a sales funnel and what are its stages?","What is retargeting in digital advertising?","What does CPC stand for?","What is the difference between a landing page and a homepage?","What does CPL stand for in marketing?","What is affiliate marketing?","What does KPI stand for and give 3 examples of marketing KPIs?","What is customer lifetime value (CLV) and why does it matter?","What is the difference between a soft bounce and a hard bounce in email marketing?","What is a meta description and how does it affect SEO?","What is social proof in marketing and give 3 examples?","What does ROI stand for and how do you calculate it?","What is a buyer persona and why is it used?","What is the difference between SEO and SEM?","What is influencer marketing and what are the main tiers (nano, micro, macro)?","What is a drip email campaign?","What is the difference between a marketing campaign and an always-on strategy?"];
          function getAISnapshots() { return Array.from(document.querySelectorAll('[class*="rounded-2xl"]')).filter(function(b) { return !b.className.includes('purple') && !b.className.includes('bg-purple'); }).map(function(b) { return b.textContent.trim().substring(0, 80); }); }
          function getLastAI() { var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]')); for (var i = bubbles.length - 1; i >= 0; i--) { var cls = bubbles[i].className || ''; if (!cls.includes('purple') && !cls.includes('bg-purple')) { var t = bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim(); if (t.length > 10) return t; } } return ''; }
          function waitForNewReply(snap) { return new Promise(function(resolve) { setTimeout(function() { var tries = 0; var t = setInterval(function() { tries++; var cur = getAISnapshots(); var hasNew = cur.length > snap.length || cur.some(function(s) { return s.length > 10 && snap.indexOf(s) === -1; }); if (hasNew || tries > 120) { clearInterval(t); setTimeout(resolve, 2000); } }, 500); }, 3000); }); }
          function waitSendReady() { return new Promise(function(resolve) { var tries = 0; var t = setInterval(function() { tries++; var ta = document.querySelector('textarea[placeholder*="Message"]'); if (!ta) { if (tries >= 120) { clearInterval(t); resolve(false); } return; } var btn = ta.parentElement ? ta.parentElement.querySelector('button') : null; if (!btn && ta.parentElement && ta.parentElement.parentElement) btn = ta.parentElement.parentElement.querySelector('button'); var ok = btn && !btn.disabled && btn.offsetParent !== null; if (ok || tries >= 120) { clearInterval(t); resolve(!!ok); } }, 500); }); }
          function fillAndSend(text) { var inp = document.querySelector('textarea[placeholder*="Message"]'); if (!inp) return false; try { Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, text); } catch(e) { inp.value = text; } inp.dispatchEvent(new Event('input', { bubbles: true })); inp.dispatchEvent(new Event('change', { bubbles: true })); var btn = inp.parentElement.querySelector('button') || Array.from(document.querySelectorAll('button')).find(function(b) { return b.offsetParent !== null && !b.disabled; }); if (btn) { btn.click(); return true; } return false; }
          var dim = 'AC';
          console.log('[' + dim + '] Starting 30 questions');
          for (var i = 0; i < questions.length; i++) {
            var testId = dim + '-' + (i + 1).toString().padStart(2, '0');
            await waitSendReady(); var snap = getAISnapshots(); var startTime = Date.now();
            fillAndSend(questions[i]); await waitForNewReply(snap);
            var answer = getLastAI(); var duration = Date.now() - startTime;
            window.__compReport.push({ id: testId, question: questions[i], answer: answer.substring(0, 300), duration: duration, timestamp: new Date().toISOString() });
            console.log('[' + testId + '] ' + duration + 'ms | ' + answer.substring(0, 60));
          }
          console.log('[' + dim + '] Done'); return { dim: dim, count: questions.length };
        })();
    continueOnError: true

