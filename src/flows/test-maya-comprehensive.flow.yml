ollow?","My product has a 30-day return policy. How do I use this as a marketing advantage?","I'm launching in a new city. How do I build local awareness?","My best-selling product is about to go out of stock. What should I communicate to customers?","I have 3 competitors with bigger budgets than me. How do I compete on marketing?"];
          function getAISnapshots() { return Array.from(document.querySelectorAll('[class*="rounded-2xl"]')).filter(function(b) { return !b.className.includes('purple') && !b.className.includes('bg-purple'); }).map(function(b) { return b.textContent.trim().substring(0, 80); }); }
          function getLastAI() { var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]')); for (var i = bubbles.length - 1; i >= 0; i--) { var cls = bubbles[i].className || ''; if (!cls.includes('purple') && !cls.includes('bg-purple')) { var t = bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim(); if (t.length > 10) return t; } } return ''; }
          function waitForNewReply(snap) { return new Promise(function(resolve) { setTimeout(function() { var tries = 0; var t = setInterval(function() { tries++; var cur = getAISnapshots(); var hasNew = cur.length > snap.length || cur.some(function(s) { return s.length > 10 && snap.indexOf(s) === -1; }); if (hasNew || tries > 120) { clearInterval(t); setTimeout(resolve, 2000); } }, 500); }, 3000); }); }
          function waitSendReady() { return new Promise(function(resolve) { var tries = 0; var t = setInterval(function() { tries++; var ta = document.querySelector('textarea[placeholder*="Message"]'); if (!ta) { if (tries >= 120) { clearInterval(t); resolve(false); } return; } var btn = ta.parentElement ? ta.parentElement.querySelector('button') : null; if (!btn && ta.parentElement && ta.parentElement.parentElement) btn = ta.parentElement.parentElement.querySelector('button'); var ok = btn && !btn.disabled && btn.offsetParent !== null; if (ok || tries >= 120) { clearInterval(t); resolve(!!ok); } }, 500); }); }
          function fillAndSend(text) { var inp = document.querySelector('textarea[placeholder*="Message"]'); if (!inp) return false; try { Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, text); } catch(e) { inp.value = text; } inp.dispatchEvent(new Event('input', { bubbles: true })); inp.dispatchEvent(new Event('change', { bubbles: true })); var btn = inp.parentElement.querySelector('button') || Array.from(document.querySelectorAll('button')).find(function(b) { return b.offsetParent !== null && !b.disabled; }); if (btn) { btn.click(); return true; } return false; }
          var dim = 'RV';
          console.log('[' + dim + '] Starting 30 questions');
          for (var i = 0; i < questions.length; i++) {
            var testId = dim + '-' + (i + 1).toString().padStart(2, '0');
            await waitSendReady(); var snap = getAISnapshots(); var startTime = Date.now();
            fillAndSend(questions[i]); await waitForNewReply(snap);
            var answer = getLastAI(); var duration = Date.now() - startTime;
            window.__compReport.push({ id: testId, question: questions[i], answer: answer.substring(0, 300), duration: duration, timestamp: new Date().toISOString() });
            console.log('[' + testId + '] ' + duration + 'ms | ' + answer.substring(0, 60));
          }
          console.log('[' + dim + '] Done'); return { dim: dim, count: questions.length };
        })();
    continueOnError: true

  # ── Refresh session before NT ──
  - id: refresh-for-nt
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/dashboard"
      waitUntil: "networkidle"
  - id: wait-nt-dash
    action: wait
    params:
      ms: 2000
  - id: nav-nt
    action: browser.navigate
    params:
      url: "{{YEPAI_BASE_URL}}/ai-team/marketing/chat"
      waitUntil: "networkidle"
  - id: wait-nt-load
    action: wait
    params:
      ms: 3000

  # ── DIMENSION: NT — with real tone validation ──
  - id: run-nt
    action: browser.execute
    params:
      script: |
        (async function() {
          var tests = [
            { q: "Can you just give me a quick tip for my Instagram?", check: function(a) { return a.length < 800 ? 'PASS' : 'FAIL — response too long for quick tip request'; } },
            { q: "Hey, I need help!", check: function(a) { return a.length > 10 ? 'PASS' : 'FAIL — no response'; } },
            { q: "What should I post today?", check: function(a) { return a.length > 20 && a.length < 2000 ? 'PASS' : 'FAIL — response length inappropriate'; } },
            { q: "Give me something creative for my store", check: function(a) { return a.length > 30 ? 'PASS' : 'FAIL — insufficient creative output'; } },
            { q: "I'm stressed about my marketing. Any advice?", check: function(a) { var l = a.toLowerCase(); var empathy = l.includes('understand') || l.includes('stress') || l.includes('worry') || l.includes('normal') || l.includes('okay') || l.includes('help'); return empathy ? 'PASS' : 'WARN — no empathetic acknowledgment'; } },
            { q: "My store is struggling. Talk to me like a friend, not a consultant.", check: function(a) { var l = a.toLowerCase(); var formal = (l.match(/\b(therefore|furthermore|additionally|commence|utilize|pursuant)\b/g) || []).length; return formal <= 1 ? 'PASS' : 'FAIL — too formal/stiff for friendly tone'; } },
            { q: "Be brief — what's the ONE thing I should do for marketing this week?", check: function(a) { var sentences = a.split(/[.!?]+/).filter(function(s) { return s.trim().length > 5; }); return sentences.length <= 5 ? 'PASS' : 'FAIL — not brief (' + sentences.length + ' sentences)'; } },
            { q: "Stop being so formal. Just chat with me about my store.", check: function(a) { var l = a.toLowerCase(); var casual = l.includes('!') || l.includes('hey') || l.includes('sure') || l.includes('let') || l.includes('yeah') || l.includes('ok') || l.includes('got it'); return casual ? 'PASS' : 'WARN — may still be too formal'; } },
            { q: "Write something fun and exciting for my brand, not boring corporate stuff", check: function(a) { var l = a.toLowerCase(); var lively = l.includes('!') || l.includes('love') || l.includes('amazing') || l.includes('awesome') || l.includes('exciting') || l.includes('wow'); return lively ? 'PASS' : 'FAIL — not fun/exciting tone'; } },
            { q: "Can you be more enthusiastic? Your last response felt too dry.", check: function(a) { var exclaims = (a.match(/!/g) || []).length; return exclaims >= 1 ? 'PASS' : 'FAIL — no enthusiasm markers'; } },
            { q: "I need a marketing idea RIGHT NOW — I have 5 minutes", check: function(a) { return a.length < 1200 ? 'PASS' : 'FAIL — too long for urgent request'; } },
            { q: "Write me something short, punchy, and exciting", check: function(a) { return a.length < 800 ? 'PASS' : 'FAIL — not short (' + a.length + ' chars)'; } },
            { q: "What if I told you my sales are about to tank?", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "I'm overwhelmed. Just tell me what matters most.", check: function(a) { var sentences = a.split(/[.!?]+/).filter(function(s) { return s.trim().length > 5; }); return sentences.length <= 8 ? 'PASS' : 'FAIL — too much for overwhelmed user (' + sentences.length + ')'; } },
            { q: "Make this sexy. Make people want to buy.", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "Can you write like you're texting a friend?", check: function(a) { var l = a.toLowerCase(); var textStyle = l.includes('!') || l.includes('hey') || l.includes('lol') || l.includes('tbh') || l.includes('btw') || a.length < 600; return textStyle ? 'PASS' : 'WARN — not text-like enough'; } },
            { q: "My gut tells me something is off. What is it?", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "I'm tired of overthinking. What's your gut feeling?", check: function(a) { var l = a.toLowerCase(); var direct = l.includes('i think') || l.includes('i\'d say') || l.includes('honestly') || l.includes('my take') || l.includes('recommend') || l.includes('suggest'); return direct ? 'PASS' : 'WARN — no direct opinion given'; } },
            { q: "Can you challenge my assumptions? I might be wrong.", check: function(a) { var l = a.toLowerCase(); var challenge = l.includes('however') || l.includes('actually') || l.includes('but') || l.includes('consider') || l.includes('what if') || l.includes('might not'); return challenge ? 'PASS' : 'FAIL — no assumption challenged'; } },
            { q: "These metrics are confusing. Explain it in plain English.", check: function(a) { var l = a.toLowerCase(); var jargon = (l.match(/\b(roi calculation|cltv|attribution model|incremental lift|multivariate)\b/g) || []).length; return jargon <= 1 ? 'PASS' : 'FAIL — too much jargon (' + jargon + ' terms)'; } },
            { q: "You're my only hope. Help me save this campaign.", check: function(a) { return a.length > 30 ? 'PASS' : 'FAIL'; } },
            { q: "This is embarrassing but my store also has...", check: function(a) { return a.length > 10 ? 'PASS' : 'FAIL'; } },
            { q: "Pretend you're explaining this to my 8-year-old.", check: function(a) { var l = a.toLowerCase(); var jargon = (l.match(/\b(roi|ctr|cpm|cpc|roas|attribution|multivariate|segmentation)\b/g) || []).length; return jargon === 0 ? 'PASS' : 'FAIL — jargon in child-level explanation'; } },
            { q: "What would a marketing genius do in my shoes?", check: function(a) { return a.length > 30 ? 'PASS' : 'FAIL'; } },
            { q: "I need inspiration, not a lecture.", check: function(a) { var l = a.toLowerCase(); var inspiring = l.includes('imagine') || l.includes('idea') || l.includes('creative') || l.includes('try') || l.includes('what if') || l.includes('picture'); return inspiring ? 'PASS' : 'WARN — lecture-like rather than inspiring'; } },
            { q: "Can you make this sound less corporate and more real?", check: function(a) { var l = a.toLowerCase(); var corporate = (l.match(/\b(synergy|leverage|optimize|utilize|facilitate|stakeholder)\b/g) || []).length; return corporate === 0 ? 'PASS' : 'FAIL — corporate jargon found'; } },
            { q: "What's the stupidest mistake I could make here?", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "Be dramatic if you need to. I need to understand the stakes.", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } },
            { q: "What am I NOT thinking about?", check: function(a) { return a.length > 30 ? 'PASS' : 'FAIL'; } },
            { q: "Tell me something I don't already know.", check: function(a) { return a.length > 20 ? 'PASS' : 'FAIL'; } }
          ];
          function getAISnapshots() { return Array.from(document.querySelectorAll('[class*="rounded-2xl"]')).filter(function(b) { return !b.className.includes('purple') && !b.className.includes('bg-purple'); }).map(function(b) { return b.textContent.trim().substring(0, 80); }); }
          function getLastAI() { var bubbles = Array.from(document.querySelectorAll('[class*="rounded-2xl"]')); for (var i = bubbles.length - 1; i >= 0; i--) { var cls = bubbles[i].className || ''; if (!cls.includes('purple') && !cls.includes('bg-purple')) { var t = bubbles[i].textContent.trim().replace(/\s*\d{1,2}:\d{2}\s*(AM|PM)\s*$/i, '').trim(); if (t.length > 10) return t; } } return ''; }
          function waitForNewReply(snap) { return new Promise(function(resolve) { setTimeout(function() { var tries = 0; var t = setInterval(function() { tries++; var cur = getAISnapshots(); var hasNew = cur.length > snap.length || cur.some(function(s) { return s.length > 10 && snap.indexOf(s) === -1; }); if (hasNew || tries > 120) { clearInterval(t); setTimeout(resolve, 2000); } }, 500); }, 3000); }); }
          function waitSendReady() { return new Promise(function(resolve) { var tries = 0; var t = setInterval(function() { tries++; var ta = document.querySelector('textarea[placeholder*="Message"]'); if (!ta) { if (tries >= 120) { clearInterval(t); resolve(false); } return; } var btn = ta.parentElement ? ta.parentElement.querySelector('button') : null; if (!btn && ta.parentElement && ta.parentElement.parentElement) btn = ta.parentElement.parentElement.querySelector('button'); var ok = btn && !btn.disabled && btn.offsetParent !== null; if (ok || tries >= 120) { clearInterval(t); resolve(!!ok); } }, 500); }); }
          function fillAndSend(text) { var inp = document.querySelector('textarea[placeholder*="Message"]'); if (!inp) return false; try { Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set.call(inp, text); } catch(e) { inp.value = text; } inp.dispatchEvent(new Event('input', { bubbles: true })); inp.dispatchEvent(new Event('change', { bubbles: true })); var btn = inp.parentElement.querySelector('button') || Array.from(document.querySelectorAll('button')).find(function(b) { return b.offsetParent !== null && !b.disabled; }); if (btn) { btn.click(); return true; } return false; }
          var dim = 'NT';
          console.log('[' + dim + '] Starting 30 questions — with tone validation');
          for (var i = 0; i < tests.length; i++) {
            var testId = dim + '-' + (i + 1).toString().padStart(2, '0');
            await waitSendReady(); var snap = getAISnapshots(); var startTime = Date.now();
            fillAndSend(tests[i].q); await waitForNewReply(snap);
            var answer = getLastAI(); var duration = Date.now() - startTime;
            var status = tests[i].check(answer);
            window.__compReport.push({ id: testId, question: tests[i].q, answer: answer.substring(0, 300), duration: duration, status: status, timestamp: new Date().toISOString() });
            console.log('[' + testId + '] ' + status + ' | ' + duration + 'ms');
          }
          console.log('[' + dim + '] Done'); return { dim: dim, count: tests.length };
        })();
    continueOnError: true

